<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Alfred OS v9 - LLM Only</title>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #D4A020;
      --text: #EDE8D8;
      --bg: #06040A;
      --bg2: #0D090F;
      --border: rgba(212,160,32,0.15);
      --success: #00C853;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .config {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .config-left {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex: 1;
    }
    .config input, .config select {
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
    }
    .config input {
      min-width: 250px;
    }
    .config select {
      min-width: 100px;
    }
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #FF6B6B;
      margin-right: 6px;
      animation: pulse 1s infinite;
    }
    .status-indicator.configured {
      background: var(--success);
      animation: none;
    }
    .config-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn {
      padding: 8px 14px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
      transition: all 0.3s;
    }
    .btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(212,160,32,0.5);
    }
    .btn:disabled { 
      opacity: 0.5; 
      cursor: not-allowed; 
    }
    .btn-secondary {
      background: rgba(212,160,32,0.2);
      color: var(--gold);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      padding: 12px;
      border-radius: 10px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14px;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      background: rgba(0,150,200,0.15);
      border: 1px solid rgba(0,150,200,0.3);
      align-self: flex-end;
      border-radius: 18px 6px 18px 18px;
      color: #5DADE2;
    }
    .msg.assistant {
      background: rgba(212,160,32,0.1);
      border: 1px solid rgba(212,160,32,0.3);
      align-self: flex-start;
      border-radius: 6px 18px 18px 18px;
      color: #E8D87A;
    }
    .msg.system {
      background: rgba(100,100,100,0.1);
      border: 1px solid rgba(100,100,100,0.3);
      align-self: center;
      color: #999;
      font-size: 12px;
      max-width: 100%;
    }
    .msg.error {
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.3);
      color: #FF6B6B;
    }
    .input-area {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }
    .input-area input {
      flex: 1;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }
    #pdfUpload { display: none; }
    .loader {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 1.4s infinite;
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="config">
    <div class="config-left">
      <span class="status-indicator" id="statusIndicator"></span>
      <input 
        id="apiKey" 
        type="password" 
        placeholder="Cole sua API Key do Claude"
        autocomplete="off"
      >
      <select id="provider">
        <option value="claude">Claude</option>
      </select>
      <select id="model">
        <option value="claude-opus-4.6">Opus</option>
        <option value="claude-sonnet-4.6">Sonnet</option>
        <option value="claude-haiku-4.5">Haiku</option>
      </select>
    </div>
    <div class="config-right">
      <button class="btn btn-secondary" onclick="document.getElementById('pdfUpload').click()">📄 PDF</button>
      <button class="btn" onclick="clearData()">🗑️ Limpar</button>
    </div>
    <input id="pdfUpload" type="file" accept=".pdf" onchange="uploadPDF(event)">
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input id="input" type="text" placeholder="Digite sua mensagem..." autocomplete="off">
    <button class="btn" onclick="send()" id="sendBtn">Enviar</button>
  </div>
</div>

<script>
const pdfjsLib = window.pdfjsWorker;
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

let db, conversationId = 'default', docs = [], isSending = false;

// ==================== STORAGE ====================
const saveToStorage = (key, value) => {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.warn('localStorage cheio');
  }
};

const loadFromStorage = (key) => {
  try {
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : null;
  } catch (e) {
    return null;
  }
};

// IndexedDB
const initDB = () => {
  return new Promise((resolve) => {
    const req = indexedDB.open('AlfredDB', 1);
    req.onupgradeneeded = (e) => {
      const dbs = e.target.result;
      if (!dbs.objectStoreNames.contains('memory')) dbs.createObjectStore('memory');
      if (!dbs.objectStoreNames.contains('documents')) dbs.createObjectStore('documents');
    };
    req.onsuccess = (e) => {
      db = e.target.result;
      resolve();
    };
  });
};

// ==================== UI ====================
const updateStatus = () => {
  const apiKey = document.getElementById('apiKey').value.trim();
  const indicator = document.getElementById('statusIndicator');
  
  if (apiKey.length > 20) {
    indicator.classList.add('configured');
  } else {
    indicator.classList.remove('configured');
  }
};

document.getElementById('apiKey').addEventListener('input', updateStatus);
document.getElementById('apiKey').addEventListener('blur', () => {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (apiKey.length > 20) {
    saveToStorage('apiKey', apiKey);
    saveToStorage('provider', document.getElementById('provider').value);
    saveToStorage('model', document.getElementById('model').value);
  }
});

document.getElementById('input').addEventListener('keypress', e => {
  if (e.key === 'Enter' && !e.shiftKey && !isSending) {
    send();
  }
});

// ==================== EMBEDDINGS ====================
const simpleEmbed = (text) => {
  const words = text.toLowerCase().split(/\s+/);
  const embed = {};
  words.forEach(w => {
    const clean = w.replace(/[^\w]/g, '');
    if (clean.length > 2) embed[clean] = (embed[clean] || 0) + 1;
  });
  const total = Object.values(embed).reduce((a,b) => a+b, 0);
  Object.keys(embed).forEach(k => embed[k] = embed[k] / total);
  return embed;
};

const similarity = (a, b) => {
  const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
  let dot = 0, n1 = 0, n2 = 0;
  keys.forEach(k => {
    const v1 = a[k] || 0, v2 = b[k] || 0;
    dot += v1 * v2; n1 += v1*v1; n2 += v2*v2;
  });
  return dot / (Math.sqrt(n1) * Math.sqrt(n2) || 1);
};

// ==================== RAG ====================
const searchDocs = (query, limit = 3) => {
  const qEmbed = simpleEmbed(query);
  const results = [];
  docs.forEach(doc => {
    doc.chunks.forEach((chunk, idx) => {
      const sim = similarity(qEmbed, doc.embeddings[idx]);
      if (sim > 0.1) results.push({ filename: doc.filename, text: chunk, sim });
    });
  });
  return results.sort((a,b) => b.sim - a.sim).slice(0, limit);
};

// ==================== MEMORIA ====================
const getContext = () => {
  const history = loadFromStorage('history') || [];
  const profile = loadFromStorage('profile') || {};
  const projects = loadFromStorage('projects') || {};
  return { history: history.slice(-15), profile, projects };
};

const saveHistory = (msg) => {
  const history = loadFromStorage('history') || [];
  history.push(msg);
  saveToStorage('history', history.slice(-100));
};

// ==================== MESSAGES ====================
const addMessage = (text, sender) => {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
};

// ==================== CHAT ====================
const send = async () => {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('sendBtn');

  // Validação
  if (!msg) {
    addMessage('❌ Digite uma mensagem!', 'error');
    return;
  }

  if (!apiKey || apiKey.length < 20) {
    addMessage('❌ API Key inválida! Deve ter pelo menos 20 caracteres. Cole uma nova do console.anthropic.com', 'error');
    return;
  }

  if (isSending) {
    return;
  }

  // Limpar input
  input.value = '';
  
  // Adicionar mensagem do usuário
  addMessage(msg, 'user');
  
  // Feedback visual
  isSending = true;
  btn.disabled = true;
  addMessage('⏳ Alfred pensando...', 'system');

  try {
    // Montar contexto
    const context = await getContext();
    const ragDocs = searchDocs(msg);
    const ragText = ragDocs
      .map((d,i) => `[PDF ${i+1}] ${d.text.substring(0, 200)}...`)
      .join('\n\n');

    const systemPrompt = `Você é Alfred, um assistente pessoal inteligente.

INSTRUÇÕES:
- Conversa natural, sem clichês
- NUNCA diga: "tenho conhecimento sobre", "baseado no que absorvi"
- Responda como uma pessoa inteligente
- Use PDFs quando disponíveis de forma natural
- Respostas concisas (máximo 3-4 parágrafos)

${ragText ? `📚 CONTEXTO DE PDFs:\n${ragText}\n` : ''}
${context.profile.name ? `👤 PERFIL:\n${JSON.stringify(context.profile)}\n` : ''}`;

    const messages = [
      ...context.history
        .filter(h => h.role && h.content)
        .map(h => ({ role: h.role, content: h.content })),
      { role: 'user', content: msg }
    ];

    console.log('📤 Enviando para Claude API...', {
      model: document.getElementById('model').value,
      messages_count: messages.length,
      has_api_key: apiKey.length > 0
    });

    // Chamar Claude API
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: document.getElementById('model').value,
        max_tokens: 1024,
        system: systemPrompt,
        messages: messages
      })
    });

    console.log('📥 Resposta recebida:', response.status, response.statusText);

    // Remover mensagem "pensando"
    const container = document.getElementById('messages');
    const lastMsg = container.lastChild;
    if (lastMsg && lastMsg.textContent.includes('pensando')) {
      lastMsg.remove();
    }

    // Processar resposta
    const data = await response.json();

    if (!response.ok) {
      const errorMsg = data.error?.message || JSON.stringify(data.error) || 'Erro desconhecido';
      console.error('❌ Erro da API:', errorMsg);
      addMessage(`❌ Erro: ${errorMsg}`, 'error');
      return;
    }

    if (!data.content || !data.content[0] || !data.content[0].text) {
      console.error('❌ Resposta inválida:', data);
      addMessage('❌ Resposta inválida da API', 'error');
      return;
    }

    // Sucesso!
    const reply = data.content[0].text;
    console.log('✅ Resposta recebida com sucesso');
    
    addMessage(reply, 'assistant');
    saveHistory({ role: 'user', content: msg });
    saveHistory({ role: 'assistant', content: reply });

  } catch (error) {
    console.error('❌ Erro de conexão:', error);
    
    // Remover mensagem "pensando"
    const container = document.getElementById('messages');
    const lastMsg = container.lastChild;
    if (lastMsg && lastMsg.textContent.includes('pensando')) {
      lastMsg.remove();
    }
    
    addMessage(`❌ Erro: ${error.message}. Verifique a API Key e conexão.`, 'error');
  } finally {
    isSending = false;
    btn.disabled = false;
    input.focus();
  }
};

// ==================== PDFs ====================
const uploadPDF = async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  addMessage(`📤 Absorvendo ${file.name}...`, 'system');

  try {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let fullText = '';

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const text = await page.getTextContent();
      fullText += text.items.map(t => t.str).join(' ') + '\n';
    }

    const words = fullText.split(/\s+/).filter(w => w.length > 0);
    const chunks = [];
    for (let i = 0; i < words.length; i += 800) {
      chunks.push(words.slice(i, i + 1000).join(' '));
    }

    const embeddings = chunks.map(c => simpleEmbed(c));
    const doc = { filename: file.name, chunks, embeddings };
    docs.push(doc);

    addMessage(`✅ ${file.name} absorvido! (${chunks.length} chunks)`, 'system');
  } catch (error) {
    addMessage(`❌ Erro ao processar PDF: ${error.message}`, 'error');
  }

  event.target.value = '';
};

const clearData = () => {
  if (confirm('Limpar tudo? (Histórico, PDFs, API Key)')) {
    localStorage.clear();
    docs = [];
    document.getElementById('apiKey').value = '';
    document.getElementById('input').value = '';
    document.getElementById('messages').innerHTML = '';
    addMessage('🗑️ Tudo limpado!', 'system');
    updateStatus();
  }
};

// ==================== INIT ====================
(async () => {
  console.log('🚀 Iniciando Alfred OS v9...');
  
  await initDB();
  console.log('✅ Database inicializado');
  
  // Recuperar dados salvos
  const savedApiKey = loadFromStorage('apiKey');
  const savedProvider = loadFromStorage('provider');
  const savedModel = loadFromStorage('model');
  
  if (savedApiKey) {
    document.getElementById('apiKey').value = savedApiKey;
    console.log('✅ API Key carregada');
  }
  if (savedProvider) {
    document.getElementById('provider').value = savedProvider;
  }
  if (savedModel) {
    document.getElementById('model').value = savedModel;
  }
  
  updateStatus();
  
  addMessage('👋 Bem-vindo ao Alfred OS v9!', 'system');
  addMessage('Cole sua API Key do Claude em console.anthropic.com para começar.', 'system');
  
  console.log('✅ Alfred pronto!');
})();
</script>

</body>
</html>
