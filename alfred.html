<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Alfred OS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #D4A020;
      --text: #EDE8D8;
      --muted: rgba(237,232,216,0.4);
      --bg: #06040A;
      --bg2: #0D090F;
      --bg3: #140F18;
      --border: rgba(244,197,66,0.15);
      --red: #FF3A4A;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    
    #root {
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }
    
    /* HEADER */
    .header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,4,10,0.8);
      flex-shrink: 0;
    }
    
    .header-title {
      font-size: 12px;
      letter-spacing: 3px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 8px;
    }
    
    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    
    .tabs::-webkit-scrollbar { display: none; }
    
    .tab-btn {
      padding: 6px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    
    .tab-btn.active {
      background: rgba(244,197,66,0.1);
      color: var(--gold);
      border-color: rgba(244,197,66,0.3);
    }
    
    /* CONTENT */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: none;
    }
    
    .content.active {
      display: flex;
      flex-direction: column;
    }
    
    /* CHAT */
    .messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .msg {
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 90%;
      word-wrap: break-word;
    }
    
    .msg.user {
      background: rgba(0,208,255,0.1);
      border: 1px solid rgba(0,208,255,0.2);
      align-self: flex-end;
      border-radius: 16px 4px 16px 16px;
    }
    
    .msg.alfred {
      background: rgba(212,160,32,0.08);
      border: 1px solid rgba(212,160,32,0.2);
      align-self: flex-start;
      border-radius: 4px 16px 16px 16px;
      color: #E8D87A;
    }
    
    .input-row {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    
    .input-row input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      color: var(--text);
      font-size: 13px;
    }
    
    .input-row input:focus {
      outline: none;
      border-color: var(--gold);
    }
    
    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: var(--gold);
      color: #000;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
    }
    
    .btn:active {
      opacity: 0.8;
    }
    
    /* KNOWLEDGE */
    .kb-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .kb-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
    }
    
    .kb-title {
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 6px;
    }
    
    .kb-content {
      color: var(--muted);
    }
    
    /* PDF UPLOAD */
    .upload-zone {
      background: rgba(244,197,66,0.05);
      border: 2px dashed rgba(244,197,66,0.3);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    
    .upload-zone:hover {
      background: rgba(244,197,66,0.08);
      border-color: rgba(244,197,66,0.5);
    }
    
    .upload-zone input {
      display: none;
    }
    
    .upload-label {
      font-size: 12px;
      color: var(--gold);
      font-weight: 700;
      cursor: pointer;
    }
    
    .pdf-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .pdf-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    
    .pdf-name {
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .pdf-delete {
      background: rgba(255,58,92,0.2);
      border: none;
      color: var(--red);
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
    }
    
    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px;
    }
  </style>
</head>
<body>

<div id="root">
  <div class="header">
    <div class="header-title">ALFRED OS</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('chat')">💬 CHAT</button>
      <button class="tab-btn" onclick="switchTab('knowledge')">📚 CONHECIMENTO</button>
      <button class="tab-btn" onclick="switchTab('pdfs')">📄 PDFs</button>
    </div>
  </div>
  
  <!-- CHAT TAB -->
  <div id="chat" class="content active">
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <input type="text" id="input" placeholder="Converse com Alfred..." onkeypress="handleKeyPress(event)">
      <button class="btn" onclick="sendMessage()">Enviar</button>
    </div>
  </div>
  
  <!-- KNOWLEDGE TAB -->
  <div id="knowledge" class="content">
    <div style="font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5;">
      Base de conhecimento absorvida de PDFs, apego e relacionamento.
    </div>
    <div class="kb-list" id="kb-list"></div>
  </div>
  
  <!-- PDFS TAB -->
  <div id="pdfs" class="content">
    <div class="upload-zone" onclick="document.getElementById('pdf-upload').click()">
      <div class="upload-label">📤 Clique para adicionar PDF</div>
      <input type="file" id="pdf-upload" multiple accept=".pdf" onchange="handlePDFUpload(event)">
    </div>
    <div id="pdf-list" class="pdf-list"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

// ======================== STORAGE ========================
const db = new Promise((resolve) => {
  const req = indexedDB.open('AlfredDB', 1);
  req.onupgradeneeded = () => {
    const store = req.result.createObjectStore('data');
  };
  req.onsuccess = () => resolve(req.result);
});

async function save(key, value) {
  const database = await db;
  const tx = database.transaction('data', 'readwrite');
  tx.objectStore('data').put(value, key);
}

async function load(key) {
  const database = await db;
  const tx = database.transaction('data', 'readonly');
  return new Promise((resolve) => {
    const req = tx.objectStore('data').get(key);
    req.onsuccess = () => resolve(req.result);
  });
}

// ======================== STATE ========================
let knowledge = { pdfs: [], chat: [] };
let currentTab = 'chat';

(async () => {
  knowledge = (await load('knowledge')) || { pdfs: [], chat: [] };
  renderKnowledge();
  renderPDFList();
})();

// ======================== TABS ========================
function switchTab(tab) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  currentTab = tab;
}

// ======================== CHAT ========================
function handleKeyPress(e) {
  if (e.key === 'Enter') sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;
  
  input.value = '';
  addMessage(msg, 'user');
  
  // Simular resposta de Alfred usando conhecimento
  const response = await generateResponse(msg);
  setTimeout(() => addMessage(response, 'alfred'), 400);
}

function addMessage(text, sender) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function generateResponse(userMsg) {
  // Análise simples baseada em conhecimento armazenado
  const lower = userMsg.toLowerCase();
  
  if (lower.includes('apego') || lower.includes('relacionamento')) {
    return 'Entendo. Você está explorando dinâmicas de apego. Tenho conhecimento sobre apego ansioso, evitativo e seguro. O que gostaria de saber?';
  }
  
  if (lower.includes('pdf') || lower.includes('arquivo')) {
    return `Você tem ${knowledge.pdfs.length} PDF(s) armazenado(s). Posso usar esse conteúdo para ajudar. Qual sua pergunta?`;
  }
  
  if (knowledge.pdfs.length > 0) {
    return `Baseado no que absorvi dos PDFs e conhecimento armazenado: posso ajudar você a entender melhor esses conteúdos. Qual é sua dúvida específica?`;
  }
  
  return 'Sou Alfred, seu assistente. Adicione PDFs em "📄 PDFs" para que eu absorva conteúdo novo. Como posso ajudar?';
}

// ======================== KNOWLEDGE ========================
function renderKnowledge() {
  const container = document.getElementById('kb-list');
  container.innerHTML = '';
  
  // Knowledge padrão
  const defaultKB = [
    {
      title: '🧠 APEGO ANSIOSO',
      content: 'Precisa de reasseguração. Sensível a afastamento. Funciona melhor com certeza emocional e comunicação clara.'
    },
    {
      title: '🛡️ APEGO EVITATIVO',
      content: 'Fecha com pressão. Abre com leveza e espaço. Melhor comunicação: humor, gestos pequenos, sem demandas.'
    },
    {
      title: '💚 APEGO SEGURO',
      content: 'Equilibrado. Comunica bem, recebe bem. Pode lidar com conflito construtivamente.'
    }
  ];
  
  // Adicionar conhecimento dos PDFs
  knowledge.pdfs.forEach(pdf => {
    defaultKB.push({
      title: `📄 ${pdf.name}`,
      content: `${pdf.content.substring(0, 200)}...`
    });
  });
  
  defaultKB.forEach(item => {
    const div = document.createElement('div');
    div.className = 'kb-item';
    div.innerHTML = `<div class="kb-title">${item.title}</div><div class="kb-content">${item.content}</div>`;
    container.appendChild(div);
  });
}

// ======================== PDF HANDLING ========================
async function handlePDFUpload(event) {
  const files = event.target.files;
  
  for (let file of files) {
    if (file.type !== 'application/pdf') {
      alert('Apenas PDFs são permitidos');
      continue;
    }
    
    try {
      addLoadingMessage(`Absorvendo ${file.name}...`);
      const text = await extractPDFText(file);
      
      knowledge.pdfs.push({
        name: file.name,
        content: text,
        size: file.size,
        date: new Date().toLocaleString('pt-BR')
      });
      
      await save('knowledge', knowledge);
      renderPDFList();
      renderKnowledge();
      removeLoadingMessage();
    } catch (err) {
      alert(`Erro ao processar ${file.name}: ${err.message}`);
    }
  }
  
  event.target.value = '';
}

async function extractPDFText(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = '';
  
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n';
  }
  
  return text;
}

function renderPDFList() {
  const container = document.getElementById('pdf-list');
  container.innerHTML = '';
  
  if (knowledge.pdfs.length === 0) {
    container.innerHTML = '<div style="text-align: center; color: var(--muted); font-size: 12px; padding: 20px;">Nenhum PDF adicionado ainda</div>';
    return;
  }
  
  knowledge.pdfs.forEach((pdf, idx) => {
    const div = document.createElement('div');
    div.className = 'pdf-item';
    div.innerHTML = `
      <div class="pdf-name">📄 ${pdf.name}</div>
      <button class="pdf-delete" onclick="deletePDF(${idx})">Remover</button>
    `;
    container.appendChild(div);
  });
}

function deletePDF(idx) {
  knowledge.pdfs.splice(idx, 1);
  save('knowledge', knowledge);
  renderPDFList();
  renderKnowledge();
}

function addLoadingMessage(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loading-msg';
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeLoadingMessage() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}
</script>

</body>
</html>
