<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DETRAN Quest</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0a12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DETRAN Quest">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d11;--c1:#15151d;--c2:#1c1c27;--c3:#232330;
  --brd:#2c2c3e;--brd2:#3a3a52;
  --pu:#7c6ef5;--pu2:#9d93f7;--pu3:#5a4fd4;
  --gn:#1fa876;--gn2:#4ecda4;
  --rd:#e5484d;--rd2:#f09595;
  --am:#f5a623;--bl:#4a9eff;
  --tx:#eeeef5;--mu:#8888a0;--wh:#fff;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden;}
.hide{display:none!important;}
button{font-family:inherit;}

/* ═══ LOGIN ═══ */
#login-screen{position:fixed;inset:0;background:radial-gradient(circle at 50% 0%,#1a1228 0%,#0d0d11 60%);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
.login-box{background:var(--c1);border:1px solid var(--brd2);border-radius:24px;padding:2.5rem 2rem;max-width:380px;width:100%;text-align:center;box-shadow:0 30px 80px rgba(124,110,245,.2);}
.login-logo{font-size:52px;margin-bottom:8px;}
.login-title{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;background:linear-gradient(90deg,var(--pu2),var(--gn2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{font-size:12px;color:var(--mu);margin-bottom:1.75rem;}
.login-field{margin-bottom:14px;text-align:left;}
.login-label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--c2);border:1.5px solid var(--brd);border-radius:12px;padding:13px 14px;font-size:14px;color:var(--tx);font-family:inherit;}
.login-input:focus{outline:none;border-color:var(--pu);}
.login-check-row{display:flex;align-items:center;gap:8px;margin:14px 0;text-align:left;}
.login-check-row input{width:16px;height:16px;accent-color:var(--pu);}
.login-check-row label{font-size:12px;color:var(--mu);}
.login-btn{width:100%;background:var(--pu);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;}
.login-btn:active{transform:scale(.98);}
.login-error{color:var(--rd2);font-size:12px;margin-top:10px;display:none;}
.login-error.show{display:block;}
.login-foot{font-size:11px;color:var(--mu);margin-top:1.5rem;}

/* ═══ TELA DE CONTINUAÇÃO ═══ */
.continue-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;}
.continue-icon{font-size:56px;margin-bottom:14px;}
.continue-title{font-size:22px;font-weight:800;margin-bottom:4px;}
.continue-sub{font-size:13px;color:var(--mu);margin-bottom:1.5rem;}
.continue-card{background:var(--c1);border:1px solid var(--brd);border-radius:18px;padding:1.25rem 1.5rem;width:100%;max-width:340px;margin-bottom:1.75rem;}
.continue-row{display:flex;align-items:center;gap:10px;font-size:14px;padding:7px 0;border-bottom:1px solid var(--brd);}
.continue-row:last-child{border-bottom:none;}

/* ═══ MINI HUD ═══ */
#mini-hud{position:sticky;top:0;background:rgba(13,13,17,.92);backdrop-filter:blur(8px);padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:80;border-bottom:1px solid var(--brd);}
.mh-pill{background:#1a1500;border:1px solid var(--am);color:var(--am);font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px;}
#mh-power-wrap{flex:1;display:flex;align-items:center;gap:6px;}
.mh-power-label{font-size:13px;}
.mh-power-track{flex:1;height:7px;background:var(--brd);border-radius:99px;overflow:hidden;}
.mh-power-fill{height:100%;border-radius:99px;transition:width .5s ease;background:linear-gradient(90deg,var(--rd),var(--am));}
#mh-lives{font-size:13px;}

/* ═══ GAME AREA / FLOW ═══ */
#game-area{max-width:560px;margin:0 auto;padding:1.5rem 1.25rem 3rem;min-height:60vh;}
.flow-card{background:var(--c1);border:1px solid var(--brd);border-radius:20px;padding:1.5rem 1.35rem;animation:cardIn .3s ease;}
@keyframes cardIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.flow-tag{font-size:11px;font-weight:700;color:var(--pu2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.flow-icon{font-size:38px;margin-bottom:10px;}
.flow-title{font-size:18px;font-weight:800;margin-bottom:10px;line-height:1.3;}
.flow-title-sm{font-size:15px;font-weight:700;line-height:1.5;margin-bottom:1rem;}
.flow-body{font-size:14px;color:var(--mu);line-height:1.7;margin-bottom:12px;}
.flow-body b{color:var(--tx);}
.flow-rule{background:var(--c2);border-left:3px solid var(--pu);padding:11px 14px;border-radius:0 10px 10px 0;font-size:13px;font-weight:600;color:var(--wh);line-height:1.6;margin-bottom:1.25rem;}

.play-btn{width:100%;background:var(--pu);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;transition:background .15s,transform .1s;}
.play-btn:active{transform:scale(.98);background:var(--pu3);}
.play-btn-sm{width:100%;background:var(--pu);color:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}

.opt-flow{display:block;width:100%;text-align:left;background:var(--c2);border:1.5px solid var(--brd);border-radius:13px;padding:14px 16px;font-size:14px;color:var(--tx);cursor:pointer;margin-bottom:9px;transition:all .12s;line-height:1.4;}
.opt-flow:active:not([disabled]){transform:scale(.98);}
.opt-flow:hover:not([disabled]){border-color:var(--pu);}
.opt-flow.ok{background:#0a1f15;border-color:var(--gn);color:var(--gn2);font-weight:700;}
.opt-flow.ko{background:#1f0a0a;border-color:var(--rd);color:var(--rd2);}
.opt-flow[disabled]{cursor:default;}

.flow-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.q-badge-flow{font-size:10px;font-weight:800;padding:4px 11px;border-radius:99px;}
.b-lei{background:#1a1535;color:var(--pu2);}
.b-def{background:#0a1f15;color:var(--gn2);}
.b-soc{background:#1f0a0a;color:var(--rd2);}
.b-pla{background:#1f1400;color:var(--am);}
.b-mec{background:#0a1220;color:var(--bl);}
.b-amb{background:#0a1f0e;color:#7ec97e;}
.b-cid{background:#1f0a2a;color:#e0a3ff;}
.b-ped{background:#2a1505;color:#ffb86b;}
.b-cic{background:#05202a;color:#6bd3ff;}
.b-emerg{background:#2a0808;color:#ff6b6b;}
.b-doc{background:#1a1a22;color:#c0c0d0;}
.timer-flow{font-size:13px;font-weight:800;color:var(--am);}
.t-bar-wrap{height:5px;background:var(--brd);border-radius:99px;overflow:hidden;margin-bottom:14px;}
.t-bar{height:100%;border-radius:99px;transition:width .9s linear,background .3s;}

.fb-flow{border-radius:14px;padding:1.1rem 1.25rem;margin-top:10px;}
.fb-ok{background:#0a1f15;border:1px solid var(--gn);}
.fb-ko{background:#1f0a0a;border:1px solid var(--rd);}
.fb-title-flow{font-size:14px;font-weight:800;margin-bottom:6px;}
.fb-ok .fb-title-flow{color:var(--gn2);}
.fb-ko .fb-title-flow{color:var(--rd2);}
.fb-why-flow{font-size:13px;color:var(--tx);line-height:1.6;margin-bottom:8px;}
.fb-rule-flow{background:rgba(255,255,255,.05);border-radius:8px;padding:8px 11px;font-size:11px;color:var(--mu);margin-bottom:8px;}
.flow-actions{margin-top:6px;}
.retry-flow{text-align:center;background:transparent;border:1px solid var(--brd2);}

/* ═══ CHALLENGE / MICRO ═══ */
.challenge-flow{text-align:center;}

/* ═══ BOSS ═══ */
.boss-intro{text-align:center;padding:3rem 1.5rem;position:relative;}
.boss-intro-flash{position:absolute;inset:0;background:radial-gradient(circle,rgba(229,72,77,.15),transparent 70%);animation:flashPulse 1.5s ease-in-out infinite;}
@keyframes flashPulse{0%,100%{opacity:.4}50%{opacity:1}}
.boss-intro-icon{font-size:60px;margin-bottom:10px;position:relative;}
.boss-intro-title{font-size:22px;font-weight:900;letter-spacing:.04em;color:var(--rd2);margin-bottom:8px;position:relative;}
.boss-intro-sub{font-size:13px;color:var(--mu);margin-bottom:1.5rem;position:relative;}
.boss-btn{background:var(--rd);position:relative;}
.boss-bars{margin-bottom:1rem;}
.boss-bar-row{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mu);margin-bottom:6px;}
.boss-track{flex:1;height:9px;background:var(--brd);border-radius:99px;overflow:hidden;}
.boss-fill{height:100%;transition:width .4s;}
.boss-fill.player{background:var(--gn);}
.boss-fill.enemy{background:var(--rd);}

/* ═══ SIM ═══ */
.sim-flow-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sim-tag{font-size:12px;font-weight:800;color:var(--pu2);}
.sim-result-flow{text-align:center;}
.sim-score-big{font-size:60px;font-weight:900;margin:10px 0;}
.sim-verdict-flow{font-size:14px;color:var(--mu);margin-bottom:1.25rem;}
.miss-card-flow{background:var(--c1);border:1px solid var(--brd);border-radius:12px;padding:11px 14px;margin-bottom:7px;}
.miss-q-flow{font-size:12px;font-weight:600;margin-bottom:4px;}
.miss-right-flow{font-size:11px;color:var(--gn2);}

/* ═══ FLOATING BUTTONS ═══ */
.gear-fab{position:fixed;top:14px;right:14px;background:var(--c2);border:1px solid var(--brd2);color:var(--tx);font-size:18px;border-radius:99px;width:40px;height:40px;cursor:pointer;z-index:90;display:flex;align-items:center;justify-content:center;}
.sensei-fab{position:fixed;bottom:20px;right:16px;background:var(--pu);color:#fff;border:none;border-radius:99px;width:54px;height:54px;font-size:22px;cursor:pointer;z-index:90;box-shadow:0 6px 20px rgba(124,110,245,.5);display:flex;align-items:center;justify-content:center;}
.update-banner-flow{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--c2);border:1px solid var(--pu);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,.5);font-size:13px;max-width:92vw;flex-wrap:wrap;justify-content:center;}
.update-banner-flow button{background:var(--pu);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;}
.update-banner-flow button:last-of-type{background:transparent;color:var(--tx2);}
.install-app-fab{position:fixed;bottom:20px;left:16px;background:var(--c2);border:1px solid var(--brd2);color:var(--tx);font-size:12.5px;font-weight:600;border-radius:99px;padding:10px 16px;cursor:pointer;z-index:90;display:flex;align-items:center;gap:6px;}
.offline-banner-flow{position:fixed;top:0;left:0;right:0;background:#e5484d;color:#fff;text-align:center;font-size:12px;padding:6px;z-index:300;}

/* ═══ XP FLOAT / TOASTS ═══ */
.xpf-flow{position:fixed;top:60px;left:50%;transform:translateX(-50%);font-size:17px;font-weight:800;color:var(--pu2);pointer-events:none;z-index:400;animation:fupF 1s ease forwards;}
@keyframes fupF{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-55px)}}
.st-toast-flow{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--c1);border:1px solid var(--brd2);color:var(--tx);font-size:12px;font-weight:600;padding:9px 18px;border-radius:99px;z-index:300;animation:toastF 2.2s ease forwards;max-width:90%;text-align:center;}
@keyframes toastF{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
.combo-toast-flow{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--pu3),var(--pu));color:#fff;padding:11px 22px;border-radius:16px;font-size:13px;text-align:center;z-index:310;animation:comboPopF .4s ease,comboFadeF .4s ease 1.8s forwards;box-shadow:0 10px 30px rgba(124,110,245,.5);}
@keyframes comboPopF{0%{opacity:0;transform:translateX(-50%) scale(.7)}60%{transform:translateX(-50%) scale(1.08)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes comboFadeF{0%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.seqbreak-toast{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:#1f0a0a;border:1px solid var(--rd);color:var(--rd2);font-size:12px;font-weight:700;padding:9px 18px;border-radius:14px;z-index:310;animation:toastF 2.4s ease forwards;}
.ach-toast-flow{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--c1);border:1px solid var(--am);border-radius:14px;padding:11px 16px;display:flex;align-items:center;gap:10px;z-index:300;animation:achInF .4s ease,achOutF .4s ease 2.8s forwards;font-size:12px;}
@keyframes achInF{0%{opacity:0;transform:translateX(-50%) translateY(15px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes achOutF{0%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(15px)}}

/* ═══ POPUP ═══ */
.overlay-flow{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:250;padding:1rem;}
.pop-flow-box{background:var(--c1);border:1px solid var(--brd2);border-radius:22px;padding:1.85rem 1.5rem;text-align:center;max-width:340px;width:100%;max-height:85vh;overflow-y:auto;}
.pop-flow-icon{font-size:50px;margin-bottom:10px;}
.pop-flow-title{font-size:18px;font-weight:800;margin-bottom:6px;}
.pop-flow-sub{font-size:13px;color:var(--mu);margin-bottom:1.4rem;line-height:1.55;}
.pop-flow-sub b{color:var(--tx);}
.pop-flow-btn{width:100%;background:var(--pu);color:#fff;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px;}
.pop-flow-btn2{width:100%;background:transparent;color:var(--mu);border:1px solid var(--brd);border-radius:13px;padding:12px;font-size:13px;cursor:pointer;}

/* ═══ SENSEI MODAL ═══ */
.sensei-modal{background:var(--c1);border:1px solid var(--brd2);border-radius:22px 22px 0 0;padding:1.5rem 1.25rem 2rem;max-width:560px;width:100%;max-height:75vh;overflow-y:auto;}
.sensei-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.sensei-title{font-size:16px;font-weight:800;}
.sensei-ctx{font-size:11px;color:var(--mu);}
.sensei-close{background:transparent;border:none;color:var(--mu);font-size:22px;cursor:pointer;}
.sensei-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sensei-opt-btn{background:var(--c2);border:1px solid var(--brd);border-radius:12px;padding:12px 8px;font-size:12px;font-weight:700;color:var(--tx);cursor:pointer;text-align:center;}
.sensei-opt-btn:hover{border-color:var(--pu);}
.sensei-msg{background:#1a1530;border:1px solid var(--pu3);border-radius:13px;padding:14px;margin-top:10px;font-size:13px;line-height:1.6;}
.sensei-mini-q{font-size:13px;font-weight:700;margin-bottom:10px;}

/* ═══ PANEL (⚙️) ═══ */
.panel-modal{background:var(--c1);border:1px solid var(--brd2);border-radius:22px 22px 0 0;padding:1.5rem 1.25rem 2rem;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.panel-head-title{font-size:17px;font-weight:800;}
.panel-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;}
.panel-tab{background:var(--c2);border:1px solid var(--brd);color:var(--mu);font-size:12px;font-weight:700;padding:8px 14px;border-radius:10px;cursor:pointer;white-space:nowrap;}
.panel-tab.active{background:#1a1535;border-color:var(--pu);color:var(--pu2);}
.panel-title-row{font-size:15px;font-weight:800;text-align:center;margin-bottom:12px;color:var(--am);}
.panel-progress-line{background:var(--c2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--tx);text-align:center;margin-bottom:14px;}
.panel-power-card{background:var(--c2);border-radius:14px;padding:1rem;text-align:center;margin-bottom:14px;}
.panel-power-label{font-size:11px;color:var(--mu);margin-bottom:4px;}
.panel-power-num{font-size:30px;font-weight:800;color:var(--am);}
.panel-power-track{height:8px;background:var(--brd);border-radius:99px;overflow:hidden;margin-top:8px;}
.panel-power-fill{height:100%;background:linear-gradient(90deg,var(--rd),var(--am),var(--gn));border-radius:99px;}
.panel-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.panel-stat{background:var(--c2);border-radius:10px;padding:10px 6px;text-align:center;}
.panel-stat b{display:block;font-size:16px;}
.panel-stat span{font-size:9px;color:var(--mu);}
.panel-section-title{font-size:11px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;}
.panel-topic-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;border-bottom:1px solid var(--brd);}
.panel-lv{color:var(--pu2);font-weight:700;}
.panel-pct{color:var(--mu);font-size:11px;}
.panel-gate-card{background:var(--c2);border-radius:12px;padding:12px;font-size:13px;}
.panel-map-topic{background:var(--c2);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;}
.panel-map-head{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:6px;}
.panel-concept-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;}
.panel-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.panel-macete-card{background:var(--c2);border:1px solid var(--brd);border-radius:12px;padding:12px;text-align:center;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.panel-macete-card.locked{opacity:.4;}
.panel-action-btn{width:100%;background:var(--c2);border:1px solid var(--brd);color:var(--tx);border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:center;}
.panel-action-btn.danger{color:var(--rd2);border-color:#4a2020;}
.panel-ach-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;}

/* ═══ RESPONSIVO DESKTOP ═══ */
/* ═══ FASE B: NOVO MOTOR DE APRENDIZADO — sem leitura passiva ═══ */
.learn-flow{text-align:left;}
.micro-info-flow{text-align:center;}
.micro-info-text{font-size:17px;font-weight:700;line-height:1.5;margin:1.5rem 0 1.75rem;}

.memory-card-flow{text-align:center;cursor:pointer;background:linear-gradient(135deg,var(--c1),#1a1530);border:1.5px solid var(--pu3);}
.memory-card-text{font-size:18px;font-weight:800;line-height:1.5;margin:1.25rem 0;color:var(--pu2);}
.memory-card-hint{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;}

.complete-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt-complete{text-align:center;font-weight:700;}

.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.5rem;}
.tf-btn{text-align:center;font-weight:700;padding:16px;}

.assoc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:.5rem;}
.assoc-col{display:flex;flex-direction:column;gap:8px;}
.assoc-btn{font-size:13px;padding:12px 10px;text-align:center;}
.assoc-btn.selected{border-color:var(--pu);background:#1a1535;}
.assoc-btn.ok{background:#0a1f15;border-color:var(--gn);color:var(--gn2);}
.assoc-btn.ko{background:#1f0a0a;border-color:var(--rd);}

.compact-reteach-flow{text-align:center;background:#1a1530;border-color:var(--pu3);}
.compact-reteach-line{font-size:15px;font-weight:700;color:var(--wh);margin:1rem 0;line-height:1.5;}

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🎮</div>
    <div class="login-title">DETRAN QUEST</div>
    <div class="login-sub">Entre para continuar sua evolução</div>
    <div class="login-field">
      <label class="login-label">E-mail</label>
      <input type="email" class="login-input" id="login-email" placeholder="seu@email.com" autocomplete="username">
    </div>
    <div class="login-field">
      <label class="login-label">Senha</label>
      <input type="password" class="login-input" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-check-row">
      <input type="checkbox" id="keep-connected" checked>
      <label for="keep-connected">Manter conectado neste dispositivo</label>

    <button class="login-btn" onclick="doLogin(document.getElementById('keep-connected').checked)">Entrar e Jogar</button>

    <div class="login-foot">Tudo salvo neste navegador. Nada é enviado a servidores.</div>
  </div>
</div>

<!-- ═══ APP ROOT (preenchido dinamicamente) ═══ -->
<div id="app-root" class="hide"></div>

<!-- ═══ POPUP GENÉRICO ═══ -->
<div class="overlay-flow hide" id="pop-flow">
  <div class="pop-flow-box">
    <div class="pop-flow-icon" id="pi-flow"></div>
    <div class="pop-flow-title" id="pt-flow"></div>
    <div class="pop-flow-sub" id="ps-flow"></div>
    <button class="pop-flow-btn" id="pb1-flow"></button>
    <button class="pop-flow-btn2 hide" id="pb2-flow"></button>
  </div>
</div>

<!-- ═══ SENSEI MODAL ═══ -->
<div class="overlay-flow hide" id="sensei-overlay" style="align-items:flex-end">

    <div class="sensei-head">
      <div>
        <div class="sensei-title">🤖 Sensei da CNH</div>
        <div class="sensei-ctx" id="sensei-context"></div>
      </div>

  </div>
</div>

  </div>
</div>

// nunca duplica ID, sempre mantém os 24 originais intocados.

function injectExpansionConcepts(){
  const allNew=[...EXPANSION_CONCEPTS, ...EXPANSION_NEW_TOPICS];
  const existingIds=new Set(CONCEPTS.map(c=>c.id));
  let injected=0, skipped=0;
  allNew.forEach(c=>{
    if(existingIds.has(c.id)){
      skipped++; // proteção: nunca duplica ou sobrescreve
      console.error('AVISO: ID de conceito duplicado ignorado na expansão:', c.id);
      return;
    }
    CONCEPTS.push(c);
    existingIds.add(c.id);
    injected++;
  });
  return {injected, skipped, totalAfter:CONCEPTS.length};
}

// baixa por um tempo enquanto o banco de conteúdo está sendo expandido em lotes.
// targetConcepts foi recalibrado para escala de "centenas": soma = 172.
// ───────────────────────────────────────────────
const EXAM_MATRIX = {
  lei:      {name:'Legislação',           weight:0.28, targetConcepts:42},
  def:      {name:'Direção Defensiva',    weight:0.22, targetConcepts:32},

// ───────────────────────────────────────────────
// AUDITORIA TÉCNICA — visão completa para desenvolvimento
// (não é o que o jogador vê; é a ferramenta interna de qualidade)
// ───────────────────────────────────────────────
function runCoverageAudit(){
  const byTopic={};
  Object.keys(EXAM_MATRIX).forEach(t=>{ byTopic[t]={existing:0,withLearningSteps:0,withQuestions:0,withMacete:0,withExample:0}; });

  CONCEPTS.forEach(c=>{
    const t=c.topic;
    if(!byTopic[t]) return; // tópico desconhecido (não deveria ocorrer)
    byTopic[t].existing++;
    if(c.learningSteps && c.learningSteps.length>0) byTopic[t].withLearningSteps++;
    if(c.questions && c.questions.length>0) byTopic[t].withQuestions++;
    const extras=CONCEPT_EXTRAS[c.id];
    if(extras && extras.macete) byTopic[t].withMacete++;
    if(extras && (extras.exemploExtra || extras.analogiaCurta)) byTopic[t].withExample++;
  });

  const topicReports=Object.entries(EXAM_MATRIX).map(([topic,info])=>{
    const stats=byTopic[topic];
    const coveragePct = info.targetConcepts>0
      ? Math.min(100, Math.round((stats.existing/info.targetConcepts)*100))
      : 0;
    return {
      topic, name:info.name, weight:info.weight,
      targetConcepts:info.targetConcepts, existingConcepts:stats.existing,
      missingConcepts: Math.max(0, info.targetConcepts-stats.existing),
      withLearningSteps:stats.withLearningSteps, withQuestions:stats.withQuestions,
      withMacete:stats.withMacete, withExample:stats.withExample,
      coveragePct,
    };
  });

  // Cobertura total = média ponderada pelo peso de cada matéria na prova real
  const totalCoverage = Math.round(
    topicReports.reduce((sum,r)=>sum+r.coveragePct*r.weight,0)
  );

  // Questões existentes no banco
  const totalQuestions = CONCEPTS.reduce((sum,c)=>sum+(c.questions?c.questions.length:0),0);

  // Conceitos sem revisão programada nunca (nenhum aluno passou por eles ainda é normal;
  // aqui validamos se o MECANISMO de revisão está disponível, não se já foi usado)
  const conceptsWithoutReview = CONCEPTS.filter(c=>!c.learningSteps || c.learningSteps.length===0).map(c=>c.id);
  const conceptsWithoutMacete = CONCEPTS.filter(c=>!CONCEPT_EXTRAS[c.id] || !CONCEPT_EXTRAS[c.id].macete).map(c=>c.id);

  // Lista de tarefas automática — o que falta construir para chegar a 100%
  const todoList=[];
  topicReports.forEach(r=>{
    if(r.missingConcepts>0){
      todoList.push(`Criar ${r.missingConcepts} conceito${r.missingConcepts>1?'s':''} de ${r.name}`);
    }
  });
  if(conceptsWithoutMacete.length>0){
    todoList.push(`Adicionar macete para ${conceptsWithoutMacete.length} conceito(s): ${conceptsWithoutMacete.join(', ')}`);
  }

  return {
    generatedAt:Date.now(),
    totalCoverage,
    totalConcepts:CONCEPTS.length,
    totalQuestions,
    topicReports,
    conceptsWithoutReview,
    conceptsWithoutMacete,
    todoList,
    readyForRealExam: totalCoverage>=100,
  };
}

// ───────────────────────────────────────────────
// VISÃO DO JOGADOR — nunca mostra "incompleto", só o progresso pessoal
// dentro do conteúdo que JÁ existe no jogo (não a matriz oficial).
// ───────────────────────────────────────────────
function getPlayerProgressSummary(g){
  const totalConcepts=CONCEPTS.length;
  const studiedConcepts=Object.values(g.conceptState).filter(s=>s.practiced).length;
  const dominatedConcepts=Object.values(g.concepts).filter(c=>c.status==='dominado').length;
  const pctOfAvailable = totalConcepts>0 ? Math.round((studiedConcepts/totalConcepts)*100) : 0;
  return {
    studiedConcepts, totalConcepts, dominatedConcepts,
    pctOfAvailableContent: pctOfAvailable,
    label: `Você concluiu ${pctOfAvailable}% do conteúdo disponível.`,
  };
}

// RELATÓRIO TÉCNICO FORMATADO (texto simples, estilo print do documento)
// ───────────────────────────────────────────────
function formatCoverageReport(){
  const audit=runCoverageAudit();
  const lines=[];
  lines.push('──────────────────────────');
  lines.push('AUDITORIA DO DETRAN QUEST (TÉCNICA)');
  lines.push('');
  audit.topicReports.forEach(r=>{
    lines.push(`${r.name.padEnd(24,'.')}${r.coveragePct}%  (${r.existingConcepts}/${r.targetConcepts} conceitos)`);
  });
  lines.push('');
  lines.push(`Cobertura Total..........${audit.totalCoverage}%`);
  lines.push(`Conceitos.................${audit.totalConcepts}`);
  lines.push(`Questões..................${audit.totalQuestions}`);
  lines.push(`Conceitos sem learningSteps: ${audit.conceptsWithoutReview.length}`);
  lines.push(`Conceitos sem macete......${audit.conceptsWithoutMacete.length}`);
  lines.push(`Pronto p/ Simulado Real...${audit.readyForRealExam?'SIM':'NÃO'}`);

    lines.push('');
    lines.push('Próximas prioridades:');

  }
  return lines.join('\n');
}

// Hash simples (não é criptografia forte, é só para não guardar a senha em texto puro no localStorage)
function simpleHash(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash=((hash<<5)-hash)+str.charCodeAt(i);
    hash|=0;
  }
  return 'h'+Math.abs(hash).toString(36);
}

// ───────────────────────────────────────────────
// VALIDAÇÃO ANTI-CORRUPÇÃO
// ───────────────────────────────────────────────
function isValidSave(s){
  if(!s || typeof s!=='object') return false;
  if(typeof s.xp!=='number' || s.xp<0) return false;
  if(typeof s.level!=='number' || s.level<1) return false;
  if(!s.concepts || typeof s.concepts!=='object') return false;
  if(!Array.isArray(s.cardsUnlocked)) return false;
  if(!Array.isArray(s.achievementsUnlocked)) return false;
  if(!Array.isArray(s.errorBank)) return false;
  if(typeof s.totalQ!=='number' || s.totalQ<0) return false;
  return true;
}

// ───────────────────────────────────────────────
// DEEP MERGE — nunca perde campo do save antigo; só adiciona o que falta
// ───────────────────────────────────────────────
function deepMerge(target,source,forced){
  forced=forced||{};
  const output=Object.assign({},target);
  for(const key in source){
    const sv=source[key];
    if(sv && typeof sv==='object' && !Array.isArray(sv)){
      output[key]=deepMerge(output[key]||{},sv);
    } else {
      output[key]=sv;
    }
  }
  return Object.assign({},output,forced);
}

// Normaliza um save antigo (de qualquer versão) para o formato atual,
// SEM jamais descartar progresso — só completa campos que não existiam.
function normalizeSaveData(oldSave,email){
  const fresh=freshState();
  const merged=deepMerge(fresh,oldSave||{},{
    currentUserEmail:email,
    saveSchemaVersion:SAVE_SCHEMA_VERSION,
    lastUpdatedAt:Date.now(),
  });
  // Garantir que conceitos NOVOS (adicionados em versões futuras) entrem como "nunca visto",
  // e conceitos EXISTENTES preservem histórico completo (acertos, erros, status, revisão).
  CONCEPTS.forEach(c=>{
    if(!merged.concepts[c.id]) merged.concepts[c.id]=fresh.concepts[c.id];
    if(!merged.conceptState[c.id]){
      const old=merged.concepts[c.id];
      merged.conceptState[c.id] = (old && old.attempts>0)
        ? {seenTeach:true,passedRecall:true,practiced:true,attempts:old.attempts,correct:old.correct,eligibleForSim:true}
        : fresh.conceptState[c.id];
    }
  });
  merged.cardsUnlocked=merged.cardsUnlocked||[];
  merged.errorBank=merged.errorBank||[];
  merged.achievementsUnlocked=merged.achievementsUnlocked||[];
  merged.bossesDefeated=merged.bossesDefeated||[];
  merged.sessionHistory=merged.sessionHistory||[];
  merged.studyTimeByTopic=merged.studyTimeByTopic||Object.fromEntries(ALL_TOPICS.map(t=>[t,0]));
  return merged;
}

function saveGame(){
  try{
    G.lastSaveAt=Date.now();
    G.saveSchemaVersion=SAVE_SCHEMA_VERSION;
    const key=getStableSaveKey(CURRENT_USER_EMAIL);
    const json=JSON.stringify(G);
    const prevCurrent=localStorage.getItem(key);
    if(prevCurrent){
      const prevBackup=localStorage.getItem(getBackupKey(CURRENT_USER_EMAIL));
      if(prevBackup) localStorage.setItem(getEmergencyKey(CURRENT_USER_EMAIL),prevBackup);
      localStorage.setItem(getBackupKey(CURRENT_USER_EMAIL),prevCurrent);
    }
    localStorage.setItem(key,json);
    return true;
  }catch(e){
    console.error('save failed',e);
    return false;
  }
}

// ───────────────────────────────────────────────
// BUSCA DE SAVE LEGADO — procura em todas as chaves antigas conhecidas
// ───────────────────────────────────────────────
function findLegacySave(email){
  const keys=legacyKeysFor(email);
  for(const key of keys){
    try{
      const raw=localStorage.getItem(key);
      if(!raw) continue;
      const parsed=JSON.parse(raw);
      if(isValidSave(parsed)) return {key,data:parsed};
    }catch(e){ continue; }
  }
  return null;
}

// ───────────────────────────────────────────────
// MIGRAÇÃO — chave estável tem prioridade; senão procura legado; senão cria novo
// ───────────────────────────────────────────────
function migrateSaveIfNeeded(email){
  const stableKey=getStableSaveKey(email);
  const existingStable=localStorage.getItem(stableKey);
  if(existingStable){
    try{
      const parsed=JSON.parse(existingStable);
      if(isValidSave(parsed)) return {data:parsed,migrated:false};
    }catch(e){ /* cai pro fallback de backup abaixo */ }
  }
  // Save principal ausente ou corrompido: tentar backup/emergencial estáveis primeiro
  for(const k of [getBackupKey(email),getEmergencyKey(email)]){
    try{
      const raw=localStorage.getItem(k);
      if(raw){
        const parsed=JSON.parse(raw);
        if(isValidSave(parsed)){
          showToast('🔧 Recuperamos seu progresso com sucesso.');
          return {data:parsed,migrated:false};
        }
      }
    }catch(e){ continue; }
  }
  // Procurar saves de versões anteriores deste jogo
  const legacy=findLegacySave(email);
  if(legacy){
    try{ localStorage.setItem(stableKey+'_beforeMigration_'+Date.now(), JSON.stringify(legacy.data)); }catch(e){}
    const migrated=normalizeSaveData(legacy.data,email);
    try{
      localStorage.setItem(stableKey,JSON.stringify(migrated));
      localStorage.setItem(getBackupKey(email),JSON.stringify(migrated));
    }catch(e){}
    console.log('Save antigo migrado de:',legacy.key);
    return {data:migrated,migrated:true,fromKey:legacy.key};
  }
  return {data:null,migrated:false,isNew:true};
}

// ───────────────────────────────────────────────
// LOAD — usa migração estável; nunca cria save novo se já existe progresso
// ───────────────────────────────────────────────
function loadGame(){
  const result=migrateSaveIfNeeded(CURRENT_USER_EMAIL);
  if(result.isNew || !result.data) return false;

  // ANTI-PERDA: se a versão do código mudou desde o último save, criar um backup
  // explícito ANTES de qualquer normalização tocar nos dados. Se algo der errado
  // nesta versão nova, esse snapshot intocado permite reverter manualmente.
  if(result.data.gameVersionAtSave && result.data.gameVersionAtSave!==GAME_VERSION){
    try{
      const preUpdateKey=getStableSaveKey(CURRENT_USER_EMAIL)+'_preUpdate_'+result.data.gameVersionAtSave.replace(/\./g,'_');
      if(!localStorage.getItem(preUpdateKey)){
        localStorage.setItem(preUpdateKey, JSON.stringify(result.data));
      }
    }catch(e){ console.error('pre-update backup failed',e); }
  }

  // CORRIGIDO (bug crítico de tela preta): este passo fazia um Object.assign RASO que
  // sobrescrevia G.concepts/G.conceptState inteiros pela referência do save antigo —
  // qualquer conceito adicionado em versão mais nova ficava ausente do dicionário, e o
  // primeiro acesso direto (ex: getNextConceptId) quebrava com TypeError, deixando
  // #game-area vazio para sempre. Agora reusa o MESMO merge profundo (deepMerge) que a
  // migração de saves antigos já usava corretamente — uma única implementação de merge,
  // sem duplicar lógica que pode divergir e voltar a quebrar.
  G = normalizeSaveData(result.data, CURRENT_USER_EMAIL);
  ensureConceptIntegrity(); // rede de segurança extra: nunca deixa um id sem entrada

  G.gameVersionAtSave=GAME_VERSION;
  if(result.migrated){
    setTimeout(()=>showToast('✅ Progresso da versão anterior recuperado!'),900);
  }
  saveGame(); // garante que a chave estável sempre reflita o estado mais atual já normalizado
  return true;
}

// ───────────────────────────────────────────────
// REDE DE SEGURANÇA — garante que TODO conceito atual tenha entrada em
// G.concepts e G.conceptState, não importa o que aconteceu no merge do save.
// Idempotente e barata: pode ser chamada quantas vezes for preciso, em
// qualquer ponto, sem custo nem efeito colateral se já estiver tudo ok.
// ───────────────────────────────────────────────
function ensureConceptIntegrity(){
  if(!G) return false;
  const fresh=freshState();
  let repaired=0;
  if(!G.concepts) G.concepts={};
  if(!G.conceptState) G.conceptState={};
  CONCEPTS.forEach(c=>{
    if(!G.concepts[c.id]){ G.concepts[c.id]=fresh.concepts[c.id]; repaired++; }
    if(!G.conceptState[c.id]){ G.conceptState[c.id]=fresh.conceptState[c.id]; repaired++; }
  });
  if(repaired>0) console.warn('ensureConceptIntegrity: reparou', repaired, 'entradas ausentes');
  return repaired>0;
}

function resetGame(){
  const key=getStableSaveKey(CURRENT_USER_EMAIL);
  localStorage.removeItem(key);
  localStorage.removeItem(getBackupKey(CURRENT_USER_EMAIL));
  localStorage.removeItem(getEmergencyKey(CURRENT_USER_EMAIL));
  G=freshState();
  saveGame();
}

// EXPORT / IMPORT — backup manual em arquivo .detranquest

function exportSave(){
  const data=JSON.stringify(G,null,0);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='meu_progresso.detranquest';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importSaveFromFile(file,onDone){
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!isValidSave(parsed)){
        onDone(false,'Arquivo inválido ou corrompido.');
        return;
      }
      const normalized=normalizeSaveData(parsed,CURRENT_USER_EMAIL);
      const fresh=freshState();
      G=Object.assign(fresh,normalized);
      G.concepts=Object.assign(fresh.concepts,normalized.concepts||{});
      G.conceptState=Object.assign({},fresh.conceptState,normalized.conceptState||{});
      saveGame();
      onDone(true,'Progresso restaurado com sucesso!');
    }catch(err){
      onDone(false,'Não foi possível ler esse arquivo.');
    }
  };
  reader.readAsText(file);
}

// ───────────────────────────────────────────────
// LOGIN — manual + automático (persistente neste dispositivo)
// ───────────────────────────────────────────────
function doLogin(keepConnected){
  const emailEl=document.getElementById('login-email');
  const passEl=document.getElementById('login-pass');
  const email=emailEl.value.trim().toLowerCase();
  const pass=passEl.value;
  const err=document.getElementById('login-error');

  const user=USERS[email];
  if(user && pass===user.pass){
    err.classList.remove('show');
    CURRENT_USER_EMAIL=email;
    if(keepConnected){
      try{
        localStorage.setItem(AUTH_KEY, simpleHash(email+'|'+pass));
        localStorage.setItem(AUTH_USER_KEY, email);
      }catch(e){}
    }
    enterGame();
  } else {
    err.classList.add('show');
  }
}

function tryAutoLogin(){
  try{
    const token=localStorage.getItem(AUTH_KEY);
    if(!token) return false;
    let savedEmail=localStorage.getItem(AUTH_USER_KEY);
    // Compatibilidade: sessões salvas ANTES de existir múltiplas contas não têm
    // AUTH_USER_KEY gravado. Nesse caso, descobre por tentativa qual usuário
    // cadastrado bate com o token salvo (registro é pequeno, custo irrelevante),
    // sem isso ninguém que já estava logado precisaria logar de novo à toa.
    if(!savedEmail){
      savedEmail=Object.keys(USERS).find(e=>token===simpleHash(e+'|'+USERS[e].pass));
    }
    const user=savedEmail?USERS[savedEmail]:null;
    if(user && token===simpleHash(savedEmail+'|'+user.pass)){
      CURRENT_USER_EMAIL=savedEmail;
      try{ localStorage.setItem(AUTH_USER_KEY,savedEmail); }catch(e){} // grava pra próxima vez já vir direto
      enterGame();
      return true;
    }
  }catch(e){}
  return false;
}

// ───────────────────────────────────────────────
// PONTO ÚNICO DE ENTRADA — antes não existia nenhuma chamada real de boot
// (tryAutoLogin() estava definida mas nunca era chamada por nada: por isso
// sessão salva não pulava o login sozinha). Agora isso roda assim que o
// script carrega, e qualquer erro em QUALQUER ponto da inicialização cai
// na tela de recuperação em vez de deixar a tela preta/vazia.
// ───────────────────────────────────────────────
function initGame(){
  const loggedInAutomatically=tryAutoLogin();
  if(!loggedInAutomatically){
    // Sem sessão ativa: a tela de login já é a tela padrão visível do HTML estático,
    // então não precisa fazer nada — ela já está lá. Só garantimos que app-root,
    // caso por algum motivo já estivesse visível, volte a ficar escondido.
    const appRoot=document.getElementById('app-root');
    if(appRoot) appRoot.classList.add('hide');
  }
}

function logout(keepProgress){
  try{ localStorage.removeItem(AUTH_KEY); localStorage.removeItem(AUTH_USER_KEY); }catch(e){}
  if(!keepProgress){
    resetGame();
  }
  CURRENT_USER_EMAIL=null;
  location.reload();
}

function enterGame(){
  try{
    G=freshState(); // sempre começa limpo: se loadGame() não achar save, G fica com os defaults corretos, nunca com sobra de uma sessão anterior
    const hadSave=loadGame();
    document.getElementById('login-screen').classList.add('hide');
    document.getElementById('app-root').classList.remove('hide');
    startAutosave();
    startStudyTimeTicker();
    checkDailyReset();
    checkReturnReminder();
    if(hadSave && G.totalQ>0){
      renderContinueScreen();
    } else {
      buildAppShell();
      nextStep();
    }
  }catch(e){
    console.error('enterGame falhou:',e);
    showRecoveryScreen(e);
  }
}

// 1) Tentar recuperar progresso: repara integridade do estado em memória e tenta
// recarregar do save estável de novo, sem nunca apagar nada.
function recoveryTryRestore(){
  try{
    if(typeof G!=='undefined' && G) ensureConceptIntegrity();
    loadGame();
    ensureConceptIntegrity();
    if(!G.curConceptId || !getConceptById(G.curConceptId)){
      G.curConceptId=getNextConceptId(); // estado atual inválido → redireciona pro próximo conceito válido
    }
    buildAppShell();
    nextStep();
  }catch(e){
    console.error('recoveryTryRestore falhou:',e);
    showRecoveryScreen(e);
  }
}

// 2) Continuar do último backup: usa a chave de backup explicitamente, em vez da
// chave estável principal (que pode ser a que está com problema).
function recoveryContinueFromBackup(){
  try{
    const backupRaw=localStorage.getItem(getBackupKey(CURRENT_USER_EMAIL));
    if(!backupRaw){
      showToast('Nenhum backup encontrado neste dispositivo.');
      return;
    }
    const parsed=JSON.parse(backupRaw);
    if(!isValidSave(parsed)){
      showToast('O backup também está corrompido.');
      return;
    }
    G=normalizeSaveData(parsed,CURRENT_USER_EMAIL);
    ensureConceptIntegrity();
    G.gameVersionAtSave=GAME_VERSION;
    saveGame();
    document.getElementById('login-screen').classList.add('hide');
    document.getElementById('app-root').classList.remove('hide');
    showToast('🔧 Backup restaurado.');
    buildAppShell();
    nextStep();
  }catch(e){
    console.error('recoveryContinueFromBackup falhou:',e);
    showRecoveryScreen(e);
  }
}

// 3) Reiniciar apenas a tela atual: NÃO toca em nenhum dado salvo, só tenta
// re-renderizar do zero. Útil quando o problema foi um erro de render passageiro.
function recoveryRestartScreenOnly(){
  try{
    if(typeof G==='undefined' || !G) G=freshState();
    ensureConceptIntegrity();
    buildAppShell();
    nextStep();
  }catch(e){
    console.error('recoveryRestartScreenOnly falhou:',e);
    showRecoveryScreen(e);
  }
}

// AUTOSAVE — a cada 20s + em eventos chave (chamado manualmente nos pontos certos também)

function startAutosave(){
  if(_autosaveInt) clearInterval(_autosaveInt);
  _autosaveInt=setInterval(saveGame,20000);
  window.addEventListener('visibilitychange',()=>{ if(document.hidden) saveGame(); });
  window.addEventListener('beforeunload',saveGame);
  window.addEventListener('offline',saveGame);
}

function startStudyTimeTicker(){
  if(_tickInt) clearInterval(_tickInt);
  G.lastTickTime=Date.now();
  _tickInt=setInterval(()=>{
    const now=Date.now();
    const delta=now-G.lastTickTime;
    G.lastTickTime=now;
    if(delta<5000){ // só conta se a aba estava ativa (evita contar tempo com PC dormindo)
      G.studyTimeMs+=delta;
      const concept=G.curConceptId?getConceptById(G.curConceptId):null;
      if(concept) G.studyTimeByTopic[concept.topic]=(G.studyTimeByTopic[concept.topic]||0)+delta;
    }
  },1000);
}

// DAILY RESET
// ───────────────────────────────────────────────
function checkDailyReset(){
  const today=new Date().toDateString();
  if(G.lastPlayDate!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    if(G.lastPlayDate===yesterday) G.streakDays=(G.streakDays||0)+1;
    else if(G.lastPlayDate!==null) G.streakDays=1;
    else G.streakDays=1;
    G.lastPlayDate=today;
    G.simsToday=0;
    saveGame();
  }
}

function checkReturnReminder(){
  if(!G.lastPlayDate) return;
  const last=new Date(G.lastPlayDate);
  const diffDays=Math.floor((Date.now()-last.getTime())/86400000);
  if(diffDays>=2){
    setTimeout(()=>{
      popup('👋',`Faz ${diffDays} dias que você não estuda`,
        'Vamos revisar rapidinho antes de continuar — isso evita esquecer o que você já tinha aprendido.',
        'Vamos revisar',()=>startForcedReview(),null,null);
    },600);
  }
}


// ═══════════════════════════════════════════════════════════════
// ALGORITMO ADAPTATIVO (validado na versão anterior, mantido)
// ═══════════════════════════════════════════════════════════════
function conceptMastery(c){
  if(c.attempts===0) return 0;
  const accRate=c.correct/c.attempts;
  let speedBonus=0;
  if(c.avgTime>0){
    if(c.avgTime<=4) speedBonus=10;
    else if(c.avgTime<=10) speedBonus=5;
    else if(c.avgTime>=25) speedBonus=-10;
  }
  return Math.max(0,Math.min(100,Math.round(accRate*100)+speedBonus));
}

function conceptStatus(c){
  if(c.attempts===0) return 'novo';
  const m=conceptMastery(c);
  const formatsOk=(c.correctFormats||[]).length>=2;
  const attemptsOk=c.correct>=3;
  const reviewOk=c.reviewStage>=1;
  if(m>=80 && formatsOk && attemptsOk && reviewOk) return 'dominado';
  if(m>=60) return 'quase'; // "Revisando" — quase dominado, em consolidação
  if(m>=45 && c.attempts>=2) return 'praticando'; // já passou da 1ª exposição, está treinando de fato
  if(m>=30) return 'aprendendo'; // 1ª exposição / ainda formando a base
  if(c.attempts>=2 && m<30) return 'critico';
  return 'esquecido';
}

function statusLabel(status){
  return {novo:'Nunca visto',aprendendo:'Aprendendo',praticando:'Praticando',quase:'Revisando',dominado:'Dominado',esquecido:'Esquecendo',critico:'Crítico'}[status]||status;
}

function topicMastery(g,topic){
  const ids=CONCEPTS.filter(c=>c.topic===topic).map(c=>c.id);
  if(ids.length===0) return 0;
  let sum=0,n=0;
  ids.forEach(id=>{ const c=g.concepts[id]; if(c && c.attempts>0){sum+=conceptMastery(c);n++;} });
  return n>0?Math.round(sum/n):0;
}

// Nível por matéria (1-5), baseado no mastery médio
function topicLevel(g,topic){
  const m=topicMastery(g,topic);
  if(m>=90) return 5;
  if(m>=75) return 4;
  if(m>=55) return 3;
  if(m>=30) return 2;
  if(m>0) return 1;
  return 0;
}

// "Poder de Aprovação" — sobe só com aprendizado real, nunca com tempo parado
function computeApproval(g){
  const topics=ALL_TOPICS;
  let weighted=0;
  topics.forEach(t=>{weighted+=topicMastery(g,t)*TWEIGHT[t];});
  let simBonus=0;
  if(g.totalSims>0){
    const simPct=Math.round((g.bestSimScore/30)*100);
    simBonus=Math.min(15,(simPct-50)*0.3);
  }
  const errPenalty=Math.min(10,g.errorBank.length*1.5);
  const dominatedCount=Object.values(g.concepts).filter(c=>c.status==='dominado').length;
  const domBonus=Math.min(8,dominatedCount*0.4);
  return Math.max(3,Math.min(99,Math.round(weighted+simBonus-errPenalty+domBonus)));
}

function getTitle(g){
  const approval=computeApproval(g);
  const dominados=Object.values(g.concepts).filter(c=>c.status==='dominado').length;
  if(approval>=90) return 'Pronto para a Prova';
  if(topicLevel(g,'def')>=4) return 'Mestre da Direção Defensiva';
  if(topicLevel(g,'pla')>=4) return 'Especialista em Placas';
  if(dominados>=8) return 'Condutor em Treinamento';
  if(g.totalQ>=10) return 'Aprendiz do CTB';
  return 'Novato da CNH';
}

function getWeakestConcept(g){
  let worst=null,worstScore=101;
  Object.entries(g.concepts).forEach(([id,c])=>{
    if(c.attempts>=1){ const m=conceptMastery(c); if(m<worstScore){worstScore=m;worst=id;} }
  });
  return worst;
}
function getWeakestTopic(g){
  const topics=ALL_TOPICS;
  let worst=null,worstScore=101;
  topics.forEach(t=>{
    const m=topicMastery(g,t);
    const attempted=CONCEPTS.filter(c=>c.topic===t).some(c=>g.concepts[c.id].attempts>0);
    if(attempted && m<worstScore){worstScore=m;worst=t;}
  });
  return worst;
}
function getTop3Weak(g){
  return Object.entries(g.concepts)
    .filter(([id,c])=>c.attempts>0)
    .sort((a,b)=>conceptMastery(a[1])-conceptMastery(b[1]))
    .slice(0,3)
    .map(([id])=>id);
}

function getConceptById(id){ return CONCEPTS.find(c=>c.id===id); }

// ═══════════════════════════════════════════════════════════════
// ELEGIBILIDADE PARA SIMULADO — nunca cobrar o que não foi estudado
// ═══════════════════════════════════════════════════════════════
function isConceptEligibleForSim(conceptId){
  const s=G.conceptState[conceptId];
  return !!(s && s.seenTeach===true && s.passedRecall===true && s.practiced===true && s.attempts>=1);
}

function markSeenTeach(conceptId){
  const s=G.conceptState[conceptId];
  if(s) s.seenTeach=true;
}
function markPassedRecall(conceptId){
  const s=G.conceptState[conceptId];
  if(s) s.passedRecall=true;
}
function markPracticed(conceptId,ok){
  const s=G.conceptState[conceptId];
  if(!s)return;
  s.practiced=true;
  s.attempts++;
  if(ok)s.correct++;
  s.eligibleForSim=isConceptEligibleForSim(conceptId);
}

function getEligibleConcepts(){
  return CONCEPTS.filter(c=>isConceptEligibleForSim(c.id));
}

function shuffleArr(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pickRandomQuestion(concept){
  const idx=Math.floor(Math.random()*concept.questions.length);
  return {q:concept.questions[idx],idx};
}

// Monta o simulado SOMENTE com conceitos elegíveis. Nunca usa banco fixo (SQ).
// Retorna null se não houver pelo menos 10 conceitos elegíveis (não dá nem para um parcial decente).
function buildSimQuestions(maxQuestions){
  maxQuestions=maxQuestions||30;
  const eligible=getEligibleConcepts();
  if(eligible.length<10) return null;

  // 1 questão por conceito elegível, variação de texto sempre amarrada ao índice real da questão
  let questions=eligible.map(concept=>{
    const {q,idx}=pickRandomQuestion(concept);
    return {
      q: pickQuestionVariation(concept.id,q,idx) || q.txt,
      o: q.opts, c: q.c,
      conceptId: concept.id, topic: concept.topic,
      why:q.why, rule:q.rule,
    };
  });
  questions=shuffleArr(questions);
  return questions.slice(0,Math.min(maxQuestions,questions.length));
}

// Gate do Simulado Real — agora também exige conteúdo suficiente estudado
function simuladoRealUnlocked(g){
  const approval=computeApproval(g);
  const topics=ALL_TOPICS;
  const noWeak=topics.every(t=>{
    const attempted=CONCEPTS.filter(c=>c.topic===t).some(c=>g.concepts[c.id].attempts>0);
    return !attempted || topicMastery(g,t)>=60;
  });
  const errorsHandled=g.errorBank.length===0;
  const eligibleCount=CONCEPTS.filter(c=>isConceptEligibleForSim(c.id)).length;
  const noTopicZeroed=topics.every(t=>{
    const topicConcepts=CONCEPTS.filter(c=>c.topic===t);
    const topicEligible=topicConcepts.filter(c=>isConceptEligibleForSim(c.id));
    return topicEligible.length>0; // nenhuma matéria essencial totalmente zerada
  });
  const hasPracticeCycle=g.totalQ>=15 && g.totalSims>=1;

  // REGRA MÁXIMA: domínio do aluno NÃO basta isoladamente. O jogo também precisa
  // ter cobertura real do conteúdo oficial da prova (ExamCoverageValidator).
  const audit=runCoverageAudit();
  const gameContentReady = audit.totalCoverage>=100;

  return {
    unlocked: approval>=85 && noWeak && errorsHandled && hasPracticeCycle && noTopicZeroed && gameContentReady,
    approval, noWeak, errorsHandled, hasPracticeCycle,
    noTopicZeroed, eligibleCount, totalConcepts:CONCEPTS.length,
    gameContentReady, gameCoveragePct:audit.totalCoverage,
  };
}

const REVIEW_INTERVALS=[3,7,15,30]; // intervalos por CONTAGEM de questões (dentro da mesma sessão)
const REVIEW_DAY_INTERVALS=[null,null,1,3,7]; // a partir do estágio 2, também exige intervalo de DIAS (long-term)
function scheduleReview(conceptId,wasCorrect){
  const c=G.concepts[conceptId];
  c.reviewStage = wasCorrect ? Math.min(REVIEW_INTERVALS.length-1,c.reviewStage+1) : 0;
  c.dueAtQuestionCount=G.totalQ+REVIEW_INTERVALS[c.reviewStage];
  const dayInterval=REVIEW_DAY_INTERVALS[c.reviewStage];
  c.dueAtTimestamp = dayInterval ? Date.now()+dayInterval*86400000 : -1;
  c.lastSeen=Date.now();
}
// Verdadeiro só quando o gatilho por QUESTÕES já passou E (se houver gatilho por DIAS) ele também já passou.
// Isso implementa "não repetir imediatamente porque sim — repetir porque o algoritmo detectou esquecimento real".
function isReviewDue(c,qCount){
  if(c.dueAtQuestionCount<0 || c.dueAtQuestionCount>qCount) return false;
  if(c.dueAtTimestamp && c.dueAtTimestamp>0 && Date.now()<c.dueAtTimestamp) return false;
  return true;
}

// FILA ADAPTATIVA — decide automaticamente, aluno nunca escolhe
function getNextConceptId(){
  ensureConceptIntegrity(); // segunda camada de proteção: barato e idempotente, nunca deixa isso quebrar de novo
  const qCount=G.totalQ;
  // 1) Revisão espaçada de verdade (esquecimento detectado, nunca repetição "porque sim")
  const dueReview=Object.entries(G.concepts).find(([id,c])=>isReviewDue(c,qCount) && c.status!=='dominado');
  if(dueReview) return dueReview[0];
  // 2) Conteúdo NUNCA visto — sempre prioridade sobre repetir o que já foi dominado
  const nextNew=CONCEPTS.find(c=>G.concepts[c.id].attempts===0);
  if(nextNew) return nextNew.id;
  // 3) Conceitos críticos (dominio baixo, mas ainda não desistiu deles)
  const critical=Object.entries(G.concepts).find(([id,c])=>c.attempts>0 && c.status!=='dominado' && conceptMastery(c)<40 && c.timesWrong<6);
  if(critical) return critical[0];
  // 4) Esquecendo (dominado no passado, mas a revisão de longo prazo já venceu o prazo)
  const forgetting=Object.entries(G.concepts).find(([id,c])=>c.status==='dominado' && isReviewDue(c,qCount));
  if(forgetting) return forgetting[0];
  // 5) Mais fraco entre os ainda não dominados (nunca volta pro que já está dominado sem motivo)
  const weakestNotDominated=Object.entries(G.concepts)
    .filter(([id,c])=>c.attempts>0 && c.status!=='dominado')
    .sort((a,b)=>conceptMastery(a[1])-conceptMastery(b[1]))[0];
  if(weakestNotDominated) return weakestNotDominated[0];
  // 6) Só sobra conteúdo 100% dominado: aí sim repete o mais fraco, de fato sem alternativa
  const weakest=getWeakestConcept(G);
  if(weakest) return weakest;
  return CONCEPTS[0].id;
}

function pickQuestionVariation(conceptId,baseQ,qIdx){
  const extras=CONCEPT_EXTRAS[conceptId];
  if(!extras||!extras.variations||extras.variations.length===0) return baseQ.txt;
  // Variações agora são objetos {text, forQIdx} — só usamos as que pertencem à questão atual (mesmas alternativas).
  // Suporte legado: se vier string pura (formato antigo), só aplica quando a questão é a primeira (qIdx===0),
  // pra nunca acoplar uma variação à pergunta errada.
  const candidates=extras.variations.filter(v=>{
    if(typeof v==='string') return qIdx===0;
    return v.forQIdx===qIdx;
  });
  if(candidates.length===0) return baseQ.txt;
  const key=conceptId+'_'+qIdx;
  const last=_variationIdx[key];
  let idx=Math.floor(Math.random()*candidates.length);
  if(candidates.length>1 && idx===last) idx=(idx+1)%candidates.length;
  _variationIdx[key]=idx;
  const chosen=candidates[idx];
  return typeof chosen==='string'?chosen:chosen.text;
}

// Quantos conceitos faltam até o próximo chefão (a cada 10 conceitos tentados de um tópico-base)
function progressToNextMilestone(g){
  const dominated=Object.values(g.concepts).filter(c=>c.status==='dominado').length;
  const totalConcepts=CONCEPTS.length;
  const nextCardIn = (()=>{
    const close=Object.entries(g.concepts).filter(([id,c])=>c.attempts>0 && conceptStatus(c)==='quase');
    return close.length;
  })();
  return {dominated, totalConcepts, nextCardIn};
}

// PLANO DE 6 HORAS — blocos automáticos, adaptados ao desempenho
// ═══════════════════════════════════════════════════════════════
const STUDY_BLOCKS=[
  {id:1,name:'Infrações e CNH',topics:['lei'],minMs:30*60000},
  {id:2,name:'Direção Defensiva',topics:['def'],minMs:30*60000},
  {id:3,name:'Placas',topics:['pla'],minMs:30*60000},
  {id:4,name:'Primeiros Socorros',topics:['soc'],minMs:30*60000},
  {id:5,name:'Mecânica',topics:['mec'],minMs:30*60000},
  {id:6,name:'Simulado Diagnóstico',type:'sim',minMs:30*60000},
  {id:7,name:'Revisão de Erros',type:'review',minMs:60*60000},
  {id:8,name:'Sprint dos Pontos Fracos',type:'sprint',minMs:60*60000},
  {id:9,name:'Simulado Real',type:'finalsim',minMs:60*60000},
];

function getCurrentBlock(g){
  // Avança bloco automaticamente baseado em progresso real, não tempo bruto
  if(g.totalSims===0 && g.studyTimeMs < 150*60000) {
    // ainda nos blocos 1-5 (conteúdo) até ter feito 1 simulado
    const topicsCovered=['lei','def','pla','soc','mec'].filter(t=>topicMastery(g,t)>=50);
    return STUDY_BLOCKS[Math.min(4,topicsCovered.length)];
  }
  if(g.totalSims===1) return STUDY_BLOCKS[6]; // revisão
  if(g.totalSims>=2 && !simuladoRealUnlocked(g).unlocked) return STUDY_BLOCKS[7]; // sprint
  return STUDY_BLOCKS[8]; // simulado real
}

function formatStudyTime(ms){
  const totalMin=Math.floor(ms/60000);
  const h=Math.floor(totalMin/60);
  const m=totalMin%60;
  if(h>0) return h+'h'+(m>0?m+'min':'');
  return m+'min';
}

// Próxima ação recomendada (substitui qualquer "escolha" do aluno)
function getNextAction(g){
  const simStatus=simuladoRealUnlocked(g);
  if(simStatus.unlocked) return {action:'simulado_real',label:'Simulado Real disponível!'};
  if(g.errorBank.length>=5) return {action:'revisar',label:'Revisar erros acumulados'};
  const due=Object.values(g.concepts).some(c=>isReviewDue(c,g.totalQ) && c.status!=='dominado');
  if(due) return {action:'revisar_espacado',label:'Revisão programada'};
  return {action:'continuar',label:'Continuar estudando'};
}


// ═══════════════════════════════════════════════════════════════
// FASE B — MOTOR DE APRENDIZADO SEM LEITURA PASSIVA
// Substitui "explicação → Entendi → questão" por uma sequência de
// steps interativos. O aluno nunca avança sem alguma ação cognitiva.
// ═══════════════════════════════════════════════════════════════

// Tipos de step suportados:
// micro_info      — 1-2 frases curtas, exige clique mas é cronometrado (anti-preguiça)
// discovery       — pergunta de previsão ANTES da regra ser revelada
// memory_card     — cartão curto reforçando 1 fato, com toque obrigatório
// complete        — completar frase com múltipla escolha curta
// true_false      — julgar verdadeiro ou falso
// association     — associar pares (nível → pontos, etc)
// practice_question — a questão prática oficial (já existente em concept.questions)

const MIN_STEP_TIME_MS=1000; // abaixo disso, o clique é tratado como "rápido demais"

let _stepQueue=[];
let _stepIdx=0;
let _stepStartTime=0;
let _learningConceptId=null;
let _stepProgress={}; // por conceito: quais tipos de step já foram cumpridos nesta passada

function startLearningFlow(conceptId){
  const concept=getConceptById(conceptId);
  if(!concept){ nextStep(); return; }
  _learningConceptId=conceptId;
  _stepProgress[conceptId]={discovery:false,microTest:false,practiced:false};

  const steps=concept.learningSteps && concept.learningSteps.length>0
    ? concept.learningSteps
    : buildFallbackSteps(concept); // segurança: conceitos sem learningSteps ainda funcionam

  _stepQueue=steps;
  _stepIdx=0;
  renderLearningStep();
}

// Para conceitos que ainda não foram convertidos manualmente (não deve acontecer
// nos 24 atuais depois da Fase C, mas é uma rede de segurança permanente).
function buildFallbackSteps(concept){
  const extras=CONCEPT_EXTRAS[concept.id]||{};
  return [
    {type:'micro_info', text:concept.teach.title},
    {type:'discovery',
      question:extras.miniPergunta?extras.miniPergunta.txt:concept.teach.title,
      options:extras.miniPergunta?extras.miniPergunta.opts:['Sim','Não','Talvez','Depende'],
      correct:extras.miniPergunta?extras.miniPergunta.c:0,
      feedback:'Vamos ver a regra completa.'},
    {type:'memory_card', text:concept.teach.rule},
    {type:'practice_question'},
  ];
}

function renderLearningStep(){
  if(_stepIdx>=_stepQueue.length){
    finishLearningFlow();
    return;
  }
  const step=_stepQueue[_stepIdx];
  _stepStartTime=Date.now();

  switch(step.type){
    case 'micro_info': renderMicroInfo(step); break;
    case 'discovery': renderDiscovery(step); break;
    case 'memory_card': renderMemoryCard(step); break;
    case 'complete': renderComplete(step); break;
    case 'true_false': renderTrueFalse(step); break;
    case 'association': renderAssociation(step); break;
    case 'practice_question': renderLearningPracticeQuestion(step); break;
    default: advanceLearningStep(); // tipo desconhecido — não trava o aluno
  }
}

function advanceLearningStep(){
  _stepIdx++;
  renderLearningStep();
}

// Verifica se o aluno passou tempo mínimo de processamento na tela atual.
// Se não passou, NÃO avança — força uma pergunta de confirmação rápida.
function checkNotTooFast(onPass){
  const elapsed=Date.now()-_stepStartTime;
  if(elapsed<MIN_STEP_TIME_MS){
    renderTooFastCheck(onPass);
    return false;
  }
  onPass();
  return true;
}

function renderTooFastCheck(onPass){
  const concept=getConceptById(_learningConceptId);
  const extras=CONCEPT_EXTRAS[concept.id];
  const mq=extras&&extras.miniPergunta?extras.miniPergunta:{txt:concept.teach.rule,opts:['Sim','Não','Não sei','Talvez'],c:0};
  document.getElementById('game-area').innerHTML=`
<div class="flow-card learn-flow">
  <div class="flow-tag">⚡ Vamos confirmar rapidinho</div>
  <div class="flow-title-sm">${mq.txt}</div>
  <div id="opts">${mq.opts.map((o,i)=>`<button class="opt-flow" onclick="answerTooFastCheck(${i},${mq.c})">${o}</button>`).join('')}</div>
</div>`;
  window._tooFastOnPass=onPass;
}
function answerTooFastCheck(pos,correct){
  const ok=pos===correct;
  document.querySelectorAll('#opts .opt-flow').forEach((b,i)=>{
    b.disabled=true;
    if(i===correct)b.classList.add('ok');else if(i===pos)b.classList.add('ko');
  });
  setTimeout(()=>{
    if(ok){ window._tooFastOnPass(); }
    else { _stepStartTime=Date.now(); renderLearningStep(); } // repete o mesmo step
  }, 700);
}

let _assocSelectedLeft=null, _assocMatched=[];
function renderAssociation(step){
  _assocSelectedLeft=null; _assocMatched=[];
  document.getElementById('game-area').innerHTML=`
<div class="flow-card learn-flow">
  <div class="flow-tag">🔗 Associe corretamente</div>
  <div class="assoc-grid">
    <div class="assoc-col" id="assoc-left">
      ${step.pairs.map((p,i)=>`<button class="opt-flow assoc-btn" data-idx="${i}" onclick="selectAssocLeft(${i})">${p.left}</button>`).join('')}
    </div>
    <div class="assoc-col" id="assoc-right">
      ${shuffleArr(step.pairs.map((p,i)=>({text:p.right,idx:i}))).map(p=>`<button class="opt-flow assoc-btn" data-idx="${p.idx}" onclick="selectAssocRight(${p.idx})">${p.text}</button>`).join('')}
    </div>
  </div>
</div>`;
  window._assocPairs=step.pairs;
}
function selectAssocLeft(idx){
  if(_assocMatched.includes(idx))return;
  _assocSelectedLeft=idx;
  document.querySelectorAll('#assoc-left .assoc-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector(`#assoc-left .assoc-btn[data-idx="${idx}"]`).classList.add('selected');
}
function selectAssocRight(idx){
  if(_assocSelectedLeft===null || _assocMatched.includes(idx))return;
  const correct=_assocSelectedLeft===idx;
  const leftBtn=document.querySelector(`#assoc-left .assoc-btn[data-idx="${_assocSelectedLeft}"]`);
  const rightBtn=document.querySelector(`#assoc-right .assoc-btn[data-idx="${idx}"]`);
  if(correct){
    leftBtn.classList.add('ok');rightBtn.classList.add('ok');
    leftBtn.disabled=true;rightBtn.disabled=true;
    _assocMatched.push(idx);
    _assocSelectedLeft=null;
    if(_assocMatched.length===window._assocPairs.length){
      if(_stepProgress[_learningConceptId]) _stepProgress[_learningConceptId].microTest=true;
      addXP(15,false);
      setTimeout(advanceLearningStep,500);
    }
  } else {
    rightBtn.classList.add('ko');
    setTimeout(()=>rightBtn.classList.remove('ko'),500);
  }
}

// ═══════════════════════════════════════════════════════════════
// LOOP PRINCIPAL DO JOGO — tela única, o algoritmo decide tudo
// Play → micro explicação → micro desafio → pergunta → feedback → próximo
// ═══════════════════════════════════════════════════════════════
let _smartQueue=[]; // fila de revisão forçada (erros, sprint, retorno)
let _comboHidden=false;

function nextStep(){
  try{
    // 1. Fila forçada tem prioridade (vinda de revisão forçada, sprint, etc)
    if(_smartQueue.length>0){
      G.curConceptId=_smartQueue.shift();
      startLearningFlow(G.curConceptId);
      return;
    }
    // 2. Simulado real liberado?
    const simStatus=simuladoRealUnlocked(G);
    if(simStatus.unlocked && !G._simNoticeShown){
      G._simNoticeShown=true;
      showSimuladoRealReady();
      return;
    }
    // 3. Trigger de simulado diagnóstico/intermediário (a cada N questões)
    if(G.totalSims<2 && G.questionsAnswered>=G.simTrigger){
      G.questionsAnswered=0;
      G.simTrigger=8+Math.floor(Math.random()*4);
      showSimuladoIntermediario();
      return;
    }
    // 4. Continua o ciclo normal
    G.curConceptId=getNextConceptId();
    startLearningFlow(G.curConceptId);
  }catch(e){
    console.error('nextStep falhou:',e);
    showRecoveryScreen(e);
  }
}

// ───────────────────────────────────────────────
// TEACH — micro explicação curta (20-40s de leitura)
// ───────────────────────────────────────────────
function renderTeach(useReteach){
  G.answered=false;G.wrongCount=0;
  clearTInterval();
  if(!G.curConceptId) G.curConceptId=getNextConceptId();
  const concept=getConceptById(G.curConceptId);
  if(!concept){ nextStep(); return; }

  const T=useReteach && concept.reteach ? concept.reteach : concept.teach;
  const isReteach=useReteach && concept.reteach;

  document.getElementById('game-area').innerHTML=`
<div class="flow-card teach-flow">

  <div class="flow-title">${T.title}</div>
  <div class="flow-body">${T.body}</div>

</div>`;

  updateMiniHud();
  saveGame();
}

function confirmUnderstood(){
  // Micro desafio rápido antes da pergunta oficial (recall ativo)
  const concept=getConceptById(G.curConceptId);
  const extras=CONCEPT_EXTRAS[concept.id];
  if(extras && extras.miniPergunta && Math.random()<0.5){
    renderMicroChallenge(concept,extras);
  } else {
    // Sem micro desafio nesta passada: ainda assim considera o recall feito,
    // pois o aluno confirmou entendimento da explicação antes de seguir.
    markPassedRecall(concept.id);
    goQuestion();
  }
}

function renderMicroChallenge(concept,extras){

  document.getElementById('game-area').innerHTML=`
<div class="flow-card challenge-flow">
  <div class="flow-tag">⚡ Desafio rápido</div>

}
function answerMicroChallenge(pos,correct){

// ───────────────────────────────────────────────
// QUESTION — pergunta oficial
// ───────────────────────────────────────────────
function goQuestion(){
  G.answered=false;
  const concept=getConceptById(G.curConceptId);
  const c=G.concepts[concept.id];
  G.curQIdx=concept.questions.length>1?(c.attempts%concept.questions.length):0;
  renderQuestion(false);
}

function renderQuestion(isRetry){
  clearTInterval();
  const concept=getConceptById(G.curConceptId);
  const Q=concept.questions[G.curQIdx];
  const variedText=isRetry?_lastQText:pickQuestionVariation(concept.id,Q,G.curQIdx);
  _lastQText=variedText;
  _timeLeft=30;
  G.questionStartTime=Date.now();

  if(!isRetry){
    const idxArr=[0,1,2,3];
    for(let i=idxArr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idxArr[i],idxArr[j]]=[idxArr[j],idxArr[i]];}
    _shuffled=idxArr; _correctMapped=idxArr.indexOf(Q.c);
  }
  const sh=_shuffled,cm=_correctMapped;

  document.getElementById('game-area').innerHTML=`
<div class="flow-card question-flow">
  <div class="flow-top-row">
    <span class="q-badge-flow b-${concept.topic}">${concept.topicName}</span>
    <span class="timer-flow" id="tnum">⏱30</span>
  </div>
  <div class="t-bar-wrap"><div class="t-bar" id="tbar" style="width:100%"></div></div>
  <div class="flow-title-sm">${variedText}</div>
  <div id="opts">${sh.map((origIdx,pos)=>`<button class="opt-flow" id="opt${pos}" onclick="answerQ(${pos},${cm})">${Q.opts[origIdx]}</button>`).join('')}</div>
  <div id="fb" class="hide"></div>
</div>`;
  startTimer(Q,cm);
}

function startTimer(Q,cm){
  _timerInt=setInterval(()=>{
    _timeLeft--;
    const el=document.getElementById('tnum');
    const bar=document.getElementById('tbar');
    if(el) el.textContent='⏱'+_timeLeft;
    if(bar){
      bar.style.width=Math.round(_timeLeft/30*100)+'%';
      bar.style.background=_timeLeft>15?'#1fa876':_timeLeft>8?'#f5a623':'#e5484d';
    }
    if(_timeLeft<=0){clearTInterval();timeoutQ(Q,cm);}
  },1000);
}
function clearTInterval(){if(_timerInt){clearInterval(_timerInt);_timerInt=null;}}

function timeoutQ(Q,cm){
  if(G.answered)return;
  G.answered=true;
  disableOpts(cm,-1);
  showFeedback(false,Q,'⏰ Tempo esgotado',30);
  G.focusMeter=Math.max(0,G.focusMeter-15);
  processAnswer(false,30);
}

function answerQ(pos,cm){
  if(G.answered)return;
  G.answered=true;
  clearTInterval();
  const concept=getConceptById(G.curConceptId);
  const Q=concept.questions[G.curQIdx];
  const ok=pos===cm;
  const elapsed=(Date.now()-G.questionStartTime)/1000;
  disableOpts(cm,pos);

  if(ok && elapsed<2){
    showGuessCheck(concept,Q,cm);
    G.focusMeter=Math.min(100,G.focusMeter+5);
    processAnswer(true,elapsed,true);
    return;
  }

  showFeedback(ok,Q,ok?'✅ Correto!':'❌ Você confundiu este ponto:',elapsed);

  if(ok){
    G.focusMeter=Math.min(100,G.focusMeter+8);
  } else {
    G.focusMeter=Math.max(0,G.focusMeter-12);
    G.wrongCount++;
    if(G.lives>1) G.lives--;
  }
  processAnswer(ok,elapsed,false);
}

function disableOpts(cm,chosen){
  for(let i=0;i<4;i++){
    const b=document.getElementById('opt'+i);
    if(!b)continue;
    b.disabled=true;
    if(i===cm)b.classList.add('ok');else if(i===chosen)b.classList.add('ko');
  }
}

function showFeedback(ok,Q,title,elapsed){
  const fb=document.getElementById('fb');
  if(!fb)return;
  fb.classList.remove('hide');
  fb.className='fb-flow '+(ok?'fb-ok':'fb-ko');
  let extra='';
  if(!ok) extra=`<div class="fb-rule-flow">${Q.rule}</div>`;
  fb.innerHTML=`<div class="fb-title-flow">${title}</div><div class="fb-why-flow">${Q.why}</div>${extra}
  <div class="flow-actions">
    ${!ok && G.wrongCount<2?'<button class="opt-flow retry-flow" onclick="retryQ()">🔁 Tentar de novo</button>':''}
    ${!ok && G.wrongCount>=2?'<button class="opt-flow retry-flow" onclick="compactReteach()">🔄 Reensino rápido</button>':''}
    ${ok?'<button class="play-btn-sm" onclick="afterQuestionFlow()">Continuar →</button>':''}
  </div>`;
}

// REENSINO COMPACTO (regra do documento: 1 frase sobre o erro + 1 regra + 1 exemplo + nova tentativa,

// ═══════════════════════════════════════════════════════════════
// PROCESSAR RESPOSTA — XP, combo, cartas, chefões, recompensa frequente
// ═══════════════════════════════════════════════════════════════
function processAnswer(ok,elapsedSec,wasGuess){
  const concept=getConceptById(G.curConceptId);
  const Q=concept.questions[G.curQIdx];
  const c=G.concepts[concept.id];
  const wasAlreadyDominated=c.status==='dominado';

  c.attempts++;
  if(ok){ c.correct++; if(!c.correctFormats.includes(G.curQIdx)) c.correctFormats.push(G.curQIdx); }
  else c.timesWrong++;
  c.avgTime=c.avgTime===0?elapsedSec:Math.round((c.avgTime+elapsedSec)/2);
  c.lastSeen=G.totalQ;
  c.status=conceptStatus(c);
  markPracticed(concept.id,ok);

  G.totalQ++;
  G.questionsAnswered++;
  G.sessionAnswerCount++;

  if(ok){
    G.totalCorrect++;G.streak++;
    if(G.streak>G.bestStreak)G.bestStreak=G.streak;
    const combo=getComboTier(G.streak);
    let bonus=0;
    if(combo){ bonus=combo.xp; showComboToast(combo); }
    addXP(50+bonus,true);
    maybeVariableReward();
    G.errorBank=G.errorBank.filter(e=>!(e.conceptId===concept.id && e.qIdx===G.curQIdx));
  } else {
    if(G.streak>=3) showSequenceBreak();
    G.streak=0;
    addXP(10,false);
    const exists=G.errorBank.find(e=>e.conceptId===concept.id && e.qIdx===G.curQIdx);
    if(!exists) G.errorBank.push({conceptId:concept.id,qIdx:G.curQIdx,topic:concept.topic,question:Q.txt,why:Q.why,rule:Q.rule,ts:Date.now()});
  }

  scheduleReview(concept.id,ok);

  if(!wasAlreadyDominated && c.status==='dominado'){
    unlockCard(concept.id);
  }

  // Atualizar título (level estilo anime)
  const newTitle=getTitle(G);
  if(newTitle!==G.title){
    G.title=newTitle;
    setTimeout(()=>showToast('🎖️ Novo título: '+newTitle),1500);
  }

  updateMiniHud();
  checkAchievements();
  maybeTriggerBoss(concept.topic);
  saveGame();
}

function unlockCard(conceptId){
  if(G.cardsUnlocked.includes(conceptId))return;
  G.cardsUnlocked.push(conceptId);
  const concept=getConceptById(conceptId);
  const extras=CONCEPT_EXTRAS[conceptId];
  setTimeout(()=>{
    popup('🃏','Carta de macete desbloqueada!',
      `<b>${extras?.cartaTitulo||concept.name}</b><br><span style="color:#f5a623">${extras?.macete||concept.teach.rule}</span><br><br>Você dominou esse conceito de verdade.`,
      'Continuar',null,null,null);
  },500);
}

function maybeVariableReward(){
  if(Math.random()>0.18) return;
  const rewards=[
    ()=>{addXP(25,false);showToast('🎁 Bônus surpresa: +25 XP!');},
    ()=>{G.lives=Math.min(3,G.lives+1);showToast('🛡️ Vida recuperada!');},
    ()=>{showToast('🔮 Combo de foco ativado!');G.focusMeter=Math.min(100,G.focusMeter+20);},
  ];
  rewards[Math.floor(Math.random()*rewards.length)]();
}

function showComboToast(combo){
  const el=document.createElement('div');

  el.innerHTML=`${combo.icon} <b>${combo.name}!</b><br><span>${combo.msg}</span>`;

// XP com float visual
function addXP(amt,fromAnswer){
  G.xp+=amt;
  const el=document.createElement('div');
  el.className='xpf-flow';
  el.textContent='+'+amt+' XP';
  document.body.appendChild(el);

      G.level=i+1;
      setTimeout(()=>popup('⬆️','Nível '+G.level+'!','Você está evoluindo rápido. Continue!','Continuar',null,null,null),300);
      break;
    }
