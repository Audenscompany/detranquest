const XP_THRESH=[0,100,250,500,850,1300,1900,2700,3600,4600,6000];

// ───────────────────────────────────────────────
// FLUXO PÓS-RESPOSTA — sem decisão do aluno
// ───────────────────────────────────────────────
function afterQuestionFlow(){
  maybeShowExpectationNudge();
  nextStep();
}

function maybeShowExpectationNudge(){
  // Criar expectativa: "faltam X para Y" — não toda vez, ~1 em cada 4
  if(Math.random()>0.35) return;
  const msgs=[];
  const quase=Object.values(G.concepts).filter(c=>conceptStatus(c)==='quase').length;
  if(quase>0) msgs.push(`Mais ${quase} acerto${quase>1?'s':''} e libera uma carta nova.`);
  const sim=simuladoRealUnlocked(G);
  if(!sim.unlocked){
    const gap=Math.max(0,85-sim.approval);
    if(gap>0 && gap<=15) msgs.push(`Faltam ${gap}% de Poder de Aprovação para liberar o Simulado Real.`);
  }
  const xpToNext=(()=>{
    for(let i=0;i<XP_THRESH.length;i++){ if(G.xp<XP_THRESH[i]) return XP_THRESH[i]-G.xp; }
    return null;
  })();
  if(xpToNext && xpToNext<=40) msgs.push(`Mais ${xpToNext} XP e você sobe de nível.`);

  if(msgs.length>0) showToast('💬 '+msgs[Math.floor(Math.random()*msgs.length)]);
}


// ═══════════════════════════════════════════════════════════════
// CHEFÕES — aparecem sem aviso a cada ~10 conceitos tentados de um tópico
// ═══════════════════════════════════════════════════════════════
// CHEFÃO DINÂMICO — não é mais "uma vez só por matéria". Dispara uma NOVA onda
// a cada ~8 conceitos novos tentados naquele tópico, sempre puxando do banco
// inteiro de conceitos elegíveis (que cresce conforme o conteúdo é expandido)
// e evitando repetir perguntas usadas nas últimas ondas. Isso resolve o
// problema de "chefe sempre com as mesmas perguntas": quanto maior o banco,
// mais variado cada onda fica automaticamente — sem precisar de código novo.
function maybeTriggerBoss(topic){
  const concepts=CONCEPTS.filter(c=>c.topic===topic);
  const attempted=concepts.filter(c=>G.concepts[c.id].attempts>0).length;
  const mastery=topicMastery(G,topic);
  if(!G.bossWave) G.bossWave={};
  if(!G.bossWaveSnapshot) G.bossWaveSnapshot={};
  const wave=G.bossWave[topic]||0;
  const snapshot=G.bossWaveSnapshot[topic]||0;
  const minPool = wave===0 ? concepts.length : 8; // primeira onda: só quando viu o tópico inteiro pelo menos uma vez
  const newSinceLastWave = attempted - snapshot;
  const ready = wave===0 ? attempted>=Math.min(concepts.length,8) : newSinceLastWave>=8;
  if(ready && mastery>=55 && !G._bossQueued){
    G._bossQueued=true;
    setTimeout(()=>startBossBattle(topic),600);
  }
}

let _bossQs=[],_bossIdx=0,_bossHP=100,_bossPlayerHP=100,_bossTopic=null;

function startBossBattle(topic){
  G._bossQueued=false;
  _bossTopic=topic;
  _bossIdx=0;_bossHP=100;_bossPlayerHP=100;
  if(!G.recentBossQKeys) G.recentBossQKeys=[];
  // Usa TODO o conjunto de conceitos elegíveis do tópico (não só uma amostra pequena) —
  // quanto mais conteúdo existir, mais variado fica automaticamente.
  const eligibleTopicConcepts=CONCEPTS.filter(c=>c.topic===topic && isConceptEligibleForSim(c.id));
  const pool=eligibleTopicConcepts.length>0?eligibleTopicConcepts:CONCEPTS.filter(c=>c.topic===topic && G.concepts[c.id].attempts>0);
  // Monta candidatos: cada (conceito, índice de questão) é um candidato único
  let candidates=[];
  pool.forEach(concept=>{
    concept.questions.forEach((q,idx)=>{
      candidates.push({concept,q,idx,key:concept.id+'|'+idx});
    });
  });
  const targetCount=Math.min(8,Math.max(4,Math.floor(candidates.length/2)));
  // Prioriza candidatos que NÃO apareceram nas últimas ondas deste chefe
  const fresh=candidates.filter(c=>!G.recentBossQKeys.includes(c.key));
  let chosenPool = fresh.length>=targetCount ? fresh : candidates; // só repete se não houver alternativa suficiente
  chosenPool=shuffleArr(chosenPool).slice(0,targetCount);
  _bossQs=chosenPool.map(({concept,q,idx})=>({
    q:pickQuestionVariation(concept.id,q,idx)||q.txt, o:q.opts, c:q.c,
    conceptId:concept.id, topic:concept.topic, key:concept.id+'|'+idx,
  }));
  if(_bossQs.length<3){ // segurança: se não há base suficiente, cancela o chefão silenciosamente
    G._bossQueued=false;
    nextStep();
    return;
  }
  // Atualiza a memória de "perguntas recentes do chefe" (mantém só as últimas 30)
  G.recentBossQKeys=[...G.recentBossQKeys,..._bossQs.map(q=>q.key)].slice(-30);
  renderBossIntro(topic);
}

function renderBossIntro(topic){
  if(!G.bossWave) G.bossWave={};
  const wave=(G.bossWave[topic]||0)+1;
  document.getElementById('game-area').innerHTML=`
<div class="boss-intro">
  <div class="boss-intro-flash"></div>
  <div class="boss-intro-icon">${TICON[topic]}</div>
  <div class="boss-intro-title">CHEFE DE ${TNAME[topic].toUpperCase()}${wave>1?' — ONDA '+wave:''}</div>
  <div class="boss-intro-sub">${_bossQs.length} questões sem dica. Vamos ver se você domina de verdade.</div>
  <button class="play-btn boss-btn" onclick="renderBossQ()">⚔️ Lutar</button>
</div>`;
}

function renderBossQ(){
  if(_bossIdx>=_bossQs.length || _bossHP<=0 || _bossPlayerHP<=0){ finishBoss(); return; }
  const Q=_bossQs[_bossIdx];
  document.getElementById('game-area').innerHTML=`
<div class="flow-card boss-flow">
  <div class="boss-bars">
    <div class="boss-bar-row"><span>Você</span><div class="boss-track"><div class="boss-fill player" style="width:${_bossPlayerHP}%"></div></div></div>
    <div class="boss-bar-row"><span>Chefe</span><div class="boss-track"><div class="boss-fill enemy" style="width:${_bossHP}%"></div></div></div>
  </div>
  <div class="flow-title-sm">${Q.q}</div>
  <div id="opts">${Q.o.map((o,i)=>`<button class="opt-flow" id="bopt${i}" onclick="answerBoss(${i},${Q.c})">${o}</button>`).join('')}</div>
</div>`;
}

function answerBoss(pos,cm){
  const ok=pos===cm;
  document.querySelectorAll('#opts .opt-flow').forEach((b,i)=>{
    b.disabled=true;
    if(i===cm)b.classList.add('ok');else if(i===pos)b.classList.add('ko');
  });
  if(ok){ _bossHP-=20; addXP(40,true); } else { _bossPlayerHP-=25; }
  G.totalQ++;
  setTimeout(()=>{ _bossIdx++; renderBossQ(); },700);
}

function finishBoss(){
  const won=_bossHP<=0;
  if(!G.bossWave) G.bossWave={};
  if(!G.bossWaveSnapshot) G.bossWaveSnapshot={};
  if(won){
    const firstWin=!G.bossesDefeated.includes(_bossTopic);
    if(firstWin) G.bossesDefeated.push(_bossTopic);
    G.bossWave[_bossTopic]=(G.bossWave[_bossTopic]||0)+1;
    G.bossWaveSnapshot[_bossTopic]=CONCEPTS.filter(c=>c.topic===_bossTopic && G.concepts[c.id].attempts>0).length;
    const xp = firstWin ? 200 : 90; // primeira vitória vale mais; ondas seguintes ainda recompensam, sem virar farm
    addXP(xp,true);
    const title=firstWin?'Chefe derrotado!':'Chefe derrotado de novo!';
    popup('🏆',title,`Você venceu o Chefe de ${TNAME[_bossTopic]}. +${xp} XP e seu Poder de Aprovação subiu.`,'Continuar',()=>nextStep(),null,null);
  } else {
    popup('💪','Quase lá!',`O Chefe de ${TNAME[_bossTopic]} resistiu dessa vez, mas você vai voltar mais forte. Vamos reforçar os pontos fracos.`,'Continuar',()=>{
      _smartQueue=getTop3Weak(G).filter(id=>getConceptById(id).topic===_bossTopic);
      nextStep();
    },null,null);
  }
  checkAchievements();
  saveGame();
}


// ═══════════════════════════════════════════════════════════════
// SIMULADO — CORRIGIDO: nunca cobra conceito não estudado.
// Toda questão vem de buildSimQuestions(), que filtra por
// isConceptEligibleForSim(). Nunca usa banco fixo (SQ) direto.
// ═══════════════════════════════════════════════════════════════

function showSimuladoIntermediario(){
  const simQs=buildSimQuestions(30);
  if(!simQs || simQs.length<10){
    nextStep(); // ainda não tem conteúdo suficiente — só segue ensinando, sem bloquear nada
    return;
  }
  const partial=simQs.length<30;
  popup('📝', partial?'Simulado parcial disponível':'Hora de testar o que aprendeu',
    partial
      ? `Este é um simulado parcial com ${simQs.length} questões — só do que você já estudou. Serve para diagnosticar onde focar.`
      : 'Vamos fazer um simulado completo para o algoritmo entender onde você realmente está.',
    'Vamos lá',()=>startSim('treino',simQs),null,null);
}

function startSim(mode,preparedQs){
  const simQs=preparedQs||buildSimQuestions(30);
  if(!simQs || simQs.length<10){
    popup('🔒','Simulado ainda bloqueado',
      'Você ainda não estudou conteúdo suficiente. Vou continuar te preparando primeiro.',
      'Continuar aprendendo',()=>nextStep(),null,null);
    return;
  }
  G.inSim=true;G.simMode=mode;
  G.simIdx=0;G.totalSims++;G.simsToday++;
  G.simQs=simQs;
  G.simAnswers=[];G.simSec=3600;
  G._simIsPartial=simQs.length<30;
  renderSimQ();
  _simInt=setInterval(()=>{
    G.simSec--;
    const el=document.getElementById('simtimer-flow');
    if(el){const m=Math.floor(G.simSec/60),s=G.simSec%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
    if(G.simSec<=0){clearInterval(_simInt);finishSim();}
  },1000);
  saveGame();
}

function renderSimQ(){
  if(G.simIdx>=G.simQs.length){finishSim();return;}
  const Q=G.simQs[G.simIdx];
  const total=G.simQs.length;
  const prog=Math.round(G.simIdx/total*100);
  const tag=G.simMode==='prova'?'🏁 SIMULADO REAL':(G._simIsPartial?'📝 Simulado parcial':'📝 Simulado');
  document.getElementById('game-area').innerHTML=`
<div class="flow-card sim-flow">
  <div class="sim-flow-top">
    <span class="sim-tag">${tag} — ${G.simIdx+1}/${total}</span>
    <span class="timer-flow" id="simtimer-flow">60:00</span>
  </div>
  <div class="t-bar-wrap"><div class="t-bar" style="width:${prog}%;background:#7c6ef5"></div></div>
  <div class="flow-title-sm">${Q.q}</div>
  <div id="opts">${Q.o.map((o,i)=>`<button class="opt-flow" id="sopt${i}" onclick="answerSim(${i})">${o}</button>`).join('')}</div>
  <div id="simfb" class="hide"></div>
</div>`;
  const el=document.getElementById('simtimer-flow');
  if(el){const m=Math.floor(G.simSec/60),s=G.simSec%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
}

function answerSim(idx){
  const Q=G.simQs[G.simIdx];
  const ok=idx===Q.c;
  G.simAnswers.push({Q,chose:idx,ok});

  for(let i=0;i<Q.o.length;i++){
    const b=document.getElementById('sopt'+i);if(!b)continue;
    b.disabled=true;
    if(G.simMode==='treino'){ if(i===Q.c)b.classList.add('ok'); else if(i===idx)b.classList.add('ko'); }
  }
  if(G.simMode==='treino'){
    const fb=document.getElementById('simfb');
    fb.classList.remove('hide');
    fb.className='fb-flow '+(ok?'fb-ok':'fb-ko');
    fb.innerHTML=`<div class="fb-title-flow">${ok?'✅':'❌'} ${Q.o[Q.c]}</div>`;
  }
  setTimeout(()=>{G.simIdx++;renderSimQ();},G.simMode==='treino'?900:350);
}

function finishSim(){
  clearInterval(_simInt);G.inSim=false;
  const totalQs=G.simAnswers.length||1;
  const cor=G.simAnswers.filter(a=>a.ok).length;
  const passRatio=cor/totalQs;
  const passed=passRatio>=(20/30);
  const missed=G.simAnswers.filter(a=>!a.ok);
  const wasProva=G.simMode==='prova';
  const wasPartial=G._simIsPartial;
  addXP(passed?400:120,true);
  if(totalQs>=30 && cor>G.bestSimScore) G.bestSimScore=cor;
  if(wasProva){G.provaFinalDone=true;G.provaFinalScore=cor;}

  // Cada questão do simulado tem conceptId — atualiza o conceito correspondente.
  G.simAnswers.forEach(a=>{
    const conceptId=a.Q.conceptId;
    if(!conceptId) return;
    const c=G.concepts[conceptId];
    if(!c) return;
    c.attempts++;
    if(!a.ok){
      c.timesWrong++;
      c.reviewStage=0;
      c.dueAtQuestionCount=G.totalQ+2;
      c.dueAtTimestamp=-1;
      c.status = conceptMastery(c)<40 ? 'critico' : 'aprendendo';
      const exists=G.errorBank.find(e=>e.conceptId===conceptId && e.qIdx===0);
      if(!exists) G.errorBank.push({conceptId,qIdx:0,topic:a.Q.topic,question:a.Q.q,why:a.Q.why,rule:a.Q.rule,ts:Date.now()});
    } else {
      c.correct++;
      if(!c.correctFormats.includes(0)) c.correctFormats.push(0);
      c.status=conceptStatus(c);
    }
    if(G.conceptState[conceptId]){
      G.conceptState[conceptId].attempts++;
      if(a.ok) G.conceptState[conceptId].correct++;
    }
  });

  const errByT={};
  missed.forEach(a=>{errByT[a.Q.topic]=(errByT[a.Q.topic]||0)+1;});

  const missHTML=missed.length===0?'<p style="color:#4ecda4;text-align:center;padding:1rem">Perfeito — nenhum erro!</p>':
    missed.slice(0,8).map(a=>`<div class="miss-card-flow">
<div class="miss-q-flow">${a.Q.q}</div>
<div class="miss-right-flow">✅ ${a.Q.o[a.Q.c]}</div>
</div>`).join('');

  document.getElementById('game-area').innerHTML=`
<div class="flow-card sim-result-flow">
  ${wasProva?'<div class="flow-tag">🏁 RESULTADO DO SIMULADO REAL</div>':(wasPartial?'<div class="flow-tag">📝 Resultado do simulado parcial</div>':'<div class="flow-tag">📝 Resultado do simulado</div>')}
  <div class="sim-score-big" style="color:${passed?'#4ecda4':'#e5484d'}">${cor}/${totalQs}</div>
  <div class="sim-verdict-flow">${passed?'✅ Você passaria na prova real!':'Ainda não, mas você está no caminho.'}</div>
  ${wasPartial?'<div style="font-size:11px;color:#8888a0;margin-bottom:.5rem">Simulado parcial — só com conteúdo que você já estudou.</div>':''}
  <button class="play-btn" onclick="afterSimFlow()">Continuar →</button>
</div>
${missed.length>0?`<div class="flow-tag" style="margin-top:1rem">Pontos para reforçar</div>${missHTML}`:''}`;
  checkAchievements();
  saveGame();

  if(missed.length>0){
    _smartQueue=[...new Set(missed.map(a=>a.Q.conceptId).filter(Boolean))].slice(0,3);
  }
}

// SENSEI DA CNH — Professor IA local, invisível até ser chamado
// ═══════════════════════════════════════════════════════════════
function professorIA(input,contextoAluno,conceitoAtual){
  // FUTURO: troque o corpo desta função por uma chamada de API real
  // mantendo a mesma assinatura (input, contextoAluno, conceitoAtual).
  const concept=getConceptById(conceitoAtual);
  const extras=CONCEPT_EXTRAS[conceitoAtual];
  if(!concept) return {text:'Continue jogando que eu já te ajudo no próximo conceito.'};

  switch(input){
    case 'nao_entendi':
      return {text:concept.teach.body.replace(/<\/?b>/g,'')+' '+(concept.teach.rule||'')};
    case 'macete':
      return {text:'🧩 '+(extras?.macete||concept.teach.rule)};
    case 'me_teste':
      if(extras?.miniPergunta) return {miniQuestion:extras.miniPergunta};
      return {text:'Responde a próxima questão que eu confirmo se você já manja disso!'};
    case 'anime':
      return {text:'🎮 Pensa assim: '+(extras?.analogiaCurta||concept.teach.rule)};
    case 'onde_fraco':
      return professorWeakReport(contextoAluno);
    case 'o_que_fazer':
      return professorNextAction(contextoAluno);
    case 'resumir':
      return {text:'📌 '+concept.teach.rule};
    default:
      return {text:'Escolhe um dos botões aí.'};
  }
}

function professorWeakReport(g){
  const topics=ALL_TOPICS;
  const rows=topics.map(t=>({t,m:topicMastery(g,t),attempted:CONCEPTS.filter(c=>c.topic===t).some(c=>g.concepts[c.id].attempts>0)}))
    .filter(r=>r.attempted).sort((a,b)=>a.m-b.m);
  if(rows.length===0) return {text:'Você ainda tá começando! Vamos firmar a base primeiro.'};
  const worst=rows[0];
  return {text:`Você confundiu mais coisas em <b>${TNAME[worst.t]}</b> (${worst.m}% de domínio). É ali que está te puxando pra baixo agora.`};
}

function professorNextAction(g){
  const sim=simuladoRealUnlocked(g);
  if(sim.unlocked) return {text:'Você já pode fazer o Simulado Real! Volta pro jogo que eu libero.'};
  const weak=getTop3Weak(g);
  if(weak.length===0) return {text:'Continua respondendo — ainda não tenho dados suficientes sobre você.'};
  const names=weak.map(id=>getConceptById(id)?.name).filter(Boolean);
  return {text:`Bora fortalecer: <b>${names.join(', ')}</b>. Isso vai puxar seu Poder de Aprovação pra cima rápido.`};
}

  b1.textContent=b1txt;b1.onclick=()=>{closePop();if(b1fn)b1fn();};
  const b2=document.getElementById('pb2-flow');
  if(b2txt){b2.textContent=b2txt;b2.classList.remove('hide');b2.onclick=()=>{closePop();if(b2fn)b2fn();};}
  else b2.classList.add('hide');
  document.getElementById('pop-flow').classList.remove('hide');
}
function closePop(){document.getElementById('pop-flow').classList.add('hide');}

function showToast(msg){
  const el=document.createElement('div');
  el.className='st-toast-flow';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2300);
}

function updateHUD(){ updateMiniHud(); }

// ═══════════════════════════════════════════════════════════════
// PWA — registro do service worker, detecção de atualização,
// botão de instalar e indicador de offline.
//
// IMPORTANTE: isso nunca toca em localStorage/save. O service worker
// só lida com os ARQUIVOS do jogo (HTML/JS/CSS/ícones) via Cache API,
// que é um armazenamento totalmente separado de onde o progresso do
// aluno fica salvo. Atualizar o código nunca apaga ou afeta o save.
// ═══════════════════════════════════════════════════════════════
let _swRegistration=null, _waitingWorker=null, _swUpdateApplying=false;

function registerServiceWorker(){
  if(!('serviceWorker' in navigator)) return; // navegador antigo: jogo continua funcionando normalmente, só sem PWA
  navigator.serviceWorker.register('./service-worker.js').then(reg=>{
    _swRegistration=reg;
    if(reg.waiting && navigator.serviceWorker.controller){
      _waitingWorker=reg.waiting;
      showUpdateBanner();
    }
    reg.addEventListener('updatefound',()=>{
      const installing=reg.installing;
      if(!installing) return;
      installing.addEventListener('statechange',()=>{
        if(installing.state==='installed' && navigator.serviceWorker.controller){
          // existe um controller ativo = isso é uma ATUALIZAÇÃO de verdade,
          // não a primeira instalação do PWA (nesse caso não há nada pra "atualizar")
          _waitingWorker=installing;
          showUpdateBanner();
        }
      });
    });
  }).catch(e=>console.error('Falha ao registrar service worker:',e));

  let _reloadingForUpdate=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(_reloadingForUpdate) return;
    _reloadingForUpdate=true;
    window.location.reload();
  });
}

function showUpdateBanner(){
  if(document.getElementById('update-banner')) return;
  const el=document.createElement('div');
  el.id='update-banner';
  el.className='update-banner-flow';
  el.innerHTML=`<span>🔄 Nova versão disponível.</span>
    <button onclick="applyGameUpdate()">Atualizar agora</button>
    <button onclick="dismissUpdateBanner()">Depois</button>`;
  document.body.appendChild(el);
}
function dismissUpdateBanner(){
  const el=document.getElementById('update-banner');
  if(el) el.remove();
  // continua disponível: o worker fica esperando, e o aviso reaparece na próxima
  // vez que a página carregar (reg.waiting já estará populado em registerServiceWorker)
}
function applyGameUpdate(){
  if(_swUpdateApplying) return;
  _swUpdateApplying=true;
  const el=document.getElementById('update-banner');
  if(el) el.innerHTML='<span>Salvando seu progresso e atualizando…</span>';
  // 1) salva progresso primeiro (saveGame já cria backup automaticamente, cascata existente)
  try{
    if(typeof G!=='undefined' && G && CURRENT_USER_EMAIL){ saveGame(); }
  }catch(e){ console.error('Falha ao salvar antes de atualizar:',e); }
  // 2) manda o worker em espera assumir agora
  if(_waitingWorker){
    _waitingWorker.postMessage({type:'SKIP_WAITING'});
  } else if(_swRegistration){
    _swRegistration.update().finally(()=>setTimeout(()=>location.reload(),600));
  } else {
    location.reload();
  }
  // 3) rede de segurança: se por algum motivo o controllerchange não disparar
  // (raro), recarrega de qualquer forma depois de alguns segundos — nunca
  // deixa o aluno preso na tela de "atualizando…"
  setTimeout(()=>{ if(!document.hidden) location.reload(); }, 5000);
}

// ───────────────────────────────────────────────
// INSTALAR APP — usa o prompt nativo do navegador (Chrome/Edge/Android).
// No iOS/Safari esse evento não existe (limitação da Apple, não do jogo);
// o botão simplesmente nunca aparece lá, e instalar continua possível
// manualmente via Compartilhar → Adicionar à Tela de Início.
// ───────────────────────────────────────────────
let _deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  _deferredInstallPrompt=e;
  injectInstallButton();
});
window.addEventListener('appinstalled',()=>{
  _deferredInstallPrompt=null;
  const btn=document.getElementById('install-app-btn');
  if(btn) btn.remove();
});
function injectInstallButton(){
  if(document.getElementById('install-app-btn')) return;
  const b=document.createElement('button');
  b.id='install-app-btn';
  b.className='install-app-fab';
  b.innerHTML='⬇️ Instalar app';
  b.onclick=installApp;
  document.body.appendChild(b);
}
function installApp(){
  if(!_deferredInstallPrompt) return;
  _deferredInstallPrompt.prompt();
  _deferredInstallPrompt.userChoice.finally(()=>{
    _deferredInstallPrompt=null;
    const btn=document.getElementById('install-app-btn');
    if(btn) btn.remove();
  });
}

// ───────────────────────────────────────────────
// INDICADOR DE OFFLINE — só avisa, nunca bloqueia (o jogo continua
// funcionando offline normalmente graças ao cache do service worker;
// só o login da primeiríssima vez exige rede, pois precisa do HTML inicial).
// ───────────────────────────────────────────────
function updateOfflineBanner(){
  const existing=document.getElementById('offline-banner');
  if(navigator.onLine){
    if(existing) existing.remove();
  } else if(!existing){
    const el=document.createElement('div');
    el.id='offline-banner';
    el.className='offline-banner-flow';
    el.textContent='📡 Sem conexão — jogando offline. Seu progresso será sincronizado normalmente.';
    document.body.appendChild(el);
  }
}
window.addEventListener('online',updateOfflineBanner);
window.addEventListener('offline',updateOfflineBanner);

registerServiceWorker();
updateOfflineBanner();

// ═══════════════════════════════════════════════════════════════
// BOOT — ponto único de inicialização real. Antes deste fix não existia
// NENHUMA chamada de boot automática (tryAutoLogin nunca era invocada por
// nada), e qualquer erro durante a montagem da tela ficava sem rede de
// segurança. Agora: sempre tenta iniciar, e qualquer erro cai na tela de
// recuperação em vez de deixar a tela preta.
// ═══════════════════════════════════════════════════════════════
try {
  initGame();
} catch (e) {
  console.error(e);
  showRecoveryScreen(e);
}
