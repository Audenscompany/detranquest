<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfred OS - LLM Only</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #D4A020;
      --text: #EDE8D8;
      --bg: #06040A;
      --bg2: #0D090F;
      --border: rgba(212,160,32,0.15);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .config-panel {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .config-panel input {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      padding: 12px;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.5;
    }
    .msg.user {
      background: rgba(0,150,200,0.15);
      border: 1px solid rgba(0,150,200,0.3);
      align-self: flex-end;
      border-radius: 18px 6px 18px 18px;
    }
    .msg.assistant {
      background: rgba(212,160,32,0.1);
      border: 1px solid rgba(212,160,32,0.3);
      align-self: flex-start;
      border-radius: 6px 18px 18px 18px;
      color: #E8D87A;
    }
    .input-area {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
    }
    button {
      padding: 10px 16px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .config-label {
      font-size: 11px;
      color: var(--gold);
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div id="app">
  <div class="config-panel">
    <div class="config-label">⚙️ CONFIGURAÇÃO</div>
    <input id="apiKey" type="password" placeholder="API Key (Claude/OpenAI)">
    <select id="provider" style="width: 48%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); margin-right: 4%;">
      <option value="claude">Claude</option>
      <option value="openai">OpenAI</option>
    </select>
    <select id="model" style="width: 48%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px; color: var(--text);">
      <option value="claude-opus-4.6">Claude Opus</option>
      <option value="claude-sonnet-4.6">Claude Sonnet</option>
      <option value="gpt-4">GPT-4</option>
    </select>
    <input id="pdfUpload" type="file" accept=".pdf" style="display:none">
    <button onclick="document.getElementById('pdfUpload').click()" style="width: 100%; margin-top: 8px;">📄 Upload PDF</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="input" type="text" placeholder="Escreva sua mensagem...">
    <button id="sendBtn" onclick="send()">Enviar</button>
  </div>
</div>

<script>
const API_URL = 'http://localhost:3000/api';
let conversationId = null;

document.getElementById('input').addEventListener('keypress', e => {
  if (e.key === 'Enter') send();
});

document.getElementById('pdfUpload').addEventListener('change', uploadPDF);

async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;

  const apiKey = document.getElementById('apiKey').value;
  if (!apiKey) {
    alert('Configure sua API Key');
    return;
  }

  input.value = '';
  addMessage(msg, 'user');
  document.getElementById('sendBtn').disabled = true;

  try {
    const response = await fetch(`${API_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: msg,
        conversationId: conversationId || 'default',
        apiKey,
        provider: document.getElementById('provider').value,
        model: document.getElementById('model').value
      })
    });

    const data = await response.json();
    conversationId = data.conversationId;

    if (response.ok) {
      addMessage(data.message, 'assistant');
    } else {
      addMessage(`Erro: ${data.error}`, 'assistant');
    }
  } catch (error) {
    addMessage(`Erro: ${error.message}`, 'assistant');
  }

  document.getElementById('sendBtn').disabled = false;
}

async function uploadPDF(event) {
  const file = event.target.files[0];
  if (!file) return;

  const apiKey = document.getElementById('apiKey').value;
  if (!apiKey) {
    alert('Configure sua API Key');
    return;
  }

  const reader = new FileReader();
  reader.onload = async (e) => {
    const pdf = e.target.result.split(',')[1];

    try {
      const response = await fetch(`${API_URL}/upload`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pdf, filename: file.name })
      });

      const data = await response.json();
      if (response.ok) {
        addMessage(`✅ ${file.name} absorvido (${data.chunksCount} chunks)`, 'assistant');
      } else {
        addMessage(`Erro: ${data.error}`, 'assistant');
      }
    } catch (error) {
      addMessage(`Erro: ${error.message}`, 'assistant');
    }
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function addMessage(text, sender) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
</script>

</body>
</html>
