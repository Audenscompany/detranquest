function calcPhase(lastDate,cycleLen){
  if(!lastDate)return null;
  const today=new Date();
  const last=new Date(lastDate);
  const diff=Math.floor((today-last)/(1000*60*60*24));
  const day=(diff%cycleLen)+1;
  let phase;
  if(day<=5)phase="menstrual";
  else if(day<=13)phase="folicular";
  else if(day<=16)phase="ovulacao";
  else if(day<=22)phase="luteal";
  else phase="pms";
  return{phase,day,daysUntil:cycleLen-day+1,data:CYCLE_PHASES[phase]};
}
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function getLevel(xp){return LEVELS.slice().reverse().find(l=>xp>=l.min)||LEVELS[0];}
function analyzeMsg(msg){
  if(!msg||!msg.trim())return 0;
  const l=msg.toLowerCase();
  let s=0;
  ["precisamos conversar","por que voce","me conta tudo","ta tudo bem?","preciso saber"].forEach(p=>{if(l.includes(p))s+=3;});
  ["me conta","como voce ta","voce sumiu","estou preocupado"].forEach(p=>{if(l.includes(p))s+=1.5;});
  ["no seu tempo","sem pressao","quando quiser","tudo bem","deixa pra la"].forEach(p=>{if(l.includes(p))s-=2;});
  s+=(msg.match(/\?/g)||[]).length*0.8;
  if(msg.length>200)s+=2.5;
  if(msg.length<25)s-=1;
  return s;
}

  return{icon:"⭐",title:"Excelente",color:"#C4A24A",text:"Perfeito. Carinhos sem demandar resposta."};
}

  "sexta":{label:"Sexta",code:"FR"},
  "sexta-feira":{label:"Sexta",code:"FR"},
  "sabado":{label:"Sabado",code:"SA"},
  "sábado":{label:"Sabado",code:"SA"},
  "domingo":{label:"Domingo",code:"SU"},
};
const JS_DAY_TO_CODE=["SU","MO","TU","WE","TH","FR","SA"];

function parseAlarmScript(input){
  const lines=input.split(/\r?\n/);
  const alarms=[];
  let currentDay=null;
  let pendingTime=null;
  for(const rawLine of lines){
    if(rawLine.trim().startsWith("|"))continue;
    if(/^---+$/.test(rawLine.trim()))continue;
    let line=rawLine.replace(/\*\*/g,"").replace(/^#+\s*/,"").replace(/^>\s*/,"").replace(/^[-•]\s*/,"").trim();
    if(!line)continue;
    const norm=line.toLowerCase();
    if(DAY_MAP[norm]){currentDay=DAY_MAP[norm];pendingTime=null;continue;}
    const tm=line.match(/^([01]\d|2[0-3]):([0-5]\d)$/);
    if(tm){pendingTime=tm[0];continue;}
    if(currentDay&&pendingTime&&line.length>2){
      const type=getAlarmType(pendingTime,line);
      alarms.push({id:Math.random().toString(36).slice(2)+Date.now().toString(36),dayLabel:currentDay.label,dayCode:currentDay.code,time:pendingTime,message:line,title:alarmTitle(type),type,enabled:true,lastKey:""});
      pendingTime=null;
    }
  }
  const seen=new Set();
  return alarms.filter(a=>{const k=`${a.dayCode}-${a.time}`;if(seen.has(k))return false;seen.add(k);return true;});
}
function getAlarmType(time,msg){
  const l=msg.toLowerCase();
  if(l.includes("dorme")||l.includes("dormir"))return"sono";
  if(time>="06:00"&&time<="10:59")return"manha";
  if(time>="11:00"&&time<="14:59")return"almoco";
  if(time>="20:00"&&time<="23:59")return"noite";
  return"extra";
}
function alarmTitle(type){
  if(type==="manha")return"Manha";
  if(type==="almoco")return"Almoco";
  if(type==="noite")return"Noite";
  if(type==="sono")return"Dormir";
  return"Lembrete";
}
function loadAlarmsDB(){
  try{const r=localStorage.getItem("dtq_alarms");return r?JSON.parse(r):[];}catch(e){return[];}
}
function saveAlarmsDB(a){
  try{localStorage.setItem("dtq_alarms",JSON.stringify(a));}catch(e){}
}
function shouldTriggerAlarm(alarm){
  if(!alarm.enabled)return false;
  const now=new Date();
  const dayCode=JS_DAY_TO_CODE[now.getDay()];
  const hh=String(now.getHours()).padStart(2,"0");
  const mm=String(now.getMinutes()).padStart(2,"0");
  const ct=`${hh}:${mm}`;
  const key=`${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}-${ct}`;
  if(alarm.dayCode!==dayCode)return false;
  if(alarm.time!==ct)return false;
  if(alarm.lastKey===key)return false;
  return true;
}
function getAlarmTriggerKey(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,"0");
  const mm=String(now.getMinutes()).padStart(2,"0");
  return`${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}-${hh}:${mm}`;
}

// ICS generator
function generateICS(alarms){
  function p(n){return String(n).padStart(2,"0");}
  function esc(s){return String(s).replace(/\\/g,"\\\\").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;");}
  const WDN={SU:0,MO:1,TU:2,WE:3,TH:4,FR:5,SA:6};
  function nextDate(dc,time){
    const now=new Date();
    const[h,m]=time.split(":").map(Number);
    const d=new Date(now);d.setHours(h,m,0,0);
    const diff=(WDN[dc]-d.getDay()+7)%7;
    if(diff===0&&d<=now)d.setDate(d.getDate()+7);
    else d.setDate(d.getDate()+diff);
    return d;
  }
  function fmtL(d){return d.getFullYear().toString()+p(d.getMonth()+1)+p(d.getDate())+"T"+p(d.getHours())+p(d.getMinutes())+"00";}
  const stamp=new Date();
  const dtstamp=stamp.getUTCFullYear().toString()+p(stamp.getUTCMonth()+1)+p(stamp.getUTCDate())+"T"+p(stamp.getUTCHours())+p(stamp.getUTCMinutes())+p(stamp.getUTCSeconds())+"Z";
  const events=alarms.filter(a=>a.enabled).map(a=>{
    const start=nextDate(a.dayCode,a.time);
    return["BEGIN:VEVENT","UID:"+a.id+"@domtotal","DTSTAMP:"+dtstamp,"DTSTART;TZID=America/Sao_Paulo:"+fmtL(start),"SUMMARY:"+esc(a.title+" - "+a.dayLabel+" "+a.time),"DESCRIPTION:"+esc(a.message),"RRULE:FREQ=WEEKLY;BYDAY="+a.dayCode,"BEGIN:VALARM","TRIGGER:PT0M","ACTION:DISPLAY","DESCRIPTION:"+esc(a.message),"END:VALARM","END:VEVENT"].join("\r\n");
  }).join("\r\n");
  return["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Dominio Total//Alarmes//PT-BR","CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Dominio Total Alarmes","X-WR-TIMEZONE:America/Sao_Paulo",events,"END:VCALENDAR"].join("\r\n");
}
function downloadICS(alarms){
  const ics=generateICS(alarms);
  const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="alarmes-domtotal.ics";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ===================== SOUND ENGINE =====================
let _bCtx=null;let _bTimer=null;
function stopBark(){
  if(_bTimer){clearInterval(_bTimer);_bTimer=null;}
  if(_bCtx){try{_bCtx.close();}catch(e){}_bCtx=null;}
}
function singleBark(ctx,t){
  try{
    const dur=0.28;
    const bsz=Math.floor(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(1,bsz,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<bsz;i++)d[i]=Math.random()*2-1;
    const ns=ctx.createBufferSource();ns.buffer=buf;
    const bpf=ctx.createBiquadFilter();bpf.type="bandpass";bpf.frequency.value=850;bpf.Q.value=2.5;
    const gn=ctx.createGain();
    gn.gain.setValueAtTime(0,t);
    gn.gain.linearRampToValueAtTime(2.0,t+0.015);
    gn.gain.exponentialRampToValueAtTime(0.01,t+dur);
    ns.connect(bpf);bpf.connect(gn);gn.connect(ctx.destination);
    ns.start(t);ns.stop(t+dur+0.01);
    const osc=ctx.createOscillator();const og=ctx.createGain();
    osc.type="sawtooth";
    osc.frequency.setValueAtTime(300,t);
    osc.frequency.exponentialRampToValueAtTime(160,t+dur);
    og.gain.setValueAtTime(0,t);
    og.gain.linearRampToValueAtTime(0.7,t+0.01);
    og.gain.exponentialRampToValueAtTime(0.01,t+dur);
    osc.connect(og);og.connect(ctx.destination);
    osc.start(t);osc.stop(t+dur+0.01);
  }catch(e){}
}
function startBarkLoop(){
  stopBark();
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)throw new Error("no AC");
    _bCtx=new AC();
    const resume=()=>{if(_bCtx&&_bCtx.state==="suspended")_bCtx.resume().catch(()=>{});};
    resume();
    function pair(){
      if(!_bCtx)return;
      resume();
      const t=(_bCtx.currentTime||0)+0.1;
      singleBark(_bCtx,t);
      singleBark(_bCtx,t+0.45);
    }
    pair();
    _bTimer=setInterval(pair,1900);
  }catch(e){
    // Fallback: oscillator beep
    try{
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC)return;
      const ctx=new AC();
      if(ctx.state==="suspended")ctx.resume().catch(()=>{});
      const osc=ctx.createOscillator();const gn=ctx.createGain();
      osc.type="square";osc.frequency.value=880;gn.gain.value=0.35;
      osc.connect(gn);gn.connect(ctx.destination);osc.start();
      _bCtx=ctx;
    }catch(e2){}
  }
}
function testBark(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    const ctx=new AC();
    const go=()=>{
      const t=(ctx.currentTime||0)+0.1;
      singleBark(ctx,t);singleBark(ctx,t+0.42);singleBark(ctx,t+0.88);
      setTimeout(()=>{try{ctx.close();}catch(e){}},2800);
    };
    if(ctx.state==="suspended"){ctx.resume().then(go).catch(()=>{});}
    else go();
  }catch(e){}
}

}

function SimuladorTab({phase,apiKey}){
  const[mode,setMode]=useState("menu");
  const[scenario,setScenario]=useState(null);
  const[chat,setChat]=useState([]);
  const[chatInput,setChatInput]=useState("");
  const[chatLoading,setChatLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[ chat]);
  const startScenario=(s)=>{
    setScenario(s);
    setChat([{role:"assistant",content:s.start}]);
    setMode("chat");
  };
  const send=async()=>{
    const text=chatInput.trim();
    if(!text||chatLoading)return;
    const key=apiKey();
    if(!key){setChat(prev=>[...prev,{role:"user",content:text},{role:"assistant",content:"Configure a API key em Progresso para usar o simulador."}]);setChatInput("");return;}
    const newHistory=[...chat,{role:"user",content:text}];
    setChat(newHistory);setChatInput("");setChatLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,system:JULIA_PERSONA+(scenario?"\n\nContexto da simulacao: "+scenario.context:""),messages:newHistory.slice(-8).map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||"...";
      setChat(prev=>[...prev,{role:"assistant",content:reply}]);
    }catch(e){setChat(prev=>[...prev,{role:"assistant",content:"Erro de conexao."}]);}
    setChatLoading(false);
  };
  if(mode==="menu")return(
    <div style={{padding:"16px"}}>
      <div style={{fontSize:"11px",color:"#8888AA",fontWeight:"700",marginBottom:"12px"}}>ESCOLHA O CENARIO</div>

          <div style={{width:"36px",height:"36px",borderRadius:"50%",background:"#1E1E3F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",fontWeight:"800",color:"#A89EFF",flex:"none"}}>{s.icon}</div>
          <div><div style={{fontSize:"13px",fontWeight:"700"}}>{s.title}</div><div style={{fontSize:"11px",color:"#8888AA",marginTop:"3px"}}>{s.context.slice(0,60)}...</div></div>
        </div>
      ))}
    </div>
  );
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"10px 16px",borderBottom:"1px solid #1E1E3F",display:"flex",alignItems:"center",gap:"10px"}}>
        <button onClick={()=>{setMode("menu");setChat([]);setScenario(null);}} style={{background:"transparent",border:"none",color:"#8888AA",fontSize:"18px",cursor:"pointer",padding:0}}>{"<"}</button>
        <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"600"}}>{scenario?.title}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:"10px"}}>
        {chat.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"80%",background:m.role==="user"?"linear-gradient(135deg,#7C6FFF,#5B4FFF)":"#0F0F24",border:m.role==="user"?"none":"1px solid #1E1E3F",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",fontSize:"13px",color:"#E8E8F5",lineHeight:"1.5",whiteSpace:"pre-wrap"}}>
              {m.content}
            </div>
          </div>
        ))}
        {chatLoading&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"18px 18px 18px 4px",padding:"10px 14px"}} className="typing"><span/><span/><span/></div></div>}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"10px 16px",borderTop:"1px solid #1E1E3F",display:"flex",gap:"8px"}}>
        <textarea value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Responda como voce responderia..." rows={2} style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"12px",padding:"10px 12px",color:"#E8E8F5",fontSize:"13px",resize:"none",lineHeight:"1.4",boxSizing:"border-box"}}/>
        <button onClick={send} disabled={!chatInput.trim()||chatLoading} style={{padding:"10px 14px",borderRadius:"12px",border:"none",background:!chatInput.trim()||chatLoading?"#1E1E3F":"linear-gradient(135deg,#7C6FFF,#5B4FFF)",color:"white",fontWeight:"700",fontSize:"16px",cursor:!chatInput.trim()||chatLoading?"default":"pointer"}}>→</button>
      </div>
    </div>
  );
}

// ===================== ALARMES TAB =====================
function AlarmesTab(){
  const[script,setScript]=useState("");
  const[alarms,setAlarms]=useState(()=>loadAlarmsDB());
  const[activeAlarm,setActiveAlarm]=useState(null);
  const[soundTest,setSoundTest]=useState(false);
  const[notifPerm,setNotifPerm]=useState(typeof Notification!=="undefined"?Notification.permission:"default");
  const[icsOk,setIcsOk]=useState(false);
  const activeRef=useRef(null);

  useEffect(()=>{saveAlarmsDB(alarms);},[alarms]);

  const alarmsRef=useRef([]);
  useEffect(()=>{alarmsRef.current=alarms;},[alarms]);
  const triggeredKeys=useRef(new Set());

  useEffect(()=>{
    const check=()=>{
      if(activeRef.current)return;
      const now=new Date();
      const dayCode=JS_DAY_TO_CODE[now.getDay()];
      const hh=String(now.getHours()).padStart(2,"0");
      const mm=String(now.getMinutes()).padStart(2,"0");
      const ct=hh+":"+mm;
      const minuteKey=now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate()+"-"+ct;
      // Purge old keys
      if(triggeredKeys.current.size>50)triggeredKeys.current.clear();
      const found=alarmsRef.current.find(a=>{
        if(!a.enabled)return false;
        if(a.dayCode!==dayCode)return false;
        if(a.time!==ct)return false;
        const tk=a.id+"-"+minuteKey;
        if(triggeredKeys.current.has(tk))return false;
        return true;
      });
      if(found){
        const tk=found.id+"-"+minuteKey;
        triggeredKeys.current.add(tk);
        activeRef.current=found;
        setActiveAlarm(found);
        try{startBarkLoop();}catch(e){}
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
          try{new Notification(found.title+" "+found.dayLabel,{body:found.message});}catch(e){}
        }
        setAlarms(prev=>prev.map(a=>a.id===found.id?{...a,lastKey:tk}:a));
      }
    };
    check();
    const interval=setInterval(check,15000);
    return()=>clearInterval(interval);
  },[]);

  useEffect(()=>{activeRef.current=activeAlarm;},[activeAlarm]);

  const analyze=()=>{
    const parsed=parseAlarmScript(script);
    if(parsed.length>0){setAlarms(parsed);}
    else{alert("Nenhum alarme encontrado. Verifique o formato do script.");}
  };

  const stopAlarm=()=>{stopBark();setActiveAlarm(null);};

  const snoozeAlarm=()=>{
    if(!activeAlarm)return;
    const now=new Date();now.setMinutes(now.getMinutes()+5);
    const hh=String(now.getHours()).padStart(2,"0");
    const mm=String(now.getMinutes()).padStart(2,"0");
    const snoozed={...activeAlarm,id:Math.random().toString(36).slice(2)+Date.now().toString(36),dayCode:JS_DAY_TO_CODE[now.getDay()],dayLabel:"Adiado",time:`${hh}:${mm}`,lastKey:"",enabled:true};
    setAlarms(prev=>[...prev,snoozed]);
    stopAlarm();
  };

  const requestNotif=async()=>{
    if(typeof Notification!=="undefined"){
      const perm=await Notification.requestPermission();
      setNotifPerm(perm);
    }
  };

  const TYPE_COLORS={manha:"#F59E0B",almoco:"#10B981",noite:"#6366F1",sono:"#8B5CF6",extra:"#EC4899"};
  const TYPE_EMOJI={manha:"☀️",almoco:"🍽️",noite:"🌙",sono:"😴",extra:"⏰"};

  const SAMPLE_SCRIPT=`## SEGUNDA\n\n**07:30**\n> Segunda! Toma agora: Vyvanse, Fluoxetina, L-teanina 200mg, Omeg-3, Vitamina D3 e Rhodiola Rosea.\n\n**12:30**\n> Almoco! Com a comida: Zinco 30mg, Maca peruana e Complexo B.\n\n**21:00**\n> Chegou do box! Toma agora: Magnesio 400mg, Guanfacina e Ashwagandha.\n\n**22:30**\n> Dorme em meia hora. Para o celular, vai dormir as 23:00.\n\n## TERCA\n\n**07:30**\n> Terca! Toma agora: Vyvanse, Fluoxetina, L-teanina 200mg, Omega-3, Vitamina D3 e Rhodiola Rosea.\n\n**12:30**\n> Almoco! Com a comida: Zinco 30mg, Maca peruana e Complexo B.\n\n**21:30**\n> Chegou da academia! Toma agora: Magnesio 400mg, Guanfacina e Ashwagandha.\n\n**22:30**\n> Dorme em meia hora.`;

  return(
    <div style={{padding:"16px"}}>
      {/* ALARM MODAL FULLSCREEN */}
      {activeAlarm&&(
        <div style={{position:"fixed",inset:0,background:"#000000EE",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
          <div style={{fontSize:"14px",letterSpacing:"3px",color:"#FF5566",fontWeight:"900",marginBottom:"8px"}} className="alarm-pulse">🐕 ALARME 🐕</div>
          <div style={{fontSize:"82px",fontWeight:"900",lineHeight:1,letterSpacing:"-2px",marginBottom:"4px"}} className="bark-anim">{activeAlarm.time}</div>
          <div style={{fontSize:"18px",color:"#8888AA",marginBottom:"4px"}}>{activeAlarm.dayLabel}</div>
          <div style={{fontSize:"13px",color:TYPE_COLORS[activeAlarm.type]||"#A89EFF",fontWeight:"700",marginBottom:"20px"}}>{TYPE_EMOJI[activeAlarm.type]} {activeAlarm.title}</div>
          <div style={{background:"#0F0F24",borderRadius:"18px",padding:"20px 24px",maxWidth:"340px",width:"100%",marginBottom:"28px",border:"1px solid #2A2A4A"}}>
            <div style={{fontSize:"15px",color:"#E8E8F5",lineHeight:"1.7",textAlign:"center"}}>{activeAlarm.message}</div>
          </div>
          <div style={{display:"flex",gap:"12px",width:"100%",maxWidth:"340px"}}>
            <button onClick={snoozeAlarm} style={{flex:1,padding:"16px",borderRadius:"16px",border:"none",background:"#1E1E3F",color:"#A89EFF",fontWeight:"700",fontSize:"14px",cursor:"pointer"}}>⏰ Adiar 5 min</button>
            <button onClick={stopAlarm} style={{flex:1,padding:"16px",borderRadius:"16px",border:"none",background:"#DC2626",color:"white",fontWeight:"700",fontSize:"14px",cursor:"pointer"}}>🔕 Desligar</button>
          </div>

// ===================== CHAT JULIA TAB =====================
function ChatTab({apiKey}){
  const[messages,setMessages]=useState([{role:"assistant",content:"Oi Gustavo. Sou seu conselheiro baseado em 8 meses de historico com a Julia.\n\nMe conta o que esta acontecendo — pode colar uma conversa, uma situacao, ou perguntar como agir. Sou direto e pratico."}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[pasteMode,setPasteMode]=useState(false);
  const[pasteText,setPasteText]=useState("");
  const endRef=useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const CHAT_SYS=`Voce e conselheiro pessoal do Gustavo sobre seu relacionamento com Julia.
Gustavo: apego ansioso, fez terapia, cresceu muito no autocontrole, mas ainda tem o padrao de buscar reasseguramento quando ansioso.
Julia: apego evitativo, 6 meses de relacionamento (desde jan 2026), trabalha no salao da mae, crista, caseira, faz croche, tem peixinhos.
Historico real: "Intensa so na cabeca mas deixo pouco sair." / "Nao consigo demonstrar quando quero, nem sei como." / "Eu simplesmente travo."
Vocabulario dela: mb, nuuu, ixi, blzinha, hehehe, sim sim, pse, sla, vrdd, fazer oq.
Marco 2026: primeiro "te amo" por iniciativa propria.
Junho 2026: "Vc e meu namorado, eu te amo e sei q vc e o cara certo pra isso."
Julho 2026: "Vamos conseguir. Aos poucos vamos saber lidar."

REGRAS DO PADRAO ANSIOSO-EVITATIVO:
- Pressao gera afastamento. Espaco gera abertura.
- Gestos silenciosos > declaracoes que exigem reacao.
- Silencio dela nao e rejeicao, e processamento.
- Meme dela = janela aberta. Acompanhe, nao aprofunde.
- Quando Gustavo esta ansioso: cuide de si, depois interaja.
- Nunca dois "ta tudo bem?" seguidos.

QUANDO ANALISAR CONVERSA:
- Identifique o estado dela (fechada/neutra/aberta)
- Aponte o que funcionou e o que criou pressao
- Sugira resposta exata se pedido

SEJA: direto, pratico, sem coach generico.
Se pedir mensagem exata: forneça o texto para copiar, em PT-BR informal.
Foque em apego ansioso-evitativo e como Gustavo pode melhorar suas reacoes.`;

  const send=async()=>{
    const text=input.trim();
    if(!text||loading)return;
    const key=apiKey();
    if(!key){
      setMessages(prev=>[...prev,{role:"user",content:text},{role:"assistant",content:"⚠️ Configure a API key em Progresso → API Key para usar o chat com IA."}]);
      setInput("");return;
    }
    const newMsg={role:"user",content:text};
    const history=[...messages,newMsg];
    setMessages(history);setInput("");setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:CHAT_SYS,messages:history.slice(-12).map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||"Erro ao processar.";
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
    }catch(e){setMessages(prev=>[...prev,{role:"assistant",content:"Erro de conexao. Verifique sua internet e API key."}]);}
    setLoading(false);
  };

  const addConversation=()=>{
    if(!pasteText.trim())return;
    setInput("Analisa essa conversa minha com a Julia e me diz o que esta certo, o que esta errado, e como devo responder:\n\n"+pasteText);
    setPasteText("");setPasteMode(false);
  };

  if(pasteMode)return(
    <div style={{padding:"16px",height:"100%"}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
        <button onClick={()=>setPasteMode(false)} style={{background:"transparent",border:"none",color:"#8888AA",fontSize:"20px",cursor:"pointer",padding:0}}>{"<"}</button>
        <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"700"}}>COLAR CONVERSA DO WHATSAPP</div>
      </div>
      <div style={{fontSize:"12px",color:"#555577",marginBottom:"10px",lineHeight:"1.5"}}>Cole aqui qualquer trecho de conversa com a Julia. Vou analisar o padrao, o que funcionou e o que criou pressao.</div>
      <textarea
        value={pasteText}
        onChange={e=>setPasteText(e.target.value)}
        placeholder={"Julia: sim sim\nVoce: ta tudo bem?\nJulia: to bem\n..."}
        style={{width:"100%",minHeight:"220px",background:"#080814",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"12px",color:"#E8E8F5",fontSize:"12px",lineHeight:"1.5",resize:"vertical",fontFamily:"monospace",boxSizing:"border-box",marginBottom:"10px"}}
      />
      <button onClick={addConversation} style={{width:"100%",padding:"13px",borderRadius:"10px",border:"none",background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",color:"white",fontWeight:"700",fontSize:"13px",cursor:"pointer"}}>
        Enviar para analise →
      </button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:"12px",maxHeight:"calc(100vh - 260px)"}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="assistant"&&<div style={{width:"28px",height:"28px",borderRadius:"50%",background:"#1E1E3F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flex:"none",marginRight:"8px",alignSelf:"flex-end"}}>🧠</div>}
            <div style={{maxWidth:"82%",background:m.role==="user"?"linear-gradient(135deg,#7C6FFF,#5B4FFF)":"#0F0F24",border:m.role==="user"?"none":"1px solid #1E1E3F",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"12px 14px",fontSize:"13px",color:"#E8E8F5",lineHeight:"1.65",whiteSpace:"pre-wrap"}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",justifyContent:"flex-start",gap:"8px",alignItems:"flex-end"}}>
            <div style={{width:"28px",height:"28px",borderRadius:"50%",background:"#1E1E3F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flex:"none"}}>🧠</div>
            <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"18px 18px 18px 4px",padding:"12px 14px"}} className="typing"><span/><span/><span/></div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"10px 14px",borderTop:"1px solid #1E1E3F"}}>
        <button onClick={()=>setPasteMode(true)} style={{width:"100%",padding:"8px",borderRadius:"8px",border:"1px dashed #1E1E3F",background:"transparent",color:"#555577",fontWeight:"600",fontSize:"11px",cursor:"pointer",marginBottom:"8px"}}>
          📋 Colar conversa do WhatsApp para analise
        </button>
        <div style={{display:"flex",gap:"8px"}}>
          <textarea
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="O que ta acontecendo?"
            rows={2}
            style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"12px",padding:"10px 12px",color:"#E8E8F5",fontSize:"13px",resize:"none",lineHeight:"1.4",boxSizing:"border-box"}}
          />
          <button onClick={send} disabled={loading||!input.trim()} style={{padding:"10px 14px",borderRadius:"12px",border:"none",background:loading||!input.trim()?"#1E1E3F":"linear-gradient(135deg,#7C6FFF,#5B4FFF)",color:"white",fontWeight:"700",fontSize:"16px",cursor:loading||!input.trim()?"default":"pointer",alignSelf:"flex-end"}}>→</button>
        </div>
        <div style={{fontSize:"10px",color:"#222244",textAlign:"center",marginTop:"4px"}}>Enter envia • Shift+Enter nova linha</div>
      </div>
    </div>
  );
}

    setBLoad(true);

// ===================== ANALISE TAB =====================
function AnaliseTab({apiKey}){
  const[convText,setConvText]=useState("");
  const[result,setResult]=useState("");
  const[loading,setLoading]=useState(false);
  const[subTab,setSubTab]=useState("input");
  const[history,setHistory]=useState(()=>{try{const r=localStorage.getItem("dtq_analises");return r?JSON.parse(r):[];}catch(e){return [];}});

  const ANALISE_SYS=`Voce e especialista em psicologia do apego, comunicacao nao-violenta e relacionamentos.
Analise a conversa fornecida entre Lucas (apego ansioso) e Julia (apego evitativo) com profundidade clinica.

PERFIL BASE FIXO:
Lucas: ansioso, 24 anos, busca reasseguramento, ja fez terapia, cresceu em autocontrole mas ainda pressiona quando ansioso. Ponto cego: persistencia em obter informacao quando ansioso.
Julia: evitativa, trabalha no salao da mae, crista, caseira, faz croche, tem peixinhos. "Intensa so na cabeca, deixo muito pouco sair." "Nao consigo demonstrar quando quero, nem sei como."
Relacionamento: 6 meses (jan 2026). Marco 2026: primeiro "te amo" por iniciativa propria. Jun 2026: "vc e o cara certo pra isso." Jul 2026: "Vamos conseguir."

ESTRUTURA OBRIGATORIA (use EXATAMENTE estes headers, sem alterar):
ESTADO: [N]/10
[1 linha de justificativa]

LUCAS_BEM:
[bullet cada item]

LUCAS_MELHORAR:
[bullet cada item + como melhorar especificamente]

JULIA_BEM:
[bullet cada item]

JULIA_MELHORAR:
[bullet cada item + como Lucas pode pedir sem pressionar]

LUCAS_PODE_COBRAR:
[bullet cobracas legitimas]

JULIA_PODE_COBRAR:
[bullet cobracas legitimas]

ACOES_7_DIAS:
1. [acao especifica para Lucas]
2. [acao]
3. [acao]

FORECAST_30:
[previsao realista baseada nos padroes da conversa]

INSIGHT_PRINCIPAL:
[a coisa mais importante que Lucas precisa entender agora]

PERSONALIDADE_LUCAS:
[analise do padrao comportamental revelado na conversa]

PERSONALIDADE_JULIA:
[analise do padrao comportamental revelado na conversa]

Seja CIRURGICO e ESPECIFICO — baseado no que esta NA CONVERSA. Nao seja generico.`;

  const parseResult=(text)=>{
    const sections={
      estado:"",justificativa:"",lucasBem:[],lucasMelhorar:[],juliaBem:[],juliaMelhorar:[],
      lucasCobrar:[],juliaCobrar:[],acoes:[],forecast:"",insight:"",persLucas:"",persJulia:""
    };
    const lines=text.split("
");
    let current="";
    for(const line of lines){
      const t=line.trim();
      if(!t)continue;
      if(t.startsWith("ESTADO:")){const m=t.match(/(\d+)\/10/);if(m)sections.estado=m[1];current="justificativa";continue;}
      if(t==="LUCAS_BEM:"){current="lucasBem";continue;}
      if(t==="LUCAS_MELHORAR:"){current="lucasMelhorar";continue;}
      if(t==="JULIA_BEM:"){current="juliaBem";continue;}
      if(t==="JULIA_MELHORAR:"){current="juliaMelhorar";continue;}
      if(t==="LUCAS_PODE_COBRAR:"){current="lucasCobrar";continue;}
      if(t==="JULIA_PODE_COBRAR:"){current="juliaCobrar";continue;}
      if(t==="ACOES_7_DIAS:"){current="acoes";continue;}
      if(t==="FORECAST_30:"){current="forecast";continue;}
      if(t==="INSIGHT_PRINCIPAL:"){current="insight";continue;}
      if(t==="PERSONALIDADE_LUCAS:"){current="persLucas";continue;}
      if(t==="PERSONALIDADE_JULIA:"){current="persJulia";continue;}
      const clean=t.replace(/^[•\-\*]\s*/,"").replace(/^\d+\.\s*/,"");
      if(current==="justificativa"){sections.justificativa=clean;}
      else if(["lucasBem","lucasMelhorar","juliaBem","juliaMelhorar","lucasCobrar","juliaCobrar","acoes"].includes(current)){
        if(clean)sections[current].push(clean);
      }
      else if(["forecast","insight","persLucas","persJulia"].includes(current)){
        sections[current]+=(sections[current]?" ":"")+clean;
      }
    }
    return sections;
  };

  const analisar=async()=>{
    if(!convText.trim()){alert("Cole a conversa antes de analisar.");return;}
    const key=apiKey();
    if(!key){setResult("Configure a API key em Progresso para usar esta funcao.");setSubTab("result");return;}
    setLoading(true);setResult("");setSubTab("result");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1800,system:ANALISE_SYS,
          messages:[{role:"user",content:"Analise esta conversa entre Lucas e Julia:

"+convText.slice(0,8000)}]})
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));setResult("Erro "+res.status+": "+(e.error?.message||"Tente novamente."));setLoading(false);return;}
      const data=await res.json();
      const text=data.content?.[0]?.text||"Erro ao processar.";
      setResult(text);
      // Save to history
      const entry={id:Date.now(),date:new Date().toLocaleDateString("pt-BR"),preview:convText.slice(0,80)+"...",result:text};
      const newHistory=[entry,...history.slice(0,4)];
      setHistory(newHistory);
      try{localStorage.setItem("dtq_analises",JSON.stringify(newHistory));}catch(e){}
    }catch(e){setResult("Erro de conexao: "+e.message);}
    setLoading(false);
  };

  const parsed=result?parseResult(result):null;
  const score=parsed?parseInt(parsed.estado)||0:0;
  const scoreColor=score>=8?"#48BB8C":score>=6?"#F59E0B":score>=4?"#FF8C47":"#FF5566";

  const Section=({title,items,color,bg})=>items&&items.length>0?(
    <div style={{background:bg||"#0F0F24",border:"1px solid "+(color||"#1E1E3F")+"44",borderRadius:"14px",padding:"14px",marginBottom:"10px"}}>
      <div style={{fontSize:"11px",color:color||"#8888AA",fontWeight:"700",letterSpacing:"0.5px",marginBottom:"10px"}}>{title}</div>
      {items.map((item,i)=>(
        <div key={i} style={{display:"flex",gap:"8px",marginBottom:"8px",alignItems:"flex-start"}}>
          <div style={{width:"6px",height:"6px",borderRadius:"50%",background:color||"#8888AA",flex:"none",marginTop:"5px"}}/>
          <div style={{fontSize:"13px",color:"#CCCCDD",lineHeight:"1.6"}}>{item}</div>
        </div>
      ))}
    </div>
  ):null;

  const TextSection=({title,text,color})=>text?(
    <div style={{background:"#0F0F24",border:"1px solid "+(color||"#1E1E3F")+"44",borderRadius:"14px",padding:"14px",marginBottom:"10px"}}>
      <div style={{fontSize:"11px",color:color||"#8888AA",fontWeight:"700",letterSpacing:"0.5px",marginBottom:"8px"}}>{title}</div>
      <div style={{fontSize:"13px",color:"#E8E8F5",lineHeight:"1.7"}}>{text}</div>
    </div>
  ):null;

  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
        {[["input","📋 Conversa"],["result","📊 Análise"],["history","🕐 Histórico"]].map(([t,l])=>(
          <button key={t} onClick={()=>setSubTab(t)} style={{flex:1,padding:"9px",borderRadius:"9px",border:"none",background:subTab===t?"#1E1E3F":"transparent",color:subTab===t?"#A89EFF":"#8888AA",fontWeight:"600",fontSize:"11px",cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {subTab==="input"&&(
        <div>
          <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"16px",padding:"16px",marginBottom:"12px"}}>
            <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"700",marginBottom:"4px"}}>COLE A CONVERSA</div>
            <div style={{fontSize:"11px",color:"#555577",marginBottom:"10px"}}>Exportacao do WhatsApp, print, ou qualquer trecho da conversa</div>
            <textarea value={convText} onChange={e=>setConvText(e.target.value)}
              placeholder={"[06/07 22:14] Lucas: oi
[06/07 22:15] Julia: oi mb
..."}
              style={{width:"100%",minHeight:"200px",background:"#080814",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"12px",color:"#E8E8F5",fontSize:"12px",lineHeight:"1.6",resize:"vertical",fontFamily:"monospace",boxSizing:"border-box",marginBottom:"10px"}}/>
            <div style={{fontSize:"11px",color:"#555577",marginBottom:"12px"}}>{convText.length} caracteres • {convText.split("
").filter(l=>l.trim()).length} linhas</div>
            <button onClick={analisar} disabled={loading||!convText.trim()} style={{width:"100%",padding:"14px",borderRadius:"12px",border:"none",background:loading||!convText.trim()?"#1E1E3F":"linear-gradient(135deg,#7C6FFF,#5B4FFF)",color:loading||!convText.trim()?"#555577":"white",fontWeight:"700",fontSize:"14px",cursor:loading||!convText.trim()?"default":"pointer"}}>
              {loading?"Analisando...":"🔍 Analisar Relacionamento"}
            </button>
          </div>
          <div style={{background:"rgba(124,111,255,0.05)",border:"1px solid rgba(124,111,255,0.15)",borderRadius:"12px",padding:"14px"}}>
            <div style={{fontSize:"11px",color:"#7C6FFF",fontWeight:"700",marginBottom:"8px"}}>O QUE A ANALISE VAI MOSTRAR</div>
            {["Estado do relacionamento (0-10) com justificativa","O que Lucas faz bem e deve melhorar","O que Julia faz bem e deve melhorar","O que cada um pode cobrar legitimamente","3 acoes concretas para os proximos 7 dias","Previsao de 30 dias baseada nos padroes","Perfil de personalidade de cada um revelado na conversa","Insight principal — a coisa mais importante agora"].map((t,i)=>(
              <div key={i} style={{display:"flex",gap:"8px",marginBottom:"6px",alignItems:"flex-start"}}>
                <div style={{fontSize:"11px",color:"#555577",flex:"none"}}>→</div>
                <div style={{fontSize:"12px",color:"#8888AA"}}>{t}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {subTab==="result"&&(
        <div>
          {loading&&<div style={{textAlign:"center",padding:"40px",color:"#555577"}}><div style={{fontSize:"40px",marginBottom:"12px"}}>🔍</div><div>Analisando conversa...</div><div style={{marginTop:"16px",display:"flex",justifyContent:"center"}} className="typing"><span/><span/><span/></div></div>}
          {!loading&&!result&&<div style={{textAlign:"center",padding:"40px",color:"#555577"}}><div style={{fontSize:"40px",marginBottom:"12px"}}>📊</div><div>Cole uma conversa na aba Conversa e clique Analisar</div></div>}
          {!loading&&result&&parsed&&(
            <div className="fade">
              {/* Score card */}
              <div style={{background:"#0F0F24",border:"1px solid "+scoreColor+"44",borderRadius:"16px",padding:"20px",marginBottom:"14px",textAlign:"center"}}>
                <div style={{fontSize:"11px",color:"#8888AA",fontWeight:"700",marginBottom:"8px"}}>ESTADO DO RELACIONAMENTO</div>
                <div style={{fontSize:"56px",fontWeight:"900",color:scoreColor,lineHeight:1}}>{parsed.estado}<span style={{fontSize:"24px",color:"#555577"}}>/10</span></div>
                {parsed.justificativa&&<div style={{fontSize:"13px",color:"#CCCCDD",marginTop:"10px",lineHeight:"1.5"}}>{parsed.justificativa}</div>}
              </div>
              {/* Insight */}
              {parsed.insight&&<div style={{background:"rgba(196,162,74,0.08)",border:"1px solid rgba(196,162,74,0.3)",borderRadius:"14px",padding:"16px",marginBottom:"14px"}}>
                <div style={{fontSize:"11px",color:"#C4A24A",fontWeight:"700",marginBottom:"8px"}}>⚡ INSIGHT PRINCIPAL</div>
                <div style={{fontSize:"14px",color:"#E8D07A",lineHeight:"1.7",fontStyle:"italic"}}>{parsed.insight}</div>
              </div>}
              {/* Lucas sections */}
              <Section title="✅ LUCAS — O QUE FAZ BEM" items={parsed.lucasBem} color="#48BB8C" bg="#0D2D1A"/>
              <Section title="⚠️ LUCAS — DEVE MELHORAR" items={parsed.lucasMelhorar} color="#FF8C47" bg="#2D1A0D"/>
              {/* Julia sections */}
              <Section title="✅ JULIA — O QUE FAZ BEM" items={parsed.juliaBem} color="#7C6FFF" bg="#12103A"/>
              <Section title="⚠️ JULIA — DEVE MELHORAR" items={parsed.juliaMelhorar} color="#CC77FF" bg="#1A1230"/>
              {/* Cobrar */}
              <Section title="💬 O QUE LUCAS PODE COBRAR" items={parsed.lucasCobrar} color="#48BB8C"/>
              <Section title="💬 O QUE JULIA PODE COBRAR" items={parsed.juliaCobrar} color="#CC77FF"/>
              {/* Actions */}
              {parsed.acoes.length>0&&<div style={{background:"#0F0F24",border:"1px solid #C4A24A44",borderRadius:"14px",padding:"14px",marginBottom:"10px"}}>
                <div style={{fontSize:"11px",color:"#C4A24A",fontWeight:"700",marginBottom:"10px"}}>🎯 PROXIMOS 7 DIAS</div>
                {parsed.acoes.map((a,i)=>(
                  <div key={i} style={{display:"flex",gap:"10px",marginBottom:"10px",alignItems:"flex-start"}}>
                    <div style={{width:"22px",height:"22px",borderRadius:"50%",background:"rgba(196,162,74,0.15)",border:"1px solid rgba(196,162,74,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"700",color:"#C4A24A",flex:"none"}}>{i+1}</div>
                    <div style={{fontSize:"13px",color:"#E8D07A",lineHeight:"1.6"}}>{a}</div>
                  </div>
                ))}
              </div>}
              {/* Forecast */}
              <TextSection title="📅 FORECAST 30 DIAS" text={parsed.forecast} color="#6366F1"/>
              {/* Personalities */}
              <TextSection title="🧠 PERSONALIDADE — LUCAS (revelada na conversa)" text={parsed.persLucas} color="#FF8C47"/>
              <TextSection title="🧠 PERSONALIDADE — JULIA (revelada na conversa)" text={parsed.persJulia} color="#CC77FF"/>
              <button onClick={()=>{setSubTab("input");}} style={{width:"100%",padding:"12px",borderRadius:"10px",border:"1px solid #1E1E3F",background:"transparent",color:"#8888AA",fontWeight:"600",fontSize:"13px",cursor:"pointer",marginTop:"4px"}}>
                ← Nova analise
              </button>
            </div>
          )}
        </div>
      )}

      {subTab==="history"&&(
        <div>
          {history.length===0?(
            <div style={{textAlign:"center",padding:"40px",color:"#555577"}}><div style={{fontSize:"40px",marginBottom:"12px"}}>🕐</div><div>Nenhuma analise salva ainda</div></div>
          ):(
            history.map((entry,i)=>(
              <div key={entry.id} onClick={()=>{setResult(entry.result);setSubTab("result");}} style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"14px",marginBottom:"10px",cursor:"pointer"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
                  <div style={{fontSize:"11px",color:"#C4A24A",fontWeight:"700"}}>Analise #{history.length-i}</div>
                  <div style={{fontSize:"11px",color:"#555577"}}>{entry.date}</div>
                </div>
                <div style={{fontSize:"12px",color:"#8888AA",lineHeight:"1.5"}}>{entry.preview}</div>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

        return{level:"Apego Seguro",color:"#C4A24A",icon:"⭐",text:"Parabens — voce construiu base de apego seguro. Raro e resultado de trabalho consciente.",tips:["Continue o trabalho — o apego e dinamico, nao estatico","Agora o foco: ajudar ela a se sentir mais segura com voce","Compartilhe aprendizados — voce pode ser referencia para outros"]};

      desc:"Avalia sua capacidade de regular reacoes em momentos de tensao no relacionamento.",
      xpReward:40,
      icon:"🧘",
      color:"#FF8C47",
      questions:[
        {q:"Quando ela esta fria, consigo ficar neutro sem demonstrar ansiedade",anxious:false},

        return{level:"Excelente",color:"#C4A24A",icon:"⭐",text:"Alto autocontrole. Voce consegue regular suas reacoes mesmo nos cenarios mais dificeis.",tips:["Agora o nivel avancado: regulacao proativa, nao so reativa","Pratique criar espaco seguro para ela quando ela esta tensa","Ensine pelo exemplo — sua calma cria seguranca para ela abrir"]};
      }
    },
    {
      id:"comunicacao",
      title:"Qualidade de Comunicacao",
      desc:"Avalia como voce se comunica com Julia — o que abre e o que fecha a conexao.",
      xpReward:40,
      icon:"💬",
      color:"#48BB8C",
      questions:[
        {q:"Faco perguntas abertas que dao a ela controle da resposta",anxious:false},
        {q:"Quando ela compartilha algo, nao ofereço solucao imediatamente",anxious:false},
        {q:"Uso humor para aliviar tensao em vez de intensificar",anxious:false},
        {q:"Respeito o ritmo de resposta dela sem cobrar",anxious:false},
        {q:"Quando quero algo, peço diretamente em vez de indiretamente",anxious:false},
        {q:"Mando multiplas perguntas seguidas na mesma mensagem",anxious:true},
        {q:"Mando mensagens longas com muito conteudo emocional",anxious:true},
        {q:"Quando ela da resposta curta, mando outra mensagem logo",anxious:true},
      ],
      interpret:(score)=>{

      }
    },
  ];

  const[currentTest,setCurrentTest]=useState(null);
  const[answers,setAnswers]=useState({});
  const[showResult,setShowResult]=useState(false);
  const[completedTests,setCompletedTests]=useState(()=>{try{const r=localStorage.getItem("dtq_tests");return r?JSON.parse(r):{};}catch(e){return{};}});

  const startTest=(test)=>{setCurrentTest(test);setAnswers({});setShowResult(false);};

  const answer=(qi,val)=>{setAnswers(prev=>({...prev,[qi]:val}));};

  const calcScore=(test)=>{
    let score=0;
    test.questions.forEach((q,i)=>{
      const a=answers[i]||3;
      if(q.anxious){score+=(6-a);}
      else{score+=a;}
    });
    return score;
  };

  const finishTest=()=>{
    if(!currentTest)return;
    const answered=Object.keys(answers).length;
    if(answered<currentTest.questions.length){alert("Responda todas as "+currentTest.questions.length+" perguntas.");return;}
    const score=calcScore(currentTest);
    const newCompleted={...completedTests,[currentTest.id]:{score,date:new Date().toLocaleDateString("pt-BR")}};
    setCompletedTests(newCompleted);
    try{localStorage.setItem("dtq_tests",JSON.stringify(newCompleted));}catch(e){}
    if(!completedTests[currentTest.id]){save({...progress,xp:progress.xp+currentTest.xpReward},null);}
    setShowResult(true);
  };

  if(currentTest&&!showResult){
    const maxQ=currentTest.questions.length;
    const answered=Object.keys(answers).length;

      <div style={{padding:"16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}>

            <div style={{fontSize:"11px",color:"#555577"}}>{answered}/{maxQ} respondidas</div>
          </div>
        </div>
        <div style={{height:"3px",background:"#1E1E3F",borderRadius:"99px",marginBottom:"16px"}}>
          <div style={{width:(answered/maxQ*100)+"%",height:"100%",background:currentTest.color,borderRadius:"99px",transition:"width 0.3s"}}/>
        </div>
        {currentTest.questions.map((q,qi)=>(
          <div key={qi} style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"14px",marginBottom:"12px"}}>
            <div style={{fontSize:"13px",color:"#E8E8F5",lineHeight:"1.6",marginBottom:"12px"}}>{qi+1}. {q.q}</div>
            <div style={{display:"flex",gap:"6px",justifyContent:"center"}}>
              {[[1,"Nunca"],[2,"Raramente"],[3,"As vezes"],[4,"Freq."],[5,"Sempre"]].map(([val,label])=>{
                const sel=answers[qi]===val;
                const c=val<=2?"#48BB8C":val===3?"#8888AA":val<=4?"#FF8C47":"#FF5566";
                return(
                  <div key={val} onClick={()=>answer(qi,val)} style={{flex:1,textAlign:"center",background:sel?c+"22":"#080814",border:"2px solid "+(sel?c:"#1E1E3F"),borderRadius:"10px",padding:"8px 4px",cursor:"pointer",transition:"all 0.15s"}}>
                    <div style={{fontSize:"16px",fontWeight:sel?"900":"400",color:sel?c:"#8888AA"}}>{val}</div>
                    <div style={{fontSize:"9px",color:sel?c:"#444466",marginTop:"2px"}}>{label}</div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        <button onClick={finishTest} disabled={answered<maxQ} style={{width:"100%",padding:"14px",borderRadius:"12px",border:"none",background:answered<maxQ?"#1E1E3F":"linear-gradient(135deg,"+currentTest.color+","+currentTest.color+"BB)",color:answered<maxQ?"#555577":"white",fontWeight:"700",fontSize:"14px",cursor:answered<maxQ?"default":"pointer"}}>
          {answered<maxQ?`Responda mais ${maxQ-answered}`:"Ver Resultado →"}
        </button>
      </div>
    );
  }

  if(currentTest&&showResult){
    const score=calcScore(currentTest);
    const interp=currentTest.interpret(score);
    return(
      <div style={{padding:"16px"}}>
        <div style={{background:"#0F0F24",border:"1px solid "+interp.color+"44",borderRadius:"18px",padding:"24px",marginBottom:"14px",textAlign:"center"}}>
          <div style={{fontSize:"36px",marginBottom:"8px"}}>{interp.icon}</div>
          <div style={{fontSize:"18px",fontWeight:"800",color:interp.color,marginBottom:"4px"}}>{interp.level}</div>
          <div style={{fontSize:"36px",fontWeight:"900",lineHeight:1}}>{score}<span style={{fontSize:"16px",color:"#555577"}}>/{currentTest.questions.length*5}</span></div>
          <div style={{fontSize:"12px",color:interp.color,marginTop:"4px",fontWeight:"600"}}>+{currentTest.xpReward} XP {completedTests[currentTest.id]?"(ja ganho)":"ganhos!"}</div>
        </div>
        <div style={{background:"rgba(124,111,255,0.06)",border:"1px solid rgba(124,111,255,0.2)",borderRadius:"14px",padding:"16px",marginBottom:"14px"}}>
          <div style={{fontSize:"13px",color:"#E8E8F5",lineHeight:"1.7"}}>{interp.text}</div>
        </div>
        <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"16px",marginBottom:"14px"}}>
          <div style={{fontSize:"11px",color:"#C4A24A",fontWeight:"700",marginBottom:"12px"}}>PARA TRABALHAR</div>
          {interp.tips.map((tip,i)=>(
            <div key={i} style={{display:"flex",gap:"10px",marginBottom:"10px",alignItems:"flex-start"}}>
              <div style={{fontSize:"13px",color:"#C4A24A",flex:"none",fontWeight:"700"}}>{i+1}.</div>
              <div style={{fontSize:"13px",color:"#CCCCDD",lineHeight:"1.6"}}>{tip}</div>
            </div>
          ))}
        </div>
        <button onClick={()=>{setCurrentTest(null);setShowResult(false);}} style={{width:"100%",padding:"12px",borderRadius:"10px",border:"1px solid #1E1E3F",background:"transparent",color:"#8888AA",fontWeight:"600",fontSize:"13px",cursor:"pointer"}}>
          ← Voltar aos testes
        </button>
      </div>
    );
  }

  return(
    <div style={{padding:"16px"}}>
      <div style={{fontSize:"12px",color:"#8888AA",marginBottom:"14px",lineHeight:"1.6"}}>
        Testes de autoavaliacao baseados em psicologia do apego. Honestidade e mais valiosa que score alto.
      </div>
      {TESTES.map(test=>{
        const done=completedTests[test.id];
        return(
          <div key={test.id} onClick={()=>startTest(test)} style={{background:"#0F0F24",border:"1px solid "+(done?test.color+"44":"#1E1E3F"),borderRadius:"16px",padding:"16px",marginBottom:"12px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                <div style={{fontSize:"24px"}}>{test.icon}</div>
                <div>
                  <div style={{fontSize:"14px",fontWeight:"700",color:done?test.color:"#E8E8F5"}}>{test.title}</div>
                  <div style={{fontSize:"11px",color:"#555577",marginTop:"2px"}}>{test.questions.length} perguntas • +{test.xpReward} XP</div>
                </div>
              </div>
              {done&&<div style={{fontSize:"12px",color:test.color,fontWeight:"700",background:test.color+"15",padding:"4px 10px",borderRadius:"99px"}}>{done.score}/{test.questions.length*5}</div>}
            </div>
            <div style={{fontSize:"12px",color:"#8888AA",lineHeight:"1.5"}}>{test.desc}</div>
            {done&&<div style={{fontSize:"11px",color:"#555577",marginTop:"8px"}}>Feito em {done.date} — toque para refazer</div>}
          </div>
        );
      })}
      <div style={{background:"rgba(196,162,74,0.05)",border:"1px solid rgba(196,162,74,0.15)",borderRadius:"12px",padding:"14px",marginTop:"8px"}}>
        <div style={{fontSize:"11px",color:"#C4A24A",fontWeight:"700",marginBottom:"6px"}}>DICA DE USO</div>
        <div style={{fontSize:"12px",color:"#AAA870",lineHeight:"1.6"}}>Faca os testes a cada 2-4 semanas para ver sua evolucao. O objetivo nao e score perfeito — e honestidade e progresso consistente.</div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
