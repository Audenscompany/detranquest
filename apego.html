function calcPhase(lastDate,cycleLen){
  if(!lastDate)return null;
  const today=new Date();
  const last=new Date(lastDate);
  const diff=Math.floor((today-last)/(1000*60*60*24));
  const day=(diff%cycleLen)+1;
  let phase;
  if(day<=5)phase="menstrual";
  else if(day<=13)phase="folicular";
  else if(day<=16)phase="ovulacao";
  else if(day<=22)phase="luteal";
  else phase="pms";
  return{phase,day,daysUntil:cycleLen-day+1,data:CYCLE_PHASES[phase]};
}
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function getLevel(xp){return LEVELS.slice().reverse().find(l=>xp>=l.min)||LEVELS[0];}
function analyzeMsg(msg){
  if(!msg||!msg.trim())return 0;
  const l=msg.toLowerCase();
  let s=0;
  ["precisamos conversar","por que voce","me conta tudo","ta tudo bem?","preciso saber"].forEach(p=>{if(l.includes(p))s+=3;});
  ["me conta","como voce ta","voce sumiu","estou preocupado"].forEach(p=>{if(l.includes(p))s+=1.5;});
  ["no seu tempo","sem pressao","quando quiser","tudo bem","deixa pra la"].forEach(p=>{if(l.includes(p))s-=2;});
  s+=(msg.match(/\?/g)||[]).length*0.8;
  if(msg.length>200)s+=2.5;
  if(msg.length<25)s-=1;
  return s;
}

    try{localStorage.setItem("dtq_v7",JSON.stringify({progress:p||progress,ciclo:c||ciclo}));}catch(e){}
  };

    if(form.email===AUTH.email&&form.password===AUTH.password)setScreen("app");

        </div>
        {loginErr&&<div style={{color:"#FF5566",fontSize:"13px",textAlign:"center",marginBottom:"12px"}}>{loginErr}</div>}
        <input style={{width:"100%",background:"#080814",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"12px 14px",color:"#E8E8F5",fontSize:"15px",boxSizing:"border-box",marginBottom:"10px"}} type="email" placeholder="Email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        <input style={{width:"100%",background:"#080814",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"12px 14px",color:"#E8E8F5",fontSize:"15px",boxSizing:"border-box",marginBottom:"18px"}} type="password" placeholder="Senha" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        <button onClick={doLogin} style={{width:"100%",background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",border:"none",borderRadius:"10px",padding:"14px",color:"white",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>Entrar</button>
      </div>
    </div>
  );

  const tabs=[["conceitos","Conceitos"],["quiz","Quiz"],["resposta","Resposta"],["simulador","Simulador"],["progresso","Progresso"]];

  return(
    <div style={{background:"#080814",minHeight:"100vh",color:"#E8E8F5",maxWidth:"460px",margin:"0 auto",display:"flex",flexDirection:"column"}}>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:"15px",fontWeight:"800",background:"linear-gradient(135deg,#A89EFF,#7C6FFF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Dominio Total</div>
            <div style={{fontSize:"11px",color:"#8888AA"}}>Gustavo</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"11px",color:lv.color,fontWeight:"700"}}>Nv {lv.n} {lv.title}</div>
            <div style={{fontSize:"13px",fontWeight:"800"}}>{progress.xp} XP</div>
            <div style={{width:"80px",height:"3px",background:"#1E1E3F",borderRadius:"99px",marginTop:"3px"}}><div style={{width:pct+"%",height:"100%",background:lv.color,borderRadius:"99px"}}/></div>
          </div>
        </div>
      </div>
      {phase&&(
        <div style={{padding:"6px 16px",background:phase.data.color+"22",borderBottom:"1px solid "+phase.data.color+"44",display:"flex",alignItems:"center",gap:"8px"}}>
          <div style={{flex:1,fontSize:"11px"}}>
            <span style={{fontWeight:"700",color:phase.data.color}}>{phase.data.name}</span>
            <span style={{color:"#8888AA"}}> Dia {phase.day} </span>
            <span style={{color:"#8888AA"}}>| {phase.data.safada}</span>
          </div>
          <span style={{fontSize:"10px",color:"#555577"}}>{phase.daysUntil}d</span>
        </div>
      )}
      <div style={{display:"flex",padding:"8px 10px",gap:"4px",borderBottom:"1px solid #1E1E3F",overflowX:"auto"}}>
        {tabs.map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:"none",padding:"7px 9px",borderRadius:"8px",border:"none",fontSize:"11px",fontWeight:"600",cursor:"pointer",background:tab===t?"#1E1E3F":"transparent",color:tab===t?"#A89EFF":"#8888AA",whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {tab==="conceitos"&&<ConceptsTab progress={progress} save={save}/>}
        {tab==="quiz"&&<QuizTab progress={progress} save={save}/>}
        {tab==="resposta"&&<RespostaTab phase={phase} apiKey={apiKey}/>}
        {tab==="simulador"&&<SimuladorTab phase={phase} apiKey={apiKey}/>}
        {tab==="progresso"&&<ProgressoTab progress={progress} lv={lv} pct={pct} ciclo={ciclo} save={save} phase={phase} apiKey={apiKey}/>}
      </div>
    </div>
  );
}

function ConceptsTab({progress,save}){
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);

  const col=catColors[c.cat]||catColors.evitativo;
  const nav=(d)=>{setFlipped(false);setTimeout(()=>{const n=idx+d;if(n>=0&&n<CONCEPTS.length){setIdx(n);if(!progress.seen.includes(CONCEPTS[n].id)){save({...progress,seen:[...progress.seen,CONCEPTS[n].id],xp:progress.xp+CONCEPTS[n].xp});}}},100);};
  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px",fontSize:"12px",color:"#8888AA"}}>

        <div style={{flex:1,height:"3px",background:"#1E1E3F",borderRadius:"99px"}}><div style={{width:((idx+1)/CONCEPTS.length*100)+"%",height:"100%",background:"#7C6FFF",borderRadius:"99px"}}/></div>
        <span style={{color:"#C4A24A",fontSize:"11px"}}>+{c.xp}xp</span>
      </div>
      <div className="fade" style={{background:col.bg,border:"1px solid "+col.border,borderRadius:"16px",padding:"20px",marginBottom:"14px"}}>
        <div style={{fontSize:"10px",fontWeight:"700",color:col.text,letterSpacing:"1.5px",marginBottom:"10px"}}>{col.label}</div>
        <div style={{fontSize:"17px",fontWeight:"800",marginBottom:"12px",lineHeight:"1.3"}}>{c.title}</div>
        {!flipped?(
          <div style={{fontSize:"13.5px",lineHeight:"1.65",color:"#CCCCDD"}}>{c.body}</div>
        ):(
          <div style={{background:"rgba(124,111,255,0.12)",border:"1px solid rgba(124,111,255,0.3)",borderRadius:"10px",padding:"12px"}}>
            <div style={{fontSize:"10px",fontWeight:"700",color:"#7C6FFF",letterSpacing:"1px",marginBottom:"4px"}}>INSIGHT PRATICO</div>
            <div style={{fontSize:"13px",color:"#C0B8FF",lineHeight:"1.5"}}>{c.insight}</div>
          </div>
        )}
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
        <button disabled={idx===0} onClick={()=>nav(-1)} style={{flex:1,padding:"11px",borderRadius:"10px",border:"1px solid #1E1E3F",background:idx===0?"#0A0A18":"#1E1E3F",color:idx===0?"#333366":"#A89EFF",fontWeight:"600",fontSize:"13px",cursor:idx===0?"default":"pointer"}}>Ant</button>
        <button onClick={()=>setFlipped(f=>!f)} style={{flex:2,padding:"11px",borderRadius:"10px",border:"1px solid #7C6FFF",background:"rgba(124,111,255,0.15)",color:"#A89EFF",fontWeight:"600",fontSize:"13px",cursor:"pointer"}}>{flipped?"Conceito":"Insight"}</button>
        <button disabled={idx===CONCEPTS.length-1} onClick={()=>nav(1)} style={{flex:1,padding:"11px",borderRadius:"10px",border:"1px solid #1E1E3F",background:idx===CONCEPTS.length-1?"#0A0A18":"#1E1E3F",color:idx===CONCEPTS.length-1?"#333366":"#A89EFF",fontWeight:"600",fontSize:"13px",cursor:idx===CONCEPTS.length-1?"default":"pointer"}}>Prox</button>
      </div>
      {CONCEPTS.map((con,i)=>{
        const cc=catColors[con.cat]||catColors.evitativo;
        return(
          <div key={con.id} onClick={()=>{setIdx(i);setFlipped(false);if(!progress.seen.includes(con.id))save({...progress,seen:[...progress.seen,con.id],xp:progress.xp+con.xp});}}
            style={{background:i===idx?"rgba(124,111,255,0.1)":"#0F0F24",border:"1px solid "+(i===idx?"#7C6FFF":"#1E1E3F"),borderRadius:"10px",padding:"12px 14px",marginBottom:"7px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"13px",fontWeight:"600",color:i===idx?"#A89EFF":"#CCCCDD"}}>{con.title}</div>
              <div style={{fontSize:"10px",color:cc.text,marginTop:"1px"}}>{cc.label}</div>
            </div>
            {progress.seen.includes(con.id)&&<span style={{fontSize:"12px",color:"#48BB8C"}}>v</span>}
          </div>
        );
      })}
    </div>
  );
}

function QuizTab({progress,save}){
  const[qs,setQs]=useState(()=>shuffle(QUESTIONS));
  const[qi,setQi]=useState(0);
  const[sel,setSel]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[score,setScore]=useState(0);
  const[done,setDone]=useState(false);
  const q=qs[qi];
  const select=(i)=>{
    if(answered)return;setSel(i);setAnswered(true);
    const ok=q.options[i].c;
    if(ok)setScore(s=>s+1);
    save({...progress,qCorrect:progress.qCorrect+(ok?1:0),qTotal:progress.qTotal+1,xp:progress.xp+(ok?q.xp:Math.floor(q.xp*0.2))});
  };
  const next=()=>{if(qi+1>=qs.length){setDone(true);return;}setQi(i=>i+1);setSel(null);setAnswered(false);};
  const restart=()=>{setQs(shuffle(QUESTIONS));setQi(0);setSel(null);setAnswered(false);setScore(0);setDone(false);};
  if(done)return(
    <div style={{textAlign:"center",padding:"50px 20px"}}>
      <div style={{fontSize:"52px",fontWeight:"900",background:"linear-gradient(135deg,#A89EFF,#7C6FFF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:"12px"}}>{score}/{qs.length}</div>
      <div style={{fontSize:"24px",fontWeight:"800",color:score/qs.length>=0.8?"#48BB8C":"#FF8C47",marginBottom:"28px"}}>{score/qs.length>=0.8?"Excelente!":"Continue praticando"}</div>
      <button onClick={restart} style={{background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",border:"none",borderRadius:"10px",padding:"14px 40px",color:"white",fontWeight:"700",fontSize:"14px",cursor:"pointer"}}>Nova Rodada</button>
    </div>
  );
  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px",fontSize:"12px",color:"#8888AA"}}>
        <span>{qi+1}/{qs.length}</span>
        <div style={{flex:1,height:"3px",background:"#1E1E3F",borderRadius:"99px"}}><div style={{width:((qi+1)/qs.length*100)+"%",height:"100%",background:"#7C6FFF",borderRadius:"99px"}}/></div>
        <span style={{color:"#48BB8C",fontWeight:"700"}}>{score} certos</span>
      </div>
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"18px",marginBottom:"14px"}}>
        <div style={{fontSize:"15px",lineHeight:"1.55",fontWeight:"600"}}>{q.situation}</div>
      </div>
      {q.options.map((opt,i)=>{
        let bg="#080814",border="#1E1E3F",color="#CCCCDD";
        if(answered){if(opt.c){bg="rgba(72,187,140,0.12)";border="#48BB8C";color="#7DD9B0";}else if(i===sel){bg="rgba(255,85,102,0.12)";border="#FF5566";color="#FF8899";}}
        else if(i===sel){bg="rgba(124,111,255,0.18)";border="#7C6FFF";color="#A89EFF";}
        return(<button key={i} onClick={()=>select(i)} style={{width:"100%",textAlign:"left",padding:"12px 14px",borderRadius:"10px",border:"1px solid "+border,background:bg,color,fontSize:"13.5px",lineHeight:"1.4",fontWeight:"500",cursor:answered?"default":"pointer",marginBottom:"8px",display:"block"}}><span style={{fontWeight:"700",marginRight:"6px",color:"#7C6FFF"}}>{String.fromCharCode(65+i)}.</span>{opt.t}</button>);
      })}
      {answered&&(
        <>
        <div style={{background:"rgba(124,111,255,0.08)",border:"1px solid rgba(124,111,255,0.25)",borderRadius:"10px",padding:"14px",margin:"4px 0 14px"}}>
          <div style={{fontSize:"10px",fontWeight:"700",color:"#7C6FFF",marginBottom:"6px"}}>{q.options[sel]&&q.options[sel].c?"CORRETO":"INCORRETO"}</div>
          <div style={{fontSize:"13px",color:"#C0B8FF",lineHeight:"1.55"}}>{q.explanation}</div>
        </div>
        <button onClick={next} style={{width:"100%",background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",border:"none",borderRadius:"10px",padding:"13px",color:"white",fontWeight:"700",fontSize:"14px",cursor:"pointer"}}>{qi+1>=qs.length?"Ver Resultado":"Proxima"}</button>
        </>
      )}
    </div>
  );
}

function RespostaTab({phase,apiKey}){
  const[subMode,setSubMode]=useState("resposta");
  const[msgs,setMsgs]=useState("");
  const[ctx,setCtx]=useState("");
  const[direcao,setDirecao]=useState("normal");

  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const[showKey,setShowKey]=useState(false);
  const[localKey,setLocalKey]=useState(()=>{try{return localStorage.getItem("dtq_api")||"";}catch(e){return "";}});
  const imgRef=useRef(null);

  const saveKey=(k)=>{setLocalKey(k);try{localStorage.setItem("dtq_api",k);}catch(e){}};
  const handleImage=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>setImage({data:ev.target.result.split(",")[1],type:f.type,preview:ev.target.result});r.readAsDataURL(f);};
  const removeImage=()=>{setImage(null);if(imgRef.current)imgRef.current.value="";};

  const callAPI=async(system,userText,userImage)=>{
    const k=localKey||apiKey();
    if(!k)return null;
    const userContent=userImage
      ?[{type:"image",source:{type:"base64",media_type:userImage.type,data:userImage.data}},{type:"text",text:userText}]
      :userText;
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,system,messages:[{role:"user",content:userContent}]})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    return data.content&&data.content[0]&&data.content[0].text;
  };

  const analisarResposta=async()=>{
    if(!msgs.trim()&&!image)return;
    setLoading(true);setResult(null);
    try{
      const phaseCtx=phase?" | Ciclo: "+phase.data.name+" Dia "+phase.day+" — "+phase.data.safada:"";
      const userText=(ctx?"Contexto: "+ctx+"
":"")+(phaseCtx?phaseCtx+"
":"")+"
"+(msgs?"Mensagens de Julia:
"+msgs:"Analise a imagem.");
      const text=await callAPI(RESPOSTA_SYSTEM(direcao),userText,image);
      if(text)setResult({type:"ai",text});
      else setResult({type:"basic",coach:getCoach(analyzeMsg(msgs)),dir:direcao});
    }catch(e){setResult({type:"error",text:e.message});}
    setLoading(false);
  };

  const analisarLeitura=async()=>{
    if(!msgs.trim()&&!image)return;
    setLoading(true);setResult(null);
    try{
      const phaseCtx=phase?"Fase ciclo: "+phase.data.name+" Dia "+phase.day+" — "+phase.data.mood:"";
      const userText=(phaseCtx?phaseCtx+"
":"")+"
Mensagens de Julia:
"+msgs;
      const text=await callAPI(LEITURA_SYSTEM,userText,image);
      if(text)setResult({type:"leitura",text});
      else{
        const decoder={"ta bom mb":"Aceitacao minima — nao entusiasmo","sim sim":"Processando ou desviando","sla":"Sabe mas nao quer dizer","fazer oq":"Resignada, nao ok","nao sei":"Frequentemente sabe mas nao esta pronta","to bem":"Provavelmente nao esta 100% bem"};
        const found=Object.entries(decoder).filter(([k])=>msgs.toLowerCase().includes(k)).map(([k,v])=>'"'+k+'" = '+v).join("
");
        setResult({type:"leitura",text:found||"Adicione API key para leitura emocional completa."});
      }
    }catch(e){setResult({type:"error",text:e.message});}
    setLoading(false);
  };

  const hasInput=msgs.trim()||image;
  const dirs=[{id:"carinhosa",l:"Carinhosa"},{id:"normal",l:"Normal"},{id:"engracada",l:"Engracada"},{id:"safada",l:"Safada"}];

  return(
    <div style={{padding:"16px"}}>
      {/* KEY */}

        <div style={{flex:1,fontSize:"11px",fontWeight:"700",color:localKey?"#48BB8C":"#FF8C47"}}>{localKey?"IA ATIVA":"Adicione API key para IA real"}</div>
        <button onClick={()=>setShowKey(s=>!s)} style={{background:"transparent",border:"1px solid #1E1E3F",borderRadius:"6px",padding:"4px 8px",color:"#8888AA",fontSize:"11px",cursor:"pointer"}}>{localKey?"Trocar":"+ Key"}</button>
      </div>
      {showKey&&(
        <div style={{marginBottom:"14px"}}>
          <input type="password" placeholder="sk-ant-api..." value={localKey} onChange={e=>saveKey(e.target.value)} style={{width:"100%",background:"#080814",border:"1px solid #1E1E3F",borderRadius:"8px",padding:"10px 12px",color:"#E8E8F5",fontSize:"13px",boxSizing:"border-box",marginBottom:"4px"}}/>
          <div style={{fontSize:"10px",color:"#8888AA"}}>console.anthropic.com - API Keys</div>
        </div>

      {/* PHASE BADGE */}
      {phase&&(

          <div style={{fontSize:"11px",fontWeight:"700",color:phase.data.color,marginBottom:"3px"}}>{phase.data.name} Dia {phase.day} | {phase.data.safada}</div>

        ))}

      )}
      <button onClick={subMode==="resposta"?analisarResposta:analisarLeitura} disabled={loading||!hasInput}
        style={{width:"100%",background:hasInput&&!loading?"linear-gradient(135deg,#7C6FFF,#5B4FFF)":"#1E1E3F",border:"none",borderRadius:"10px",padding:"13px",color:hasInput&&!loading?"white":"#555577",fontWeight:"700",fontSize:"14px",cursor:hasInput&&!loading?"pointer":"default",marginBottom:"14px"}}>
        {loading?"Analisando...":subMode==="resposta"?"Analisar e Responder":"Ler o que ela esta sentindo"}
      </button>
      {result&&(
        <div className="fade">
          {(result.type==="ai"||result.type==="leitura")&&(
            <div style={{background:"rgba(124,111,255,0.08)",border:"1px solid rgba(124,111,255,0.3)",borderRadius:"12px",padding:"16px",marginBottom:"14px"}}>
              <div style={{fontSize:"11px",fontWeight:"700",color:"#7C6FFF",marginBottom:"10px"}}>{result.type==="leitura"?"LEITURA EMOCIONAL":"ANALISE"}</div>
              <div style={{fontSize:"13px",color:"#E8E8F5",lineHeight:"1.7",whiteSpace:"pre-wrap"}}>{result.text}</div>
            </div>
          )}
          {result.type==="basic"&&(
            <div style={{background:result.coach.color+"12",border:"1px solid "+result.coach.color+"33",borderRadius:"12px",padding:"16px",marginBottom:"14px"}}>
              <div style={{fontSize:"12px",fontWeight:"700",color:result.coach.color,marginBottom:"6px"}}>{result.coach.title}</div>
              <div style={{fontSize:"12px",color:"#CCCCDD",marginBottom:"8px"}}>{result.coach.text}</div>
              <div style={{fontSize:"11px",color:"#8888AA"}}>Adicione API key para resposta exata com direcao {result.dir}</div>
            </div>
          )}
          {result.type==="error"&&(
            <div style={{background:"rgba(255,85,102,0.08)",border:"1px solid rgba(255,85,102,0.3)",borderRadius:"10px",padding:"14px",fontSize:"13px",color:"#FF8899"}}>{result.text}</div>
          )}
        </div>
      )}
      {/* CONSULTOR */}
      <div style={{marginTop:"16px",borderTop:"1px solid #1E1E3F",paddingTop:"16px"}}>
        <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"600",marginBottom:"4px"}}>Consultor Livre</div>
        <div style={{fontSize:"11px",color:"#555577",marginBottom:"10px"}}>Pergunte qualquer coisa: timing, presente, date, brecha safada, como fazer ela querer mais...</div>
        <ConsultorChat apiKey={localKey||apiKey()} phase={phase}/>
      </div>
    </div>
  );
}

function SimuladorTab({phase,apiKey}){
  const[mode,setMode]=useState("menu");
  const[scenario,setScenario]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState("");
  const[typing,setTyping]=useState(false);
  const[coach,setCoach]=useState(null);
  const localKey=()=>{try{return localStorage.getItem("dtq_api")||"";}catch(e){return "";}};
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  const start=(sc)=>{setScenario(sc);setMsgs([{r:"julia",t:sc?sc.start:"oi"}]);setMode("chat");setCoach(null);};

  const send=async()=>{
    const txt=input.trim();if(!txt||typing)return;
    setInput("");
    setMsgs(m=>[...m,{r:"user",t:txt}]);
    const score=analyzeMsg(txt);
    setTyping(true);
    const k=localKey();
    if(k){
      try{
        const phaseCtx=phase?"[Ciclo: "+phase.data.name+" Dia "+phase.day+"]":"";
        const history=[...msgs,{r:"user",t:txt}].map(m=>({role:m.r==="user"?"user":"assistant",content:m.t.replace(/\[.*?\]/g,"").trim()||"..."})).filter(m=>m.content.length>0);
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:150,system:JULIA_PERSONA+(phaseCtx?" "+phaseCtx:""),messages:history})
        });
        const data=await res.json();
        const reply=data.content&&data.content[0]&&data.content[0].text||"...";
        setTyping(false);setMsgs(m=>[...m,{r:"julia",t:reply}]);
      }catch(e){setTyping(false);setMsgs(m=>[...m,{r:"julia",t:"..."}]);}
    }else{
      await new Promise(r=>setTimeout(r,800+Math.random()*1200));
      const opts=score>4?["sim","mb","ta bom","tá"]:score>2?["sim sim","to bem","blzinha","ok"]:score>0?["oi :)","tô aqui","hehehe"]:score>-2?["kkkkk","vrdd","boa"]:["nuuuuu","kkkkkk pse","amei isso"];
      setTyping(false);setMsgs(m=>[...m,{r:"julia",t:opts[Math.floor(Math.random()*opts.length)]}]);
    }
    setCoach(getCoach(score));
  };

  if(mode==="menu")return(
    <div style={{padding:"16px"}}>
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"16px",marginBottom:"14px"}}>
        <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"600",marginBottom:"6px"}}>SIMULADOR JULIA</div>
        <div style={{fontSize:"12px",color:"#CCCCDD",lineHeight:"1.55"}}>Baseado em 8 meses de conversa real. Cada resposta usa o padrao comportamental real dela.</div>
      </div>
      {SCENARIOS.map(sc=>(
        <div key={sc.id} onClick={()=>start(sc)} style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{width:"28px",height:"28px",background:"rgba(124,111,255,0.15)",border:"1px solid #7C6FFF",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"700",color:"#A89EFF",flex:"none"}}>{sc.id}</div>
          <div>
            <div style={{fontSize:"13px",fontWeight:"600",color:"#CCCCDD"}}>{sc.title}</div>
            <div style={{fontSize:"11px",color:"#8888AA",marginTop:"2px"}}>{sc.context.slice(0,55)}...</div>
          </div>
        </div>
      ))}
      <button onClick={()=>start(null)} style={{width:"100%",background:"rgba(124,111,255,0.15)",border:"1px solid #7C6FFF",borderRadius:"10px",padding:"13px",color:"#A89EFF",fontWeight:"700",fontSize:"14px",cursor:"pointer",marginTop:"4px"}}>Conversa Livre</button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)"}}>
      <div style={{padding:"10px 16px",borderBottom:"1px solid #1E1E3F",display:"flex",alignItems:"center",gap:"10px"}}>
        <button onClick={()=>setMode("menu")} style={{background:"transparent",border:"none",color:"#8888AA",fontSize:"18px",cursor:"pointer"}}>{"<"}</button>
        <div style={{width:"32px",height:"32px",background:"rgba(124,111,255,0.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>J</div>
        <div><div style={{fontSize:"13px",fontWeight:"700"}}>Julia</div><div style={{fontSize:"11px",color:"#8888AA"}}>{scenario?scenario.title:"Livre"}</div></div>
      </div>
      {scenario&&<div style={{padding:"8px 16px",background:"rgba(124,111,255,0.05)",borderBottom:"1px solid #1E1E3F",fontSize:"11px",color:"#8888AA"}}>{scenario.context}</div>}
      <div style={{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:"8px"}}>
        {msgs.map((m,i)=>(
          <div key={i} className="fade" style={{display:"flex",justifyContent:m.r==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"76%",padding:"9px 13px",borderRadius:m.r==="user"?"17px 17px 4px 17px":"17px 17px 17px 4px",background:m.r==="user"?"#5B4FFF":"#1A1A35",fontSize:"14px",lineHeight:"1.45",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{m.t}</div>
          </div>
        ))}
        {typing&&<div style={{display:"flex"}}><div style={{padding:"11px 15px",borderRadius:"17px",background:"#1A1A35"}} className="typing"><span/><span/><span/></div></div>}
        <div ref={bottomRef}/>
      </div>
      {coach&&(
        <div style={{padding:"8px 16px",background:coach.color+"12",borderTop:"1px solid "+coach.color+"33"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:coach.color,marginBottom:"2px"}}>{coach.title}</div>
          <div style={{fontSize:"11px",color:"#CCCCDD"}}>{coach.text}</div>
        </div>
      )}
      <div style={{padding:"9px 14px",borderTop:"1px solid #1E1E3F",display:"flex",gap:"8px",alignItems:"flex-end"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Digite para Julia..." style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"12px",padding:"10px 12px",color:"#E8E8F5",fontSize:"14px",resize:"none",maxHeight:"90px",lineHeight:"1.4"}} rows={1}/>
        <button onClick={send} disabled={!input.trim()||typing} style={{width:"38px",height:"38px",borderRadius:"50%",border:"none",background:input.trim()&&!typing?"#7C6FFF":"#1E1E3F",color:"white",fontSize:"14px",cursor:input.trim()&&!typing?"pointer":"default",flex:"none"}}>{">"}</button>
      </div>
    </div>
  );
}

function ConsultorChat({apiKey,phase}){
  const[chatInput,setChatInput]=useState("");
  const[chatMsgs,setChatMsgs]=useState([]);
  const[chatLoading,setChatLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"});},[chatMsgs]);

  const send=async()=>{
    const txt=chatInput.trim();if(!txt||chatLoading)return;
    setChatInput("");setChatMsgs(m=>[...m,{role:"user",content:txt}]);setChatLoading(true);
    if(apiKey){
      try{
        const phaseInfo=phase?"[Ciclo atual: "+phase.data.name+" Dia "+phase.day+" — "+phase.data.mood+" | Safada: "+phase.data.safada+"]":"";
        const history=[...chatMsgs,{role:"user",content:txt+(chatMsgs.length===0&&phaseInfo?" "+phaseInfo:"")}];
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:500,system:CONSULTOR_SYSTEM,messages:history})
        });
        const data=await res.json();
        if(data.error)throw new Error(data.error.message);
        setChatMsgs(m=>[...m,{role:"assistant",content:data.content&&data.content[0]&&data.content[0].text||"..."}]);
      }catch(e){setChatMsgs(m=>[...m,{role:"assistant",content:"Erro: "+e.message}]);}
    }else{
      await new Promise(r=>setTimeout(r,500));
      setChatMsgs(m=>[...m,{role:"assistant",content:"Adicione API key para consultas personalizadas baseadas no padrao real dela."}]);
    }
    setChatLoading(false);
  };

  const sugestoes=["Tenho brecha para safada hoje?","Ideia de presente para ela","O que fazemos esse fds?","Quanto tempo espero para responder?","Como fazer ela querer mais?"];

  return(
    <div>
      {chatMsgs.length===0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"10px"}}>
          {sugestoes.map(s=>(
            <button key={s} onClick={()=>setChatInput(s)} style={{padding:"6px 10px",borderRadius:"20px",border:"1px solid #1E1E3F",background:"#0F0F24",color:"#8888AA",fontSize:"11px",cursor:"pointer"}}>{s}</button>
          ))}
        </div>
      )}
      {chatMsgs.length>0&&(
        <div style={{background:"#0A0A18",borderRadius:"10px",padding:"10px",marginBottom:"10px",maxHeight:"280px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"7px"}}>
          {chatMsgs.map((m,i)=>(
            <div key={i} className="fade" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"85%",padding:"8px 12px",borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.role==="user"?"#5B4FFF":"#1A1A35",fontSize:"12.5px",lineHeight:"1.5",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{m.content}</div>
            </div>
          ))}
          {chatLoading&&<div style={{display:"flex"}}><div style={{padding:"8px 14px",borderRadius:"14px",background:"#1A1A35"}} className="typing"><span/><span/><span/></div></div>}
          <div ref={bottomRef}/>
        </div>
      )}
      <div style={{display:"flex",gap:"8px",alignItems:"flex-end"}}>
        <textarea value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Pergunte qualquer coisa sobre ela ou a conversa..." style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"10px 12px",color:"#E8E8F5",fontSize:"13px",resize:"none",maxHeight:"80px",lineHeight:"1.4"}} rows={1}/>
        <button onClick={send} disabled={!chatInput.trim()||chatLoading}
          style={{width:"36px",height:"36px",borderRadius:"50%",border:"none",background:chatInput.trim()&&!chatLoading?"#7C6FFF":"#1E1E3F",color:"white",fontSize:"14px",cursor:chatInput.trim()&&!chatLoading?"pointer":"default",flex:"none"}}>{">"}</button>
      </div>
    </div>
  );
}

function ProgressoTab({progress,lv,pct,ciclo,save,phase,apiKey}){
  const[briefing,setBriefing]=useState(null);
  const[bLoad,setBLoad]=useState(false);
  const acc=progress.qTotal>0?Math.round((progress.qCorrect/progress.qTotal)*100):0;
  const localKey=()=>{try{return localStorage.getItem("dtq_api")||"";}catch(e){return "";}};

  const gerar=async()=>{
    setBLoad(true);
    const k=localKey();
    if(k){
      try{
        const dias=["Domingo","Segunda","Terca","Quarta","Quinta","Sexta","Sabado"];
        const hoje=dias[new Date().getDay()];
        const phaseInfo=phase?"Ciclo: "+phase.data.name+" Dia "+phase.day+" — "+phase.data.mood+" | Safada: "+phase.data.safada:"Ciclo nao configurado";
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:500,system:BRIEFING_SYSTEM,messages:[{role:"user",content:"Hoje e "+hoje+". "+phaseInfo+". Gere o briefing diario para o Gustavo."}]})
        });
        const data=await res.json();
        setBriefing(data.content&&data.content[0]&&data.content[0].text||"Erro");
      }catch(e){setBriefing("Erro: "+e.message);}
    }else{
      const dias=["Domingo","Segunda","Terca","Quarta","Quinta","Sexta","Sabado"];
      setBriefing("Hoje e "+dias[new Date().getDay()]+". Adicione API key para briefing personalizado com estrategia do dia, janela safada e frase pronta.");
    }
    setBLoad(false);
  };

  const nextLv=LEVELS[lv.n]||lv;

  return(
    <div style={{padding:"16px"}}>
      {/* XP */}
      <div style={{background:"#0F0F24",border:"1px solid "+lv.color+"44",borderRadius:"16px",padding:"20px",marginBottom:"14px",textAlign:"center"}}>
        <div style={{fontSize:"11px",color:lv.color,fontWeight:"700",letterSpacing:"1.5px",marginBottom:"4px"}}>NIVEL {lv.n}</div>
        <div style={{fontSize:"24px",fontWeight:"900",color:lv.color,marginBottom:"4px"}}>{lv.title}</div>
        <div style={{fontSize:"30px",fontWeight:"900"}}>{progress.xp} <span style={{fontSize:"14px",color:"#8888AA"}}>XP</span></div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",margin:"10px 0 4px"}}>
          <div style={{flex:1,height:"5px",background:"#1E1E3F",borderRadius:"99px"}}><div style={{width:pct+"%",height:"100%",background:lv.color,borderRadius:"99px"}}/></div>
          <span style={{fontSize:"11px",color:"#8888AA"}}>{pct}%</span>
        </div>
        {lv.n<5&&<div style={{fontSize:"11px",color:"#8888AA"}}>Proximo: {nextLv.title} em {nextLv.min-progress.xp} XP</div>}
      </div>
      {/* STATS */}
      <div style={{display:"flex",gap:"10px",marginBottom:"14px"}}>
        {[[progress.seen.length+"/"+CONCEPTS.length,"vistos","#7C6FFF"],[progress.qTotal,"questoes","#48BB8C"],[acc+"%","precisao",acc>=70?"#48BB8C":acc>=50?"#FF8C47":"#FF5566"]].map(([v,l,c],i)=>(
          <div key={i} style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"12px",padding:"14px",textAlign:"center"}}>
            <div style={{fontSize:"18px",fontWeight:"800",color:c}}>{v}</div>
            <div style={{fontSize:"10px",color:"#8888AA",marginTop:"2px"}}>{l}</div>
          </div>
        ))}
      </div>
      {/* BRIEFING */}
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"16px",marginBottom:"14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <div>
            <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"600"}}>BRIEFING DIARIO</div>
            <div style={{fontSize:"11px",color:"#555577",marginTop:"2px"}}>Estrategia personalizada para hoje</div>
          </div>
          <button onClick={gerar} disabled={bLoad} style={{background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",border:"none",borderRadius:"8px",padding:"8px 14px",color:"white",fontWeight:"700",fontSize:"12px",cursor:bLoad?"default":"pointer",opacity:bLoad?0.6:1}}>
            {bLoad?"Gerando...":"Gerar"}
          </button>
        </div>
        {briefing?(
          <div className="fade" style={{background:"rgba(124,111,255,0.06)",border:"1px solid rgba(124,111,255,0.2)",borderRadius:"10px",padding:"14px"}}>
            <div style={{fontSize:"12.5px",color:"#E8E8F5",lineHeight:"1.7",whiteSpace:"pre-wrap"}}>{briefing}</div>
          </div>
        ):(
          <div style={{textAlign:"center",padding:"14px",color:"#555577",fontSize:"12px"}}>Toque em Gerar para receber a estrategia de hoje</div>
        )}
      </div>
      {/* CICLO */}
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"18px",marginBottom:"14px"}}>
        <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"600",marginBottom:"14px"}}>CICLO DA JULIA</div>
        <div style={{marginBottom:"12px"}}>
          <div style={{fontSize:"11px",color:"#8888AA",marginBottom:"6px"}}>INICIO DO ULTIMO PERIODO</div>
          <input type="date" value={ciclo.lastDate} onChange={e=>save(null,{...ciclo,lastDate:e.target.value})}
            style={{width:"100%",background:"#080814",border:"1px solid #1E1E3F",borderRadius:"8px",padding:"10px 12px",color:"#E8E8F5",fontSize:"14px",boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:"14px"}}>
          <div style={{fontSize:"11px",color:"#8888AA",marginBottom:"6px"}}>CICLO MEDIO: {ciclo.cycleLen} dias</div>
          <input type="range" min="21" max="35" value={ciclo.cycleLen} onChange={e=>save(null,{...ciclo,cycleLen:parseInt(e.target.value)})} style={{width:"100%",accentColor:"#7C6FFF"}}/>
        </div>
        {phase?(
          <div style={{background:phase.data.color+"12",border:"1px solid "+phase.data.color+"33",borderRadius:"12px",padding:"16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
              <div>
                <div style={{fontSize:"16px",fontWeight:"800",color:phase.data.color}}>{phase.data.name}</div>
                <div style={{fontSize:"11px",color:"#8888AA"}}>{phase.data.days} - Dia {phase.day} - {phase.daysUntil}d ate proximo</div>
              </div>
            </div>
            {[["Estado",phase.data.mood],["Comunicacao",phase.data.comunicacao],["Ideal agora",phase.data.ideal],["Evitar",phase.data.evitar],["Safada?",phase.data.safada],["Reacao provavel",phase.data.reacao]].map(([k,v])=>(
              <div key={k} style={{marginBottom:"8px"}}>
                <div style={{fontSize:"10px",color:phase.data.color,fontWeight:"700",marginBottom:"2px"}}>{k}</div>
                <div style={{fontSize:"12px",color:"#CCCCDD",lineHeight:"1.4"}}>{v}</div>
              </div>
            ))}
          </div>
        ):(
          <div style={{textAlign:"center",padding:"16px",color:"#555577",fontSize:"12px"}}>Insira a data do ultimo periodo para ver a fase atual</div>
        )}
      </div>
      {/* HISTORICO */}
      <div style={{background:"rgba(196,162,74,0.05)",border:"1px solid rgba(196,162,74,0.2)",borderRadius:"12px",padding:"16px"}}>
        <div style={{fontSize:"10px",color:"#C4A24A",fontWeight:"700",letterSpacing:"1px",marginBottom:"10px"}}>HISTORICO DO RELACIONAMENTO</div>
        {[["Out 2025","Inicio cauteloso. Respostas curtas. Descobrindo quem e Gustavo."],["Dez 2025","Se revelou: 'Intensa so na cabeca mas deixo pouco sair'. Maior abertura ate entao."],["Mar 2026","Primeiro 'te amo' por iniciativa propria. Sem ser pedida."],["Jun 2026","'Vc e meu namorado, eu te amo e sei q vc e o cara certo pra isso.'"],["Jul 2026","6 meses. 'Vamos conseguir. Aos poucos vamos saber lidar.' Ela esta tentando."]].map(([d,t])=>(
          <div key={d} style={{marginBottom:"10px",display:"flex",gap:"10px"}}>
            <div style={{fontSize:"11px",color:"#C4A24A",fontWeight:"700",flex:"none",width:"65px"}}>{d}</div>
            <div style={{fontSize:"12px",color:"#AAA870",lineHeight:"1.4"}}>{t}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
