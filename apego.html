// ── APEGO EVITATIVO ──
{id:1,icon:"🔮",cat:"evitativo",lvl:1,xp:5,title:"A Essência do Apego Evitativo",
body:"A pessoa com apego evitativo não se afasta porque não gosta de você. Ela se afasta porque a INTIMIDADE AUMENTOU. Proximidade = risco de perder independência. É uma resposta automática do sistema nervoso, não uma escolha consciente.",
insight:"O afastamento depois de um momento íntimo confirma que o momento foi real."},
{id:2,icon:"⚡",cat:"evitativo",lvl:1,xp:5,title:"O Ciclo Ansioso-Evitativo",
body:"Ansioso busca → Evitativo recua → Ansioso pressiona mais → Evitativo some. Você tem apego ansioso e ela tem apego evitativo: vocês ativam automaticamente o pior um do outro sem querer.",
insight:"Cada vez que você resiste a pressionar, você interrompe o ciclo sozinho."},
{id:3,icon:"🤐",cat:"evitativo",lvl:1,xp:5,title:"Por que ela não conta tudo",
body:"O evitativo não está acostumado a depender de outra pessoa para processar. É um padrão aprendido: processar tudo internamente. Quando ela conta algo pessoal, é muito — mesmo que pareça pouco.",

{id:4,icon:"🌊",cat:"evitativo",lvl:1,xp:5,title:"O Silêncio Não é Rejeição",
body:"Quando ela some ou vai monossilábica: não é raiva de você. É o sistema nervoso regulando após sobrecarga emocional. O silêncio dela é processamento, não punição.",

{id:5,icon:"💥",cat:"evitativo",lvl:1,xp:5,title:"O que Fecha o Evitativo",
body:"Emoção intensa, cobrança, 'precisamos conversar', perguntas em sequência, insistência, mensagens longas emocionais. Tudo isso ativa o mecanismo de defesa. Quanto mais pressão, mais ela recua.",
insight:"Menos intensidade emocional sua = mais abertura dela. Paradoxal, mas consistente."},
{id:6,icon:"🌱",cat:"evitativo",lvl:1,xp:5,title:"'No Seu Tempo' — Por que Funciona",
body:"Para o evitativo, não ter prazo para se abrir é fundamental. 'No seu tempo' remove o maior obstáculo: a pressão de ter que responder emocionalmente antes de estar pronta.",

{id:7,icon:"💌",cat:"evitativo",lvl:2,xp:8,title:"Gestos que Chegam de Verdade",
body:"Cartas e presentes funcionam com o evitativo porque não exigem resposta imediata. Ela pode processar sozinha, sentir sem ter que demonstrar. O 'nuuu' espontâneo depois é a prova.",
insight:"Prefira gestos que ela receba sozinha a declarações que exigem reação imediata."},
{id:8,icon:"🔁",cat:"evitativo",lvl:2,xp:8,title:"Quanto Menos, Mais",
body:"Quanto mais você busca atenção de uma evitativa, menos ela dá. Quanto menos você pressiona, mais ela vem naturalmente. É contraintuitivo para o ansioso, mas é o padrão mais consistente.",
insight:"Sua ausência calculada é mais atraente para ela do que sua presença constante."},
{id:9,icon:"🪟",cat:"evitativo",lvl:2,xp:8,title:"Janelas de Abertura",
body:"O evitativo tem momentos em que se abre — geralmente quando está relaxado, sem pressão, quando o clima está leve. Essas são as janelas. Reconhecê-las e não sobrecarregá-las é a habilidade.",
insight:"Quando ela abrir uma janela, não empurre a porta. Entre devagar."},
{id:10,icon:"🏗️",cat:"evitativo",lvl:2,xp:8,title:"Confiança se Constrói por Consistência",
body:"O evitativo só se abre quando sente que a outra pessoa é SEGURA — previsível, sem julgamento, sem drama. Essa confiança se constrói ao longo do tempo, por ações repetidas, não por declarações.",
insight:"Seja consistente. Cada vez que você age certo, você deposita confiança na conta."},
{id:11,icon:"🎭",cat:"evitativo",lvl:3,xp:12,title:"Estratégias de Desativação",
body:"O evitativo usa 'estratégias de desativação' para manter distância: focar nos defeitos do parceiro, lembrar de ex romanticamente, evitar planos futuros, priorizar independência sobre conexão.",
insight:"Isso não é rejeição pessoal. É o sistema de apego dela protegendo a independência dela."},
{id:12,icon:"🔊",cat:"evitativo",lvl:3,xp:12,title:"Como ela mostra amor",
body:"O evitativo raramente diz 'eu te amo' com frequência. Ele mostra: aparecendo quando importa, fazendo pequenas coisas práticas, ficando presente em silêncio, respondendo de forma espontânea.",
insight:"'Obrigada por entender' de uma evitativa é uma declaração de amor disfarçada."},
{id:13,icon:"🔧",cat:"evitativo",lvl:3,xp:12,title:"Como discutir com o evitativo",
body:"O evitativo em conflito: fecha, minimiza, muda de assunto, sai da conversa. Para discutir de forma eficaz: uma questão por vez, sem acusação, em momento calmo, aceitando que a resolução pode demorar.",
insight:"'Quero entender seu ponto de vista' abre mais que 'você está errado'."},
{id:14,icon:"🌅",cat:"evitativo",lvl:4,xp:15,title:"Longo Prazo: Quando o Evitativo Abre",
body:"Com o tempo, o evitativo que sente segurança consistente começa a se abrir progressivamente. Não de repente — em pequenos passos. Cada passo é uma conquista de confiança acumulada.",
insight:"'Aos poucos vamos saber lidar' (ela falou) é o evitativo dizendo que vai tentar se abrir."},
{id:15,icon:"🎯",cat:"evitativo",lvl:2,xp:8,title:"A Pergunta que Muda Tudo",
body:"'Você quer que eu te ajude a pensar ou quer só falar?' Remove a pressão de ela ter que pedir o que precisa. Devolve o controle para ela.",
insight:"Nunca assuma o que ela precisa. Sempre pergunte primeiro."},
// ── APEGO ANSIOSO ──
{id:16,icon:"⏱️",cat:"ansioso",lvl:1,xp:5,title:"O que é Apego Ansioso",
body:"O apego ansioso busca reasseguramento constante, interpreta silêncio como rejeição, e aumenta a busca por contato quando sente distância. É o oposto complementar ao evitativo.",
insight:"Você tem apego ansioso. Reconhecer isso é o primeiro passo para mudar o padrão."},
{id:17,icon:"📡",cat:"ansioso",lvl:2,xp:8,title:"Hiperativação: o modo ansioso ligado",
body:"O apego ansioso usa hiperativação: fica hipervigilante a sinais do parceiro, interpreta tudo como negativo, processa o relacionamento constantemente. Isso é exaustivo e empurra o evitativo para longe.",
insight:"Quando você está em modo de hiperativação, qualquer coisa que ela faça vira evidência de problema."},
{id:18,icon:"🔍",cat:"ansioso",lvl:2,xp:8,title:"Comportamento de Protesto",
body:"O ansioso usa 'comportamentos de protesto' para chamar atenção: ficar na frente do celular esperando resposta, mandar mensagens em sequência, fazer drama para forçar conexão.",
insight:"Comportamento de protesto afasta o evitativo. Reconheça quando você está fazendo isso."},
{id:19,icon:"🛡️",cat:"ansioso",lvl:3,xp:12,title:"Construindo Apego Mais Seguro",
body:"O apego pode mudar. Com autoconhecimento, terapia ou relacionamento consistente com alguém seguro, o ansioso pode se tornar mais seguro. Não é rápido, mas é possível.",
insight:"Cada vez que você regula sua ansiedade em vez de agir sobre ela, você treina o apego seguro."},
// ── COMUNICAÇÃO ──
{id:20,icon:"🎙️",cat:"comunicação",lvl:1,xp:5,title:"Calibrar o Receptor",
body:"Toda mensagem tem emissor, canal e receptor. O receptor tem filtros. Para o evitativo, qualquer ruído emocional bloqueia a mensagem. Mensagens diretas, simples, sem carga emocional chegam melhor.",
insight:"Adapte a mensagem ao receptor, não à forma como você quer expressar."},
{id:21,icon:"📐",cat:"comunicação",lvl:2,xp:8,title:"Ethos, Pathos, Logos",
body:"Toda comunicação persuasiva combina ethos (credibilidade), pathos (emoção) e logos (lógica). Com o evitativo, pathos em excesso bloqueia. Ethos (sua consistência) e logos (lógica simples) chegam melhor.",
insight:"Com evitativo: mais ethos, menos pathos. Seja crível, não intenso."},
{id:22,icon:"🎨",cat:"comunicação",lvl:2,xp:8,title:"PIST: 4 Estilos de Comunicação",
body:"Maytê Carvalho: as 4 abordagens persuasivas são Provocação, Intimidação, Sedução e Tentação. Com evitativo, sedução (valorizar, não cobrar, ouvir) funciona. Intimidação e provocação fecham.",
insight:"Sedução no sentido de: reconhecer, valorizar, dar atenção sem cobrar."},
{id:23,icon:"⏰",cat:"comunicação",lvl:3,xp:12,title:"Timing: quando falar",
body:"Com o evitativo, o QUANDO é tão importante quanto o QUÊ. Em momentos de estresse ou sobrecarga, qualquer conversa séria vai falhar. Escolha momentos leves, ela relaxada, sem pressão externa.",
insight:"'Posso falar algo?' em momento certo vale mais que horas de conversa no momento errado."},
{id:24,icon:"🌀",cat:"comunicação",lvl:3,xp:12,title:"Humor como Ponte",
body:"Humor e leveza criam segurança para o evitativo. Quando você é capaz de ser engraçado e leve depois de um momento tenso, você sinaliza que não há drama — e ela relaxa.",

{id:25,icon:"✉️",cat:"comunicação",lvl:2,xp:8,title:"Texto vs. Presença",
body:"Texto é limitado com evitativo: sem tom de voz, sem expressão, fácil de interpretar errado. Presença física é muito mais eficaz. Reserve conversas importantes para quando estiverem juntos.",
insight:"Nunca resolva conflito por texto. Presença física regula o sistema nervoso dela."},
// ── AUTOCONTROLE ──
{id:26,icon:"🧠",cat:"autocontrole",lvl:1,xp:5,title:"Autocontrole é a Sua Arma Principal",
body:"Seu trabalho não é controlar ela — é controlar você. Cada vez que você segura um 'tá tudo bem?', não manda mensagem quando sentiu vontade, você constrói o tipo de presença que o evitativo consegue se aproximar.",
insight:"Autocontrole com evitativo não é passividade. É estratégia consciente de conexão."},
{id:27,icon:"🔋",cat:"autocontrole",lvl:1,xp:5,title:"Não Transfira Sua Ansiedade",
body:"Quando você está ansioso, o impulso é buscar reasseguramento do parceiro. Mas transferir sua ansiedade aumenta a pressão que ela já sente. Regule sua própria ansiedade antes de interagir.",
insight:"Quando estiver ansioso: primeiro cuide de você. Depois interaja com ela."},
{id:28,icon:"⚖️",cat:"autocontrole",lvl:2,xp:8,title:"Dominar o Impulso, não a Emoção",
body:"William Jordan: autocontrole não é reprimir emoções — é dominar o impulso de agir sobre elas imediatamente. Sentir ansiedade é inevitável. Agir impulsivamente é a escolha.",
insight:"Sinta. Processe. Depois, se necessário, fale — com calma e intenção."},
{id:29,icon:"⏳",cat:"autocontrole",lvl:2,xp:8,title:"Paciência como Estratégia",
body:"A paciência não é passividade — é a recusa em deixar sua ansiedade ditar o timing das coisas. Com o evitativo, o timing certo pode fazer a diferença entre abertura e fechamento.",
insight:"Esperar o momento certo é mais eficaz que agir no momento errado."},
{id:30,icon:"🧘",cat:"autocontrole",lvl:3,xp:12,title:"A Mente como Servo",
body:"Jordan: a mente deve ser servo, não mestre. Quando a mente ansiosa começa a criar histórias ('ela está me ignorando', 'algo está errado'), você decide se acredita nessas histórias ou não.",
insight:"Você não precisa acreditar em cada pensamento ansioso que sua mente produz."},
{id:31,icon:"🤫",cat:"autocontrole",lvl:3,xp:12,title:"Silêncio como Poder",
body:"O silêncio deliberado — não mandar mensagem, não forçar resposta, não preencher o vazio — é uma das ferramentas mais poderosas com o evitativo. Silêncio sinaliza que você não precisa dela para se sentir bem.",
insight:"Quem parece precisar menos, paradoxalmente, atrai mais."},
{id:32,icon:"🎯",cat:"autocontrole",lvl:4,xp:15,title:"Validar sem Inflar",
body:"Validar sentimentos não significa concordar com a narrativa mais pessimista. 'Faz sentido você estar assim' é diferente de 'você tem razão, provavelmente vai dar tudo errado'.",
insight:"Valide a emoção sem reforçar o cenário catastrófico."},
// ── PERSUASÃO (Cialdini) ──
{id:33,icon:"🤝",cat:"persuasão",lvl:2,xp:8,title:"Reciprocidade em Relacionamentos",
body:"Robert Cialdini: as pessoas se sentem compelidas a retribuir o que recebem. Em relacionamentos, presença, cuidado e gestos criam reciprocidade natural. Mas cobrar quebra o mecanismo.",
insight:"Dê sem cobrar de volta. A reciprocidade acontece naturalmente quando não há pressão."},
{id:34,icon:"📌",cat:"persuasão",lvl:2,xp:8,title:"Comprometimento e Consistência",
body:"Cialdini: as pessoas agem conforme seus compromissos passados. Quando você mantém padrões consistentes ('não vou pressionar', 'vou dar espaço'), você se torna previsível e seguro para o evitativo.",
insight:"Cada vez que você age conforme prometeu, reforça sua credibilidade com ela."},
{id:35,icon:"👁️",cat:"persuasão",lvl:2,xp:8,title:"Autoridade: Construindo Ethos",
body:"Autoridade não é poder sobre alguém — é credibilidade conquistada por conhecimento e consistência. Com ela, você constrói autoridade sendo quem você diz ser, repetidamente.",
insight:"Não diga quem você é. Mostre quem você é. Repetidamente."},
{id:36,icon:"❤️",cat:"persuasão",lvl:2,xp:8,title:"Afeição: o que te torna atraente",
body:"Cialdini: as pessoas são influenciadas por quem gostam. Você se torna mais atraente para o evitativo sendo genuíno, sem agenda, sem pressão — a versão mais segura de você.",
insight:"Quanto menos você tenta convencer, mais natural é a atração."},
{id:37,icon:"💎",cat:"persuasão",lvl:3,xp:12,title:"Escassez: Sua Presença tem Valor",
body:"Escassez aumenta o valor percebido. Não em sentido manipulador — mas o fato de você ter uma vida, projetos, objetivos próprios, faz sua presença ser mais valiosa quando acontece.",
insight:"Não esteja sempre disponível. Ter vida própria é mais atraente que disponibilidade total."},
{id:38,icon:"🌐",cat:"persuasão",lvl:3,xp:12,title:"Aprovação Social e o Mundo Dela",
body:"O que as pessoas ao redor dela valorizam influencia o que ela valoriza. O pai tem peso enorme. Reconquistar respeito na família dela (com paciência e maturidade) é estratégico a longo prazo.",
insight:"Maturidade e respeito ao pai dela valem mais que qualquer declaração de amor."},
// ── MINDSET ──
{id:39,icon:"🧭",cat:"mindset",lvl:1,xp:5,title:"Drifting vs. Intenção",
body:"Napoleon Hill: a maioria das pessoas age em 'drifting' — sem intenção clara, reagindo a cada emoção. No relacionamento com evitativo, drifting é fatal. Saber o padrão dela permite agir com INTENÇÃO.",
insight:"Saber o padrão transforma reação emocional em ação estratégica."},
{id:40,icon:"🎯",cat:"mindset",lvl:1,xp:5,title:"Propósito Definido",
body:"Hill: ter clareza do que você quer — ser o tipo de parceiro seguro que uma evitativa consegue confiar — direciona suas ações. Sem propósito claro, você age por impulso ansioso.",
insight:"Defina: 'Quero ser o cara seguro e presente que ela consegue se aproximar'. E age em direção a isso."},
{id:41,icon:"😨",cat:"mindset",lvl:2,xp:8,title:"Medo como Sabotador",
body:"Hill: o medo — de perder ela, de não ser suficiente — é o que gera os comportamentos ansiosos que afastam o evitativo. Identificar o medo específico é o primeiro passo para não ser controlado por ele.",
insight:"O que você tem medo de verdade? Nomeie. Medo nomeado perde parte do poder."},
{id:42,icon:"🔄",cat:"mindset",lvl:2,xp:8,title:"Hábito Substitui Força de Vontade",
body:"Hill: a mudança de comportamento que dura é a que vira hábito, não a que depende de esforço constante. Praticar o autocontrole nas pequenas situações cotidianas constrói o hábito.",
insight:"Cada pequena situação em que você age bem é um treino que reduz o esforço futuro."},
{id:43,icon:"🌊",cat:"mindset",lvl:3,xp:12,title:"Mente Aberta e Flexibilidade",
body:"Rigidez gera atrito. O relacionamento ansioso-evitativo precisa de flexibilidade constante: adaptando o timing, o formato da comunicação, o nível de intensidade ao estado dela.",
insight:"Flexibilidade não é fraqueza. É inteligência relacional."},
{id:44,icon:"🏆",cat:"mindset",lvl:4,xp:15,title:"A Versão Segura de Você",
body:"O objetivo final não é dominar técnicas — é se tornar uma pessoa com apego mais seguro: alguém que não precisa de reasseguramento constante, que confia na conexão sem precisar testá-la.",
insight:"Trabalhar no seu apego beneficia todos os seus relacionamentos, não só esse."},
// ── RELACIONAMENTO ──
{id:45,icon:"🕯️",cat:"relacionamento",lvl:2,xp:8,title:"Depois de um Momento Íntimo",
body:"Após intimidade ou conversa muito profunda: não faça perguntas, não peça confirmação, não force o assunto. Deixe o momento ser o que foi. O evitativo precisa de tempo para processar.",
insight:"O silêncio depois de um momento bom é parte do momento. Não quebre."},
{id:46,icon:"🏠",cat:"relacionamento",lvl:2,xp:8,title:"Presença Física vs. Digital",
body:"Com o evitativo, presença física co-regula o sistema nervoso. Estar junto em silêncio é mais poderoso que horas de texto. Priorize tempo juntos quando possível, mesmo sem conversar muito.",
insight:"Junto em silêncio vale mais que conversa profunda por mensagem."},
{id:47,icon:"🌡️",cat:"relacionamento",lvl:3,xp:12,title:"Lendo o Estado Emocional Dela",
body:"Aprenda a ler quando ela está em modo aberto (humor, memes, responde rápido) vs. modo fechado (monossilábica, demora, minimal). No modo fechado, não force. No modo aberto, não desperdice.",
insight:"'Ela mandou meme' = janela aberta. 'Ela respondeu só sim' = janela fechada."},
{id:48,icon:"🎪",cat:"relacionamento",lvl:3,xp:12,title:"Eventos Externos Fecham o Evitativo",
body:"Pressão do pai, estresse na escola, traumas, situações difíceis — o evitativo fecha mais durante eventos externos. Nesses momentos, sua função é ser presença leve, não adicionar mais demanda.",
insight:"Quando a vida dela está pesada, seja a parte leve, não mais uma demanda."},
{id:49,icon:"💬",cat:"relacionamento",lvl:3,xp:12,title:"Como pedir o que você precisa",
body:"O ansioso também tem necessidades legítimas. A forma de comunicá-las ao evitativo: sem acusação, em momento calmo, de forma simples. 'Gostaria de te ver mais' é diferente de 'você não me dá atenção'.",
insight:"Fale em primeira pessoa sobre o que você sente, não em terceira pessoa sobre o que ela faz."},
{id:50,icon:"🌟",cat:"relacionamento",lvl:4,xp:15,title:"O Paradoxo da Conexão",
body:"Com evitativo: quanto mais você investe na sua própria vida (projetos, amigos, objetivos), mais seguro você parece — e mais o evitativo se sente atraído a se aproximar. Dependência afasta; autonomia atrai.",
insight:"Ser alguém completo fora do relacionamento é o que torna o relacionamento mais forte."},
];

function analyzeMessage(msg){
  if(!msg||msg.trim().length===0)return 0;
  const lower=msg.toLowerCase();
  let score=0;
  
  const highP=['precisamos conversar','por que você','me conta tudo','tá tudo bem','preciso saber','você me ama','o que você sente','fala comigo','me diz','me explica','por que não'];
  const medP=['me conta','como você tá','você tá bem','estou preocupado','fico ansioso','sinto falta','você sumiu'];
  const lowP=['no seu tempo','tá bom','sem pressão','quando quiser','deixa pra lá','tudo bem','tá ótimo'];
  const goodA=['te amo','saudade','pensei em você','boa noite','bom dia','dormiu bem','kkkk','hehe'];
  
  highP.forEach(p=>{if(lower.includes(p))score+=3;});
  medP.forEach(p=>{if(lower.includes(p))score+=1.5;});
  lowP.forEach(p=>{if(lower.includes(p))score-=2;});
  goodA.forEach(p=>{if(lower.includes(p))score-=1;});
  
  const qCount=(msg.match(/\?/g)||[]).length;
  score+=qCount*0.8;
  if(msg.length>200)score+=2;
  if(msg.length>400)score+=2;
  if(msg.length<30)score-=1;
  
  return score;
}

function getCoaching(score,msg){
  if(score>4)return{level:'danger',title:'⚠️ Pressão Alta',color:'#FF5566',text:'Esta mensagem provavelmente ativou o mecanismo de defesa dela. Muita intensidade emocional, muitas perguntas ou muita cobrança fecham o evitativo.'};
  if(score>2)return{level:'warning',title:'⚡ Pressão Moderada',color:'#FF8C47',text:'A mensagem tem alguma pressão. Pode funcionar, mas poderia ser mais leve. Evite perguntas diretas sobre sentimentos e encurte a mensagem.'};
  if(score>0)return{level:'ok',title:'✅ Neutro',color:'#8888AA',text:'A mensagem é neutra. Não fecha, não abre muito. Pode funcionar como manutenção de contato.'};
  if(score>-2)return{level:'good',title:'💚 Boa Abordagem',color:'#48BB8C',text:'Mensagem leve, sem pressão. Este tipo de comunicação cria segurança para o evitativo se aproximar.'};
  return{level:'excellent',title:'🌟 Excelente',color:'#C4A24A',text:'Perfeito. Mensagem carinhosa sem demandar resposta emocional. Exatamente o que cria abertura com o evitativo.'};
}

// ── CONCEITOS TAB ──
function ConceptsTab({progress,saveP,addXP}){
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[filter,setFilter]=useState("all");
  const cats=["all",...Object.keys(catColors)];
  const filtered=filter==="all"?CONCEPTS:CONCEPTS.filter(c=>c.cat===filter);
  const c=filtered[idx]||CONCEPTS[0];
  const col=catColors[c.cat]||catColors.evitativo;
  
  const nav=(dir)=>{
    setFlipped(false);
    setTimeout(()=>{
      const next=idx+dir;
      if(next>=0&&next<filtered.length){
        setIdx(next);
        if(!progress.seen.includes(c.id)){
          const np={...progress,seen:[...progress.seen,c.id],xp:progress.xp+c.xp};
          saveP(np);
        }
      }
    },100);
  };
  
  const goTo=(i)=>{
    setIdx(i);setFlipped(false);
    const concept=filtered[i];
    if(!progress.seen.includes(concept.id)){
      const np={...progress,seen:[...progress.seen,concept.id],xp:progress.xp+concept.xp};
      saveP(np);
    }
  };
  
  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",gap:"6px",marginBottom:"12px",overflowX:"auto",paddingBottom:"4px"}}>
        {cats.map(cat=>(
          <button key={cat} onClick={()=>{setFilter(cat);setIdx(0);setFlipped(false);}}
            style={{flex:"none",padding:"5px 10px",borderRadius:"20px",border:`1px solid ${filter===cat?(catColors[cat]?.border||"#7C6FFF"):"#1E1E3F"}`,background:filter===cat?"rgba(124,111,255,0.1)":"transparent",color:filter===cat?(catColors[cat]?.text||"#A89EFF"):"#8888AA",fontSize:"11px",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap"}}>
            {cat==="all"?"Todos":catColors[cat]?.label||cat}
          </button>
        ))}
      </div>
      
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px",fontSize:"12px",color:"#8888AA"}}>
        <span>{idx+1}/{filtered.length}</span>
        <div style={{flex:1,height:"3px",background:"#1E1E3F",borderRadius:"99px"}}>
          <div style={{width:`${((idx+1)/filtered.length)*100}%`,height:"100%",background:"#7C6FFF",borderRadius:"99px",transition:"width 0.3s"}}/>
        </div>
        <span style={{color:"#C4A24A",fontSize:"11px"}}>+{c.xp}xp</span>
      </div>
      
      <div className="fade" style={{background:col.bg,border:`1px solid ${col.border}`,borderRadius:"16px",padding:"20px",marginBottom:"14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <div style={{fontSize:"10px",fontWeight:"700",color:col.text,letterSpacing:"1.5px"}}>{col.label}</div>
          <div style={{fontSize:"10px",color:"#8888AA"}}>Nível {c.lvl}</div>
        </div>
        <div style={{fontSize:"28px",marginBottom:"10px"}}>{c.icon}</div>
        <div style={{fontSize:"17px",fontWeight:"800",marginBottom:"12px",lineHeight:"1.3"}}>{c.title}</div>
        {!flipped?(
          <div style={{fontSize:"14px",lineHeight:"1.65",color:"#CCCCDD"}}>{c.body}</div>
        ):(
          <div style={{background:"rgba(124,111,255,0.12)",border:"1px solid rgba(124,111,255,0.3)",borderRadius:"10px",padding:"12px"}}>
            <div style={{fontSize:"10px",fontWeight:"700",color:"#7C6FFF",letterSpacing:"1px",marginBottom:"4px"}}>💡 INSIGHT PRÁTICO</div>
            <div style={{fontSize:"13px",color:"#C0B8FF",lineHeight:"1.5"}}>{c.insight}</div>
          </div>
        )}
      </div>
      
      <div style={{display:"flex",gap:"8px",marginBottom:"20px"}}>
        <button disabled={idx===0} onClick={()=>nav(-1)} style={{flex:1,padding:"11px",borderRadius:"10px",border:"1px solid #1E1E3F",background:idx===0?"#0A0A18":"#1E1E3F",color:idx===0?"#333366":"#A89EFF",fontWeight:"600",fontSize:"13px",cursor:idx===0?"default":"pointer"}}>← Ant</button>
        <button onClick={()=>setFlipped(f=>!f)} style={{flex:2,padding:"11px",borderRadius:"10px",border:"1px solid #7C6FFF",background:"rgba(124,111,255,0.15)",color:"#A89EFF",fontWeight:"600",fontSize:"13px",cursor:"pointer"}}>{flipped?"📖 Conceito":"💡 Insight"}</button>
        <button disabled={idx===filtered.length-1} onClick={()=>nav(1)} style={{flex:1,padding:"11px",borderRadius:"10px",border:"1px solid #1E1E3F",background:idx===filtered.length-1?"#0A0A18":"#1E1E3F",color:idx===filtered.length-1?"#333366":"#A89EFF",fontWeight:"600",fontSize:"13px",cursor:idx===filtered.length-1?"default":"pointer"}}>Próx →</button>
      </div>
      
      <div style={{fontSize:"12px",color:"#8888AA",marginBottom:"10px",fontWeight:"600"}}>TODOS OS CONCEITOS ({filtered.length})</div>
      {filtered.map((con,i)=>{
        const cc=catColors[con.cat]||catColors.evitativo;
        const seen=progress.seen.includes(con.id);
        return(
          <div key={con.id} onClick={()=>goTo(i)}
            style={{background:i===idx?"rgba(124,111,255,0.1)":"#0F0F24",border:`1px solid ${i===idx?"#7C6FFF":"#1E1E3F"}`,borderRadius:"10px",padding:"12px 14px",marginBottom:"7px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
            <span style={{fontSize:"18px"}}>{con.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:"13px",fontWeight:"600",color:i===idx?"#A89EFF":"#CCCCDD"}}>{con.title}</div>
              <div style={{fontSize:"10px",color:cc.text,marginTop:"2px"}}>{cc.label} · Nv {con.lvl}</div>
            </div>
            {seen&&<span style={{fontSize:"12px",color:"#48BB8C"}}>✓</span>}
          </div>
        );
      })}
    </div>
  );
}

// ── QUIZ TAB ──
function QuizTab({progress,saveP,addXP}){
  const[qs,setQs]=useState(()=>shuffle(QUESTIONS));
  const[qi,setQi]=useState(0);
  const[sel,setSel]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[score,setScore]=useState(0);
  const[done,setDone]=useState(false);
  const q=qs[qi];
  
  const select=(i)=>{
    if(answered)return;
    setSel(i);setAnswered(true);
    const ok=q.options[i].correct;
    if(ok)setScore(s=>s+1);
    saveP({...progress,qCorrect:progress.qCorrect+(ok?1:0),qTotal:progress.qTotal+1,xp:progress.xp+(ok?q.xp:Math.floor(q.xp*0.2))});
  };
  
  const next=()=>{
    if(qi+1>=qs.length){setDone(true);return;}
    setQi(i=>i+1);setSel(null);setAnswered(false);
  };
  
  const restart=()=>{setQs(shuffle(QUESTIONS));setQi(0);setSel(null);setAnswered(false);setScore(0);setDone(false);};
  
  if(done)return(
    <div style={{textAlign:"center",padding:"50px 20px"}}>
      <div style={{fontSize:"44px",marginBottom:"16px"}}>🎯</div>
      <div style={{fontSize:"56px",fontWeight:"900",background:"linear-gradient(135deg,#A89EFF,#7C6FFF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{score}/{qs.length}</div>
      <div style={{fontSize:"14px",color:"#8888AA",marginBottom:"12px"}}>acertos nesta rodada</div>
      <div style={{fontSize:"28px",fontWeight:"800",color:score/qs.length>=0.8?"#48BB8C":score/qs.length>=0.6?"#FF8C47":"#FF5566",marginBottom:"28px"}}>
        {score/qs.length>=0.8?"Excelente! 🔥":score/qs.length>=0.6?"Bom trabalho 💪":"Continue praticando 📚"}
      </div>
      <button onClick={restart} style={{background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",border:"none",borderRadius:"10px",padding:"14px 40px",color:"white",fontWeight:"700",fontSize:"14px",cursor:"pointer"}}>Nova Rodada</button>
    </div>
  );
  
  const cc=catColors[q.cat]||catColors.evitativo;
  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px",fontSize:"12px",color:"#8888AA"}}>
        <span>{qi+1}/{qs.length}</span>
        <div style={{flex:1,height:"3px",background:"#1E1E3F",borderRadius:"99px"}}>
          <div style={{width:`${((qi+1)/qs.length)*100}%`,height:"100%",background:"#7C6FFF",borderRadius:"99px"}}/>
        </div>
        <span style={{color:"#48BB8C",fontWeight:"700"}}>{score} ✓</span>
        <span style={{color:"#C4A24A",fontSize:"11px"}}>+{q.xp}xp</span>
      </div>
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"18px",marginBottom:"14px"}}>
        <div style={{fontSize:"10px",fontWeight:"700",color:cc.text,letterSpacing:"1.5px",marginBottom:"8px"}}>{cc.label}</div>
        <div style={{fontSize:"15px",lineHeight:"1.55",fontWeight:"600"}}>{q.situation}</div>
      </div>
      {q.options.map((opt,i)=>{
        let bg="#080814",border="#1E1E3F",color="#CCCCDD";
        if(answered){
          if(opt.correct){bg="rgba(72,187,140,0.12)";border="#48BB8C";color="#7DD9B0";}
          else if(i===sel){bg="rgba(255,85,102,0.12)";border="#FF5566";color="#FF8899";}
        }else if(i===sel){bg="rgba(124,111,255,0.18)";border="#7C6FFF";color="#A89EFF";}
        return(
          <button key={i} onClick={()=>select(i)} style={{width:"100%",textAlign:"left",padding:"12px 14px",borderRadius:"10px",border:`1px solid ${border}`,background:bg,color,fontSize:"13.5px",lineHeight:"1.4",fontWeight:"500",cursor:answered?"default":"pointer",marginBottom:"8px",display:"block"}}>
            <span style={{fontWeight:"700",marginRight:"6px",color:"#7C6FFF"}}>{String.fromCharCode(65+i)}.</span>{opt.text}
          </button>
        );
      })}
      {answered&&(
        <>
          <div style={{background:"rgba(124,111,255,0.08)",border:"1px solid rgba(124,111,255,0.25)",borderRadius:"10px",padding:"14px",margin:"4px 0 14px"}}>
            <div style={{fontSize:"10px",fontWeight:"700",color:"#7C6FFF",letterSpacing:"1px",marginBottom:"6px"}}>{q.options[sel]?.correct?"✅ CORRETO":"❌ INCORRETO"} · +{q.options[sel]?.correct?q.xp:Math.floor(q.xp*0.2)} XP</div>
            <div style={{fontSize:"13px",color:"#C0B8FF",lineHeight:"1.55"}}>{q.explanation}</div>
          </div>
          <button onClick={next} style={{width:"100%",background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",border:"none",borderRadius:"10px",padding:"13px",color:"white",fontWeight:"700",fontSize:"14px",cursor:"pointer"}}>
            {qi+1>=qs.length?"Ver Resultado":"Próxima →"}
          </button>
        </>
      )}
    </div>
  );
}

// ── SIMULADOR TAB ──
function SimuladorTab({progress,addXP}){
  const[mode,setMode]=useState("menu"); // menu | scenario | free
  const[scenario,setScenario]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState("");
  const[typing,setTyping]=useState(false);
  const[lastCoach,setLastCoach]=useState(null);
  const[apiKey,setApiKey]=useState(()=>{ try{return localStorage.getItem("dtq_api")||"";}catch(e){return"";} });
  const[showApiInput,setShowApiInput]=useState(false);
  const bottomRef=useRef(null);
  
  useEffect(()=>{
    bottomRef.current?.scrollIntoView({behavior:"smooth"});
  },[msgs,typing]);
  
  const saveApiKey=(k)=>{
    setApiKey(k);
    try{localStorage.setItem("dtq_api",k);}catch(e){}
  };
  
  const startScenario=(sc)=>{
    setScenario(sc);
    setMsgs([{role:"julia",text:sc.start,time:new Date()}]);
    setMode("scenario");
    setLastCoach(null);
  };
  
  const startFree=()=>{
    setScenario(null);
    setMsgs([{role:"julia",text:"oi",time:new Date()}]);
    setMode("free");
    setLastCoach(null);
  };
  
  const sendMessage=async()=>{
    const txt=input.trim();
    if(!txt||typing)return;
    setInput("");
    const userMsg={role:"user",text:txt,time:new Date()};
    setMsgs(m=>[...m,userMsg]);
    
    const score=analyzeMessage(txt);
    const coaching=getCoaching(score,txt);
    
    setTyping(true);
    
    if(apiKey){
      // AI response
      try{
        const history=[...msgs,userMsg].map(m=>({
          role:m.role==="user"?"user":"assistant",
          content:m.text.replace(/\[.*?\]\n*/g,"").trim()||"..."
        })).filter(m=>m.content.length>0);
        
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({
            model:"claude-haiku-4-5-20251001",
            max_tokens:200,
            system:JULIA_PERSONA,
            messages:history,
          })
        });
        const data=await res.json();
        const reply=data.content?.[0]?.text||"...";
        setTyping(false);
        setMsgs(m=>[...m,{role:"julia",text:reply,time:new Date()}]);
      }catch(err){
        setTyping(false);
        setMsgs(m=>[...m,{role:"julia",text:"...",time:new Date()}]);
      }
    }else{
      // Rule-based response
      const delay=1000+Math.random()*2000;
      await new Promise(r=>setTimeout(r,delay));
      
      let reply;
      if(score>4){
        const opts=["sim","mb","depois a gente fala","tô ocupada agora","tá","sim sim"];
        reply=opts[Math.floor(Math.random()*opts.length)];
      }else if(score>2){
        const opts=["sim sim","tô bem","tá bom mb","ok","kkk","tá"];
        reply=opts[Math.floor(Math.random()*opts.length)];
      }else if(score>0){
        const opts=["oi :)","tô aqui","sim","kkk","hm sim"];
        reply=opts[Math.floor(Math.random()*opts.length)];
      }else if(score>-2){
        const opts=["kkkk","boa","isso mesmo hehe","kkk q isso","que bom :)"];
        reply=opts[Math.floor(Math.random()*opts.length)];
      }else{
        const opts=["nuuu que isso 😭","kkkkkk para","amei isso","kkkkk tá bom","hahahaha para"];
        reply=opts[Math.floor(Math.random()*opts.length)];
      }
      setTyping(false);
      setMsgs(m=>[...m,{role:"julia",text:reply,time:new Date()}]);
    }
    
    setLastCoach(coaching);
    addXP(10);
  };
  
  if(mode==="menu")return(
    <div style={{padding:"16px"}}>
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"16px",marginBottom:"14px"}}>
        <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"600",letterSpacing:"0.5px",marginBottom:"8px"}}>SIMULADOR DE CONVERSA · JULIA</div>
        <div style={{fontSize:"13px",color:"#CCCCDD",lineHeight:"1.55",marginBottom:"12px"}}>
          Pratique conversas com base no padrão de apego evitativo dela. Receba feedback em tempo real sobre cada mensagem.
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"10px 12px",background:apiKey?"rgba(72,187,140,0.08)":"rgba(255,140,71,0.08)",border:`1px solid ${apiKey?"#48BB8C":"#FF8C47"}`,borderRadius:"8px"}}>
          <span style={{fontSize:"14px"}}>{apiKey?"🤖":"⚙️"}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:apiKey?"#48BB8C":"#FF8C47"}}>{apiKey?"IA ATIVA — Respostas reais da Julia":"MODO BÁSICO — Respostas pré-programadas"}</div>

          <button onClick={()=>setShowApiInput(s=>!s)} style={{background:"transparent",border:"1px solid #1E1E3F",borderRadius:"6px",padding:"4px 8px",color:"#8888AA",fontSize:"11px",cursor:"pointer"}}>

          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}

          style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"12px",padding:"10px 12px",color:"#E8E8F5",fontSize:"14px",resize:"none",maxHeight:"100px",lineHeight:"1.4",overflowY:"auto"}}
          rows={1}
          className="chat-input"/>
        <button onClick={sendMessage} disabled={!input.trim()||typing}
          style={{width:"40px",height:"40px",borderRadius:"50%",border:"none",background:input.trim()&&!typing?"#7C6FFF":"#1E1E3F",color:"white",fontSize:"16px",cursor:input.trim()&&!typing?"pointer":"default",flex:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>
          ➤
        </button>
      </div>
    </div>
  );
}
