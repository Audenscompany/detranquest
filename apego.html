function analyzeMessage(msg){
  if(!msg||!msg.trim())return 0;
  const lower=msg.toLowerCase();
  let score=0;
  const highP=['precisamos conversar','por que você','me conta tudo','tá tudo bem?','preciso saber','você me ama?','o que você sente','fala comigo','me explica','por que não me','cadê você'];
  const medP=['me conta','como você tá','você tá bem','estou preocupado','fico ansioso','você sumiu','sinto falta'];
  const lowP=['no seu tempo','tá bom','sem pressão','quando quiser','deixa pra lá','tudo bem','tá ótimo','sem problema'];
  const goodA=['hehehe','kkk','hehe','que isso','sorriso','pse'];
  highP.forEach(p=>{if(lower.includes(p))score+=3;});
  medP.forEach(p=>{if(lower.includes(p))score+=1.5;});
  lowP.forEach(p=>{if(lower.includes(p))score-=2;});
  goodA.forEach(p=>{if(lower.includes(p))score-=1;});
  const q=(msg.match(/\?/g)||[]).length;
  score+=q*0.8;
  if(msg.length>200)score+=2.5;
  if(msg.length>350)score+=2;
  if(msg.length<25)score-=1;
  return score;
}

function getCoaching(score){
  if(score>4)return{lvl:'danger',icon:'🚨',title:'Pressão Alta — Julia vai fechar',color:'#FF5566',text:'Muita intensidade emocional, muitas perguntas ou mensagem muito longa. O mecanismo de defesa dela vai ativar. Simplifica drasticamente.'};
  if(score>2)return{lvl:'warning',icon:'⚠️',title:'Pressão Moderada',color:'#FF8C47',text:'A mensagem tem carga emocional. Pode funcionar, mas poderia ser mais leve. Tira uma pergunta ou encurta.'};
  if(score>0)return{lvl:'neutral',icon:'⚡',title:'Neutro — ok',color:'#8888AA',text:'Mensagem neutra. Não fecha, não abre muito. Funciona como manutenção de presença.'};
  if(score>-2)return{lvl:'good',icon:'✅',title:'Boa Abordagem',color:'#48BB8C',text:'Leve, sem pressão. Cria segurança para ela se aproximar naturalmente.'};
  return{lvl:'excellent',icon:'🌟',title:'Excelente — cria abertura',color:'#C4A24A',text:'Perfeito. Carinhoso sem demandar resposta emocional. Exatamente o que abre o evitativo.'};
}

// ── RULE-BASED JULIA RESPONSES ──
function getRuleBased(score,scenario){
  if(scenario){
    const map={
      1:["sim kkk","to aqui","hehehe"],
      2:["[silêncio]","sim","mb"],
      3:["Sla","Mas vai passar","Ta bom"],
      4:["Fazer oq","Consequências","Vrdd"],
      5:["Sim kkkkk","Dormi cedo, esqueci de falar","Bom dia mb"],
      6:["KKKKKKKKKK pse","Que isso","hahaha para"],
      7:["Te amo","❤️","Hehe"],
      8:["Boa ideia","Sim sim","Quando vc quer vir?"],
    };
    const opts=map[scenario]||["mb","sim sim","hehehe"];
    return opts[Math.floor(Math.random()*opts.length)];
  }
  if(score>4){const o=["sim","mb","ta bom","depois a gente fala","tô ocupada","tá","sim sim"];return o[Math.floor(Math.random()*o.length)];}
  if(score>2){const o=["sim sim","tô bem","tá bom mb","ok","kkk","blzinha"];return o[Math.floor(Math.random()*o.length)];}
  if(score>0){const o=["oi :)","tô aqui","sim","hehehe","hm sim"];return o[Math.floor(Math.random()*o.length)];}
  if(score>-2){const o=["kkkkk","boa","isso mesmo hehe","que bom :)","vrdd"];return o[Math.floor(Math.random()*o.length)];}
  const o=["nuuuuu que isso 😭","kkkkkkkk para","amei isso","kkkkk pse","hahahaha"];return o[Math.floor(Math.random()*o.length)];
}

function App(){

  const[tab,setTab]=useState("conceitos");
  const[progress,setProgress]=useState({xp:0,seen:[],qCorrect:0,qTotal:0});

  useEffect(()=>{try{const p=localStorage.getItem("dtq_v3");if(p)setProgress(JSON.parse(p));}catch(e){}});

  const saveP=useCallback((p)=>{setProgress(p);try{localStorage.setItem("dtq_v3",JSON.stringify(p));}catch(e){}});
  const addXP=useCallback((n)=>{setProgress(prev=>{const np={...prev,xp:prev.xp+n};try{localStorage.setItem("dtq_v3",JSON.stringify(np));}catch(e){}return np;});});

  const doLogin=()=>{
    if(form.email===AUTH.email&&form.password===AUTH.password)setScreen("app");
    else setLoginErr("Email ou senha incorretos.");
  };

  const lv=getLevel(progress.xp);
  const nextLv=LEVELS[lv.n]||lv;

  if(screen==="login")return(
    <div style={{background:"#080814",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>

        <div style={{textAlign:"center",marginBottom:"32px"}}>

          <div style={{fontSize:"21px",fontWeight:"800",background:"linear-gradient(135deg,#A89EFF,#7C6FFF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Domínio Total</div>
          <div style={{fontSize:"12px",color:"#8888AA",marginTop:"4px"}}>Baseado em 8 meses de conversa real</div>

        <input style={{width:"100%",background:"#080814",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"12px 14px",color:"#E8E8F5",fontSize:"15px",boxSizing:"border-box",marginBottom:"10px"}} type="email" placeholder="Email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        <input style={{width:"100%",background:"#080814",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"12px 14px",color:"#E8E8F5",fontSize:"15px",boxSizing:"border-box",marginBottom:"18px"}} type="password" placeholder="Senha" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        <button onClick={doLogin} style={{width:"100%",background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",border:"none",borderRadius:"10px",padding:"14px",color:"white",fontWeight:"700",fontSize:"15px",cursor:"pointer"}}>Entrar</button>

  const tabs=[["conceitos","📚"],["quiz","🎯"],["resposta","💡"],["simulador","💬"],["progresso","📊"]];

    <div style={{background:"#080814",minHeight:"100vh",color:"#E8E8F5",maxWidth:"460px",margin:"0 auto",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"12px 16px 8px",borderBottom:"1px solid #1E1E3F"}}>

function ConceptsTab({progress,saveP,addXP}){
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[filter,setFilter]=useState("all");
  const filtered=filter==="all"?CONCEPTS:CONCEPTS.filter(c=>c.cat===filter);
  const c=filtered[idx]||CONCEPTS[0];
  const col=catColors[c.cat]||catColors.evitativo;
  const nav=(dir)=>{setFlipped(false);setTimeout(()=>{const n=idx+dir;if(n>=0&&n<filtered.length){setIdx(n);if(!progress.seen.includes(filtered[n].id)){const np={...progress,seen:[...progress.seen,filtered[n].id],xp:progress.xp+filtered[n].xp};saveP(np);}}},100);};
  const goTo=(i)=>{setIdx(i);setFlipped(false);const concept=filtered[i];if(!progress.seen.includes(concept.id)){const np={...progress,seen:[...progress.seen,concept.id],xp:progress.xp+concept.xp};saveP(np);}};
  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",gap:"6px",marginBottom:"12px",overflowX:"auto",paddingBottom:"4px"}}>
        {["all",...Object.keys(catColors)].map(cat=>(
          <button key={cat} onClick={()=>{setFilter(cat);setIdx(0);setFlipped(false);}}
            style={{flex:"none",padding:"5px 10px",borderRadius:"20px",border:`1px solid ${filter===cat?(catColors[cat]?.border||"#7C6FFF"):"#1E1E3F"}`,background:filter===cat?"rgba(124,111,255,0.1)":"transparent",color:filter===cat?(catColors[cat]?.text||"#A89EFF"):"#8888AA",fontSize:"11px",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap"}}>
            {cat==="all"?"Todos":catColors[cat]?.label||cat}
          </button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px",fontSize:"12px",color:"#8888AA"}}>
        <span>{idx+1}/{filtered.length}</span>
        <div style={{flex:1,height:"3px",background:"#1E1E3F",borderRadius:"99px"}}><div style={{width:`${((idx+1)/filtered.length)*100}%`,height:"100%",background:"#7C6FFF",borderRadius:"99px",transition:"width 0.3s"}}/></div>
        <span style={{color:"#C4A24A",fontSize:"11px"}}>+{c.xp}xp</span>
      </div>
      <div className="fade" style={{background:col.bg,border:`1px solid ${col.border}`,borderRadius:"16px",padding:"20px",marginBottom:"14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
          <div style={{fontSize:"10px",fontWeight:"700",color:col.text,letterSpacing:"1.5px"}}>{col.label}</div>
          <div style={{fontSize:"10px",color:"#8888AA"}}>Nível {c.lvl}</div>
        </div>
        <div style={{fontSize:"26px",marginBottom:"10px"}}>{c.icon}</div>
        <div style={{fontSize:"16px",fontWeight:"800",marginBottom:"12px",lineHeight:"1.3"}}>{c.title}</div>
        {!flipped?(
          <div style={{fontSize:"13.5px",lineHeight:"1.65",color:"#CCCCDD"}}>{c.body}</div>

function QuizTab({progress,saveP,addXP}){
  const[qs,setQs]=useState(()=>shuffle(QUESTIONS));
  const[qi,setQi]=useState(0);
  const[sel,setSel]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[score,setScore]=useState(0);
  const[done,setDone]=useState(false);
  const q=qs[qi];
  const select=(i)=>{
    if(answered)return;setSel(i);setAnswered(true);
    const ok=q.options[i].correct;
    if(ok)setScore(s=>s+1);
    saveP({...progress,qCorrect:progress.qCorrect+(ok?1:0),qTotal:progress.qTotal+1,xp:progress.xp+(ok?q.xp:Math.floor(q.xp*0.2))});
  };
  const next=()=>{if(qi+1>=qs.length){setDone(true);return;}setQi(i=>i+1);setSel(null);setAnswered(false);};
  const restart=()=>{setQs(shuffle(QUESTIONS));setQi(0);setSel(null);setAnswered(false);setScore(0);setDone(false);};
  if(done)return(
    <div style={{textAlign:"center",padding:"50px 20px"}}>
      <div style={{fontSize:"44px",marginBottom:"16px"}}>🎯</div>
      <div style={{fontSize:"56px",fontWeight:"900",background:"linear-gradient(135deg,#A89EFF,#7C6FFF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{score}/{qs.length}</div>
      <div style={{fontSize:"14px",color:"#8888AA",marginBottom:"12px"}}>acertos</div>
      <div style={{fontSize:"26px",fontWeight:"800",color:score/qs.length>=0.8?"#48BB8C":score/qs.length>=0.6?"#FF8C47":"#FF5566",marginBottom:"28px"}}>
        {score/qs.length>=0.8?"Excelente! 🔥":score/qs.length>=0.6?"Bom trabalho 💪":"Continue praticando 📚"}
      </div>
      <button onClick={restart} style={{background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)",border:"none",borderRadius:"10px",padding:"14px 40px",color:"white",fontWeight:"700",fontSize:"14px",cursor:"pointer"}}>Nova Rodada</button>
    </div>
  );
  const cc=catColors[q.cat]||catColors.evitativo;
  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px",fontSize:"12px",color:"#8888AA"}}>
        <span>{qi+1}/{qs.length}</span>
        <div style={{flex:1,height:"3px",background:"#1E1E3F",borderRadius:"99px"}}><div style={{width:`${((qi+1)/qs.length)*100}%`,height:"100%",background:"#7C6FFF",borderRadius:"99px"}}/></div>
        <span style={{color:"#48BB8C",fontWeight:"700"}}>{score} ✓</span>
        <span style={{color:"#C4A24A",fontSize:"11px"}}>+{q.xp}xp</span>
      </div>
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"18px",marginBottom:"14px"}}>
        <div style={{fontSize:"10px",fontWeight:"700",color:cc.text,letterSpacing:"1.5px",marginBottom:"8px"}}>{cc.label}</div>
        <div style={{fontSize:"15px",lineHeight:"1.55",fontWeight:"600"}}>{q.situation}</div>
      </div>
      {q.options.map((opt,i)=>{
        let bg="#080814",border="#1E1E3F",color="#CCCCDD";
        if(answered){if(opt.correct){bg="rgba(72,187,140,0.12)";border="#48BB8C";color="#7DD9B0";}else if(i===sel){bg="rgba(255,85,102,0.12)";border="#FF5566";color="#FF8899";}}
        else if(i===sel){bg="rgba(124,111,255,0.18)";border="#7C6FFF";color="#A89EFF";}
        return(<button key={i} onClick={()=>select(i)} style={{width:"100%",textAlign:"left",padding:"12px 14px",borderRadius:"10px",border:`1px solid ${border}`,background:bg,color,fontSize:"13.5px",lineHeight:"1.4",fontWeight:"500",cursor:answered?"default":"pointer",marginBottom:"8px",display:"block"}}><span style={{fontWeight:"700",marginRight:"6px",color:"#7C6FFF"}}>{String.fromCharCode(65+i)}.</span>{opt.text}</button>);
      })}
      {answered&&(
        <><div style={{background:"rgba(124,111,255,0.08)",border:"1px solid rgba(124,111,255,0.25)",borderRadius:"10px",padding:"14px",margin:"4px 0 14px"}}>
          <div style={{fontSize:"10px",fontWeight:"700",color:"#7C6FFF",letterSpacing:"1px",marginBottom:"6px"}}>{q.options[sel]?.correct?"✅ CORRETO":"❌ INCORRETO"} · +{q.options[sel]?.correct?q.xp:Math.floor(q.xp*0.2)} XP</div>

function ConsultorChat({apiKey}){
  const[chatInput,setChatInput]=useState("");
  const[chatMsgs,setChatMsgs]=useState([]);
  const[chatLoading,setChatLoading]=useState(false);
  const chatBottomRef=useRef(null);
  useEffect(()=>{chatBottomRef.current?.scrollIntoView({behavior:"smooth"});},[chatMsgs]);

  const sendChat=async()=>{
    const txt=chatInput.trim();if(!txt||chatLoading)return;
    setChatInput("");
    setChatMsgs(m=>[...m,{role:"user",text:txt}]);
    setChatLoading(true);
    if(apiKey){
      try{
        const history=[...chatMsgs,{role:"user",text:txt}].map(m=>({role:m.role,content:m.text}));
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:500,system:CONSULTOR_SYSTEM,messages:history})
        });
        const data=await res.json();
        if(data.error)throw new Error(data.error.message);
        setChatMsgs(m=>[...m,{role:"assistant",text:data.content?.[0]?.text||"..."}]);
      }catch(e){setChatMsgs(m=>[...m,{role:"assistant",text:"Erro: "+e.message}]);}
    }else{
      const respostas={
        "safada":["Análise: a Julia tem esse lado, mas ativa com insinuação sutil, nunca com explícito direto. Planta uma ideia, não declara. Preciso da API key para analisar o momento específico."],
        "presente":["Baseado no que ela gosta: livro do gênero favorito dela, material de crochê premium, algo para os peixinhos dela, kit de chá/café para os dias de série em casa. Adicione API key para sugestões personalizadas para a data."],
        "date":["Julia adora ficar em casa: série maratonada com lanche especial, noite de jogos de tabuleiro, cozinhar juntos. Se sair: café aconchegante ou cinema (tarde de semana, menos gente). Adicione API key para ideias baseadas no contexto atual."],
        "timing":["Regra geral: ela demora → você demora a metade. Ela respondeu em 3h → você responde em 1h30. Nunca responda mais rápido que ela consistentemente. Com API key analiso o contexto específico."],
        "default":["Para respostas personalizadas baseadas no padrão real dela, adicione sua API key na seção acima. Sem ela, só consigo dar orientações gerais."]
      };
      const lower=txt.toLowerCase();
      const key=lower.includes("safad")||lower.includes("brecha")||lower.includes("querer")?"safada":
        lower.includes("present")||lower.includes("gift")?"presente":
        lower.includes("date")||lower.includes("final de semana")||lower.includes("sair")?"date":
        lower.includes("timing")||lower.includes("tempo")||lower.includes("quando responder")?"timing":"default";
      await new Promise(r=>setTimeout(r,600));
      setChatMsgs(m=>[...m,{role:"assistant",text:respostas[key][0]}]);
    }
    setChatLoading(false);
  };

  const sugestoes=["Tenho brecha para safada hoje?","Ideia de date para este final de semana","Como fazer ela querer mais?","Quanto tempo espero para responder?","Ideia de presente para ela"];

  return(
    <div>
      {chatMsgs.length===0&&(
        <div style={{marginBottom:"12px"}}>
          <div style={{fontSize:"10px",color:"#555577",marginBottom:"8px"}}>SUGESTÕES</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
            {sugestoes.map(s=>(
              <button key={s} onClick={()=>setChatInput(s)} style={{padding:"6px 10px",borderRadius:"20px",border:"1px solid #1E1E3F",background:"#0F0F24",color:"#8888AA",fontSize:"11px",cursor:"pointer"}}>{s}</button>
            ))}
          </div>
        </div>
      )}
      {chatMsgs.length>0&&(
        <div style={{background:"#0A0A18",borderRadius:"10px",padding:"12px",marginBottom:"10px",maxHeight:"300px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"8px"}}>
          {chatMsgs.map((m,i)=>(
            <div key={i} className="fade" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"85%",padding:"8px 12px",borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.role==="user"?"#5B4FFF":"#1A1A35",fontSize:"12.5px",lineHeight:"1.5",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{m.text}</div>
            </div>
          ))}
          {chatLoading&&<div style={{display:"flex"}}><div style={{padding:"8px 14px",borderRadius:"14px",background:"#1A1A35"}} className="typing"><span/><span/><span/></div></div>}
          <div ref={chatBottomRef}/>
        </div>
      )}
      <div style={{display:"flex",gap:"8px",alignItems:"flex-end"}}>
        <textarea value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}}
          placeholder="Pergunte qualquer coisa sobre ela ou a conversa..."
          style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"10px 12px",color:"#E8E8F5",fontSize:"13px",resize:"none",maxHeight:"80px",lineHeight:"1.4"}} rows={1}/>
        <button onClick={sendChat} disabled={!chatInput.trim()||chatLoading}
          style={{width:"36px",height:"36px",borderRadius:"50%",border:"none",background:chatInput.trim()&&!chatLoading?"#7C6FFF":"#1E1E3F",color:"white",fontSize:"14px",cursor:chatInput.trim()&&!chatLoading?"pointer":"default",flex:"none"}}>➤</button>
      </div>
    </div>
  );
}

// ── SIMULADOR TAB ──// ── SIMULADOR TAB ──
function SimuladorTab({addXP}){
  const[mode,setMode]=useState("menu");
  const[scenario,setScenario]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState("");
  const[typing,setTyping]=useState(false);
  const[lastCoach,setLastCoach]=useState(null);
  const[apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem("dtq_api")||"";}catch(e){return "";}});
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  const startScenario=(sc)=>{setScenario(sc);setMsgs([{role:"julia",text:sc.start}]);setMode("chat");setLastCoach(null);};
  const startFree=()=>{setScenario(null);setMsgs([{role:"julia",text:"oi"}]);setMode("chat");setLastCoach(null);};

  const send=async()=>{
    const txt=input.trim();if(!txt||typing)return;
    setInput("");
    setMsgs(m=>[...m,{role:"user",text:txt}]);
    const score=analyzeMessage(txt);
    setTyping(true);
    if(apiKey){
      try{
        const history=[...msgs,{role:"user",text:txt}].map(m=>({role:m.role==="user"?"user":"assistant",content:m.text.replace(/\[.*?\]\n*/g,"").trim()||"..."})).filter(m=>m.content.length>0&&m.content!=="...");
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:150,system:JULIA_PERSONA,messages:history})
        });
        const data=await res.json();
        const reply=data.content?.[0]?.text||"...";
        setTyping(false);setMsgs(m=>[...m,{role:"julia",text:reply}]);
      }catch(e){setTyping(false);setMsgs(m=>[...m,{role:"julia",text:"..."}]);}
    }else{
      await new Promise(r=>setTimeout(r,800+Math.random()*1500));
      const reply=getRuleBased(score,scenario?.id);
      setTyping(false);setMsgs(m=>[...m,{role:"julia",text:reply}]);
    }
    setLastCoach(getCoaching(score));
    addXP(8);
  };

  if(mode==="menu")return(
    <div style={{padding:"16px"}}>
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"16px",marginBottom:"14px"}}>
        <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"600",marginBottom:"8px"}}>SIMULADOR · JULIA</div>
        <div style={{fontSize:"13px",color:"#CCCCDD",lineHeight:"1.55",marginBottom:"12px"}}>Baseado em 8 meses de conversa real. Cada resposta da Julia usa o padrão comportamental real dela — desde o 'mb' até o 'nuuuu'.</div>
        <div style={{padding:"10px 12px",background:apiKey?"rgba(72,187,140,0.08)":"rgba(255,140,71,0.08)",border:`1px solid ${apiKey?"#48BB8C":"#FF8C47"}`,borderRadius:"8px",fontSize:"11px",color:apiKey?"#48BB8C":"#FF8C47",fontWeight:"700"}}>
          {apiKey?"🤖 IA ATIVA — Julia responde dinamicamente":"⚙️ Adicione API key na aba 'Resposta' para IA real"}
        </div>
      </div>
      <div style={{fontSize:"12px",color:"#8888AA",fontWeight:"600",marginBottom:"10px"}}>CENÁRIOS REAIS</div>
      {SCENARIOS.map(sc=>(
        <div key={sc.id} onClick={()=>startScenario(sc)} style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"20px"}}>{sc.icon}</span>
          <div>
            <div style={{fontSize:"13px",fontWeight:"600",color:"#CCCCDD"}}>{sc.title}</div>
            <div style={{fontSize:"11px",color:"#8888AA",marginTop:"2px"}}>{sc.context.slice(0,60)}...</div>
          </div>
        </div>
      ))}
      <button onClick={startFree} style={{width:"100%",background:"rgba(124,111,255,0.15)",border:"1px solid #7C6FFF",borderRadius:"10px",padding:"13px",color:"#A89EFF",fontWeight:"700",fontSize:"14px",cursor:"pointer",marginTop:"4px"}}>💬 Conversa Livre</button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)"}}>
      <div style={{padding:"10px 16px",borderBottom:"1px solid #1E1E3F",display:"flex",alignItems:"center",gap:"10px"}}>
        <button onClick={()=>setMode("menu")} style={{background:"transparent",border:"none",color:"#8888AA",fontSize:"18px",cursor:"pointer"}}>←</button>
        <div style={{width:"34px",height:"34px",background:"rgba(124,111,255,0.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px"}}>👩</div>
        <div>
          <div style={{fontSize:"13px",fontWeight:"700"}}>Julia</div>
          <div style={{fontSize:"11px",color:"#8888AA"}}>{scenario?.title||"Conversa Livre"} · {apiKey?"IA":"básico"}</div>
        </div>
      </div>
      {scenario&&<div style={{padding:"8px 16px",background:"rgba(124,111,255,0.05)",borderBottom:"1px solid #1E1E3F",fontSize:"11px",color:"#8888AA"}}>{scenario.context}</div>}
      <div style={{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:"8px"}}>
        {msgs.map((m,i)=>(
          <div key={i} className="fade" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"76%",padding:"9px 13px",borderRadius:m.role==="user"?"17px 17px 4px 17px":"17px 17px 17px 4px",background:m.role==="user"?"#5B4FFF":"#1A1A35",fontSize:"14px",lineHeight:"1.45",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{m.text}</div>
          </div>
        ))}
        {typing&&<div style={{display:"flex"}}><div style={{padding:"11px 15px",borderRadius:"17px 17px 17px 4px",background:"#1A1A35"}} className="typing"><span/><span/><span/></div></div>}
        <div ref={bottomRef}/>
      </div>
      {lastCoach&&(
        <div style={{padding:"9px 16px",background:`${lastCoach.color}12`,borderTop:`1px solid ${lastCoach.color}33`}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:lastCoach.color,marginBottom:"2px"}}>{lastCoach.icon} {lastCoach.title}</div>
          <div style={{fontSize:"11px",color:"#CCCCDD",lineHeight:"1.4"}}>{lastCoach.text}</div>
        </div>
      )}
      <div style={{padding:"9px 14px",borderTop:"1px solid #1E1E3F",display:"flex",gap:"8px",alignItems:"flex-end"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Digite para Julia..." style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"12px",padding:"10px 12px",color:"#E8E8F5",fontSize:"14px",resize:"none",maxHeight:"90px",lineHeight:"1.4"}} rows={1}/>
        <button onClick={send} disabled={!input.trim()||typing} style={{width:"38px",height:"38px",borderRadius:"50%",border:"none",background:input.trim()&&!typing?"#7C6FFF":"#1E1E3F",color:"white",fontSize:"15px",cursor:input.trim()&&!typing?"pointer":"default",flex:"none"}}>➤</button>
      </div>
    </div>
  );
}

function ProgressoTab({progress,level,pct}){
  const nextLv=LEVELS[level.n]||level;
  const acc=progress.qTotal>0?Math.round((progress.qCorrect/progress.qTotal)*100):0;
  return(
    <div style={{padding:"16px"}}>
      <div style={{background:"#0F0F24",border:`1px solid ${level.color}44`,borderRadius:"16px",padding:"20px",marginBottom:"14px",textAlign:"center"}}>
        <div style={{fontSize:"11px",color:level.color,fontWeight:"700",letterSpacing:"1.5px",marginBottom:"6px"}}>NÍVEL {level.n}</div>
        <div style={{fontSize:"26px",fontWeight:"900",color:level.color,marginBottom:"4px"}}>{level.title}</div>
        <div style={{fontSize:"32px",fontWeight:"900"}}>{progress.xp} <span style={{fontSize:"16px",color:"#8888AA"}}>XP</span></div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",margin:"12px 0 6px"}}>
          <div style={{flex:1,height:"6px",background:"#1E1E3F",borderRadius:"99px"}}><div style={{width:`${pct}%`,height:"100%",background:level.color,borderRadius:"99px"}}/></div>
          <span style={{fontSize:"11px",color:"#8888AA"}}>{pct}%</span>
        </div>
        {level.n<5&&<div style={{fontSize:"11px",color:"#8888AA"}}>Próximo: {nextLv.title} em {nextLv.min-progress.xp} XP</div>}
      </div>
      <div style={{display:"flex",gap:"10px",marginBottom:"14px"}}>
        {[[progress.seen.length,CONCEPTS.length,"vistos","#7C6FFF"],[progress.qTotal,"∞","questões","#48BB8C"],[`${acc}%`,"","precisão",acc>=70?"#48BB8C":acc>=50?"#FF8C47":"#FF5566"]].map(([v,tot,l,c],i)=>(
          <div key={i} style={{flex:1,background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"12px",padding:"14px",textAlign:"center"}}>
            <div style={{fontSize:"20px",fontWeight:"800",color:c}}>{v}{typeof tot==="number"?`/${tot}`:""}</div>
            <div style={{fontSize:"10px",color:"#8888AA",marginTop:"2px"}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#0F0F24",border:"1px solid #1E1E3F",borderRadius:"14px",padding:"18px",marginBottom:"14px"}}>
        <div style={{fontSize:"12px",color:"#8888AA",marginBottom:"14px",fontWeight:"600"}}>COBERTURA</div>
        {Object.entries(catColors).map(([cat,col])=>{
          const tot=CONCEPTS.filter(c=>c.cat===cat).length;
          const seen=progress.seen.filter(id=>CONCEPTS.find(c=>c.id===id&&c.cat===cat)).length;
          const p=tot>0?Math.round((seen/tot)*100):0;
          return(
            <div key={cat} style={{marginBottom:"12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"4px"}}>
                <span style={{color:col.text,fontWeight:"600"}}>{col.label}</span>
                <span style={{color:"#8888AA"}}>{seen}/{tot}</span>
              </div>
              <div style={{height:"4px",background:"#1E1E3F",borderRadius:"99px"}}><div style={{width:`${p}%`,height:"100%",background:col.border,borderRadius:"99px"}}/></div>
            </div>
          );
        })}
      </div>
      <div style={{background:"rgba(196,162,74,0.05)",border:"1px solid rgba(196,162,74,0.2)",borderRadius:"12px",padding:"16px"}}>
        <div style={{fontSize:"10px",color:"#C4A24A",fontWeight:"700",letterSpacing:"1px",marginBottom:"10px"}}>📊 O QUE O HISTÓRICO MOSTRA</div>
        <div style={{fontSize:"12px",color:"#E8D07A",marginBottom:"6px",fontWeight:"600"}}>Outubro 2025: "Sim sim" (guarda da)</div>
        <div style={{fontSize:"12px",color:"#AAA870",marginBottom:"10px"}}>Início cauteloso, respostas curtas, ainda processando quem é Gustavo</div>
        <div style={{fontSize:"12px",color:"#E8D07A",marginBottom:"6px",fontWeight:"600"}}>Dezembro 2025: Se revelando</div>
        <div style={{fontSize:"12px",color:"#AAA870",marginBottom:"10px"}}>"Intensa eu sou só na minha cabeça mas eu deixo muito pouco sair" — a maior abertura até então</div>
        <div style={{fontSize:"12px",color:"#E8D07A",marginBottom:"6px",fontWeight:"600"}}>Março 2026: Primeiro "te amo"</div>
        <div style={{fontSize:"12px",color:"#AAA870",marginBottom:"10px"}}>"Pq não tinha te falado que te amo" — iniciativa dela, sem ser pedido</div>
        <div style={{fontSize:"12px",color:"#E8D07A",marginBottom:"6px",fontWeight:"600"}}>Julho 2026: "Vc é o cara certo pra isso"</div>
        <div style={{fontSize:"12px",color:"#AAA870"}}>6 meses de consistência sua se traduziram em abertura real dela. Continue.</div>
      </div>
    </div>
  );
}

root.render(<App/>);
