    function App() {
      const [screen, setScreen] = useState("login");
      const [form, setForm] = useState({email:"", password:""});
      const [loginError, setLoginError] = useState("");
      const [tab, setTab] = useState("conceitos");
      const [conceptIdx, setConceptIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [quizQ, setQuizQ] = useState(() => shuffle(QUESTIONS));
      const [qIdx, setQIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [answered, setAnswered] = useState(false);
      const [score, setScore] = useState(0);
      const [quizDone, setQuizDone] = useState(false);
      const [progress, setProgress] = useState({seen:[], qCorrect:0, qTotal:0});

      useEffect(() => {
        try { const p = localStorage.getItem("ap_ev"); if(p) setProgress(JSON.parse(p)); } catch(e){}
      }, []);

      const saveP = (p) => { setProgress(p); try { localStorage.setItem("ap_ev", JSON.stringify(p)); } catch(e){} };

      const doLogin = () => {
        if (form.email === AUTH.email && form.password === AUTH.password) { setScreen("app"); }
        else { setLoginError("Email ou senha incorretos."); }
      };

      const handleSelect = (idx) => {
        if (answered) return;
        setSelected(idx);
        setAnswered(true);
        const correct = quizQ[qIdx].options[idx].correct;
        if (correct) setScore(s => s+1);
        saveP({...progress, qCorrect: progress.qCorrect+(correct?1:0), qTotal: progress.qTotal+1});
      };

      const nextQ = () => {
        if (qIdx+1 >= quizQ.length) { setQuizDone(true); return; }
        setQIdx(i=>i+1); setSelected(null); setAnswered(false);
      };

      const restartQuiz = () => {
        setQuizQ(shuffle(QUESTIONS)); setQIdx(0); setSelected(null);
        setAnswered(false); setScore(0); setQuizDone(false);
      };

      const navConcept = (dir) => {
        setFlipped(false);
        setTimeout(() => {
          const next = conceptIdx + dir;
          if (next >= 0 && next < CONCEPTS.length) {
            setConceptIdx(next);
            if (!progress.seen.includes(next)) {
              const p = {...progress, seen:[...progress.seen, next]};
              saveP(p);
            }
          }
        }, 100);
      };

      const c = CONCEPTS[conceptIdx];
      const q = quizQ[qIdx];
      const acc = progress.qTotal > 0 ? Math.round((progress.qCorrect/progress.qTotal)*100) : 0;
      const col = catColors[c?.cat] || catColors.evitativo;

      // ── LOGIN ──
      if (screen === "login") return (
        <div style={{background:"#080814", minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px"}}>
          <div style={{background:"#0F0F24", border:"1px solid #1E1E3F", borderRadius:"20px", padding:"40px 28px", width:"100%", maxWidth:"360px"}}>
            <div style={{textAlign:"center", marginBottom:"32px"}}>
              <div style={{fontSize:"40px", marginBottom:"10px"}}>🔮</div>
              <div style={{fontSize:"20px", fontWeight:"800", background:"linear-gradient(135deg,#A89EFF,#7C6FFF)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>Apego Evitativo</div>
              <div style={{fontSize:"12px", color:"#8888AA", marginTop:"4px"}}>Módulo exclusivo · Estudo pessoal</div>
            </div>
            {loginError && <div style={{color:"#FF5566", fontSize:"13px", textAlign:"center", marginBottom:"12px"}}>{loginError}</div>}
            <input style={{width:"100%", background:"#080814", border:"1px solid #1E1E3F", borderRadius:"10px", padding:"12px 14px", color:"#E8E8F5", fontSize:"15px", outline:"none", boxSizing:"border-box", marginBottom:"10px"}}
              type="email" placeholder="Email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&doLogin()} />
            <input style={{width:"100%", background:"#080814", border:"1px solid #1E1E3F", borderRadius:"10px", padding:"12px 14px", color:"#E8E8F5", fontSize:"15px", outline:"none", boxSizing:"border-box", marginBottom:"18px"}}
              type="password" placeholder="Senha" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&doLogin()} />
            <button onClick={doLogin} style={{width:"100%", background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)", border:"none", borderRadius:"10px", padding:"14px", color:"white", fontWeight:"700", fontSize:"15px", cursor:"pointer"}}>
              Entrar
            </button>
          </div>
        </div>
      );

      // ── APP ──
      return (
        <div style={{background:"#080814", minHeight:"100vh", color:"#E8E8F5", maxWidth:"440px", margin:"0 auto", display:"flex", flexDirection:"column"}}>

          {/* Header */}
          <div style={{padding:"18px 16px 10px", borderBottom:"1px solid #1E1E3F"}}>
            <div style={{display:"inline-block", background:"rgba(196,162,74,0.12)", border:"1px solid rgba(196,162,74,0.3)", borderRadius:"20px", padding:"3px 10px", fontSize:"10px", fontWeight:"700", color:"#E8D07A", letterSpacing:"1px", marginBottom:"6px"}}>
              EXCLUSIVO · {AUTH.name.toUpperCase()}
            </div>
            <div style={{fontSize:"19px", fontWeight:"800", background:"linear-gradient(135deg,#A89EFF,#7C6FFF)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>Apego Evitativo</div>
            <div style={{fontSize:"12px", color:"#8888AA"}}>Entender, reconhecer e reagir melhor</div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex", padding:"10px 14px", gap:"8px", borderBottom:"1px solid #1E1E3F"}}>
            {[["conceitos","📚"],["quiz","🎯"],["progresso","📊"]].map(([t,ico]) => (
              <button key={t} onClick={()=>setTab(t)} style={{flex:1, padding:"8px 4px", borderRadius:"8px", border:"none", fontSize:"11px", fontWeight:"600", cursor:"pointer", background:tab===t?"#1E1E3F":"transparent", color:tab===t?"#A89EFF":"#8888AA", letterSpacing:"0.3px"}}>
                {ico} {t.charAt(0).toUpperCase()+t.slice(1)}
              </button>
            ))}
          </div>

          {/* Body */}
          <div style={{flex:1, padding:"16px", overflowY:"auto"}}>

            {/* ── CONCEITOS ── */}
            {tab==="conceitos" && c && (
              <>
                <div style={{display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px", fontSize:"12px", color:"#8888AA"}}>
                  <span>{conceptIdx+1} / {CONCEPTS.length}</span>
                  <div style={{flex:1, height:"3px", background:"#1E1E3F", borderRadius:"99px"}}>
                    <div style={{width:`${((conceptIdx+1)/CONCEPTS.length)*100}%`, height:"100%", background:"#7C6FFF", borderRadius:"99px", transition:"width 0.3s"}} />
                  </div>
                </div>

                <div style={{background:col.bg, border:`1px solid ${col.border}`, borderRadius:"16px", padding:"20px", marginBottom:"14px"}}>
                  <div style={{fontSize:"10px", fontWeight:"700", color:col.text, letterSpacing:"1.5px", marginBottom:"10px"}}>{col.label}</div>
                  <div style={{fontSize:"28px", marginBottom:"10px"}}>{c.icon}</div>
                  <div style={{fontSize:"17px", fontWeight:"800", marginBottom:"12px", lineHeight:"1.3"}}>{c.title}</div>
                  {!flipped ? (
                    <div style={{fontSize:"14px", lineHeight:"1.65", color:"#CCCCDD"}}>{c.body}</div>
                  ) : (
                    <div style={{background:"rgba(124,111,255,0.12)", border:"1px solid rgba(124,111,255,0.3)", borderRadius:"10px", padding:"12px"}}>
                      <div style={{fontSize:"10px", fontWeight:"700", color:"#7C6FFF", letterSpacing:"1px", marginBottom:"4px"}}>💡 INSIGHT PRÁTICO</div>
                      <div style={{fontSize:"13px", color:"#C0B8FF", lineHeight:"1.5"}}>{c.insight}</div>
                    </div>
                  )}
                </div>

                <div style={{display:"flex", gap:"8px", marginBottom:"20px"}}>
                  <button disabled={conceptIdx===0} onClick={()=>navConcept(-1)} style={{flex:1, padding:"11px", borderRadius:"10px", border:"1px solid #1E1E3F", background:conceptIdx===0?"#0A0A18":"#1E1E3F", color:conceptIdx===0?"#333366":"#A89EFF", fontWeight:"600", fontSize:"13px", cursor:conceptIdx===0?"default":"pointer"}}>← Ant</button>
                  <button onClick={()=>setFlipped(f=>!f)} style={{flex:2, padding:"11px", borderRadius:"10px", border:"1px solid #7C6FFF", background:"rgba(124,111,255,0.15)", color:"#A89EFF", fontWeight:"600", fontSize:"13px", cursor:"pointer"}}>{flipped?"📖 Conceito":"💡 Insight"}</button>
                  <button disabled={conceptIdx===CONCEPTS.length-1} onClick={()=>navConcept(1)} style={{flex:1, padding:"11px", borderRadius:"10px", border:"1px solid #1E1E3F", background:conceptIdx===CONCEPTS.length-1?"#0A0A18":"#1E1E3F", color:conceptIdx===CONCEPTS.length-1?"#333366":"#A89EFF", fontWeight:"600", fontSize:"13px", cursor:conceptIdx===CONCEPTS.length-1?"default":"pointer"}}>Próx →</button>
                </div>

                <div style={{fontSize:"12px", color:"#8888AA", marginBottom:"10px", fontWeight:"600", letterSpacing:"0.5px"}}>TODOS OS TEMAS</div>
                {CONCEPTS.map((con, i) => (
                  <div key={con.id} onClick={()=>{ setConceptIdx(i); setFlipped(false); if(!progress.seen.includes(i)) saveP({...progress,seen:[...progress.seen,i]}); }}
                    style={{background:i===conceptIdx?"rgba(124,111,255,0.12)":"#0F0F24", border:`1px solid ${i===conceptIdx?"#7C6FFF":"#1E1E3F"}`, borderRadius:"10px", padding:"12px 14px", marginBottom:"8px", cursor:"pointer", display:"flex", alignItems:"center", gap:"10px"}}>
                    <span style={{fontSize:"18px"}}>{con.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px", fontWeight:"600", color:i===conceptIdx?"#A89EFF":"#CCCCDD"}}>{con.title}</div>
                      <div style={{fontSize:"10px", color:catColors[con.cat]?.text||"#8888AA", marginTop:"2px"}}>{catColors[con.cat]?.label}</div>
                    </div>
                    {progress.seen.includes(i) && <span style={{fontSize:"12px", color:"#48BB8C"}}>✓</span>}
                  </div>
                ))}
              </>
            )}

            {/* ── QUIZ ── */}
            {tab==="quiz" && (
              <>
                {quizDone ? (
                  <div style={{textAlign:"center", padding:"40px 16px"}}>
                    <div style={{fontSize:"40px", marginBottom:"16px"}}>🎯</div>
                    <div style={{fontSize:"52px", fontWeight:"900", background:"linear-gradient(135deg,#A89EFF,#7C6FFF)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>{score}/{quizQ.length}</div>
                    <div style={{fontSize:"14px", color:"#8888AA", marginBottom:"12px"}}>acertos nesta rodada</div>
                    <div style={{fontSize:"28px", fontWeight:"800", color:score/quizQ.length>=0.8?"#48BB8C":score/quizQ.length>=0.6?"#FF8C47":"#FF5566", marginBottom:"28px"}}>
                      {score/quizQ.length>=0.8?"Excelente! 🔥":score/quizQ.length>=0.6?"Bom! Continue. 💪":"Pratique mais 📚"}
                    </div>
                    <button onClick={restartQuiz} style={{background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)", border:"none", borderRadius:"10px", padding:"14px 40px", color:"white", fontWeight:"700", fontSize:"14px", cursor:"pointer"}}>
                      Nova Rodada
                    </button>
                  </div>
                ) : q && (
                  <>
                    <div style={{display:"flex", alignItems:"center", gap:"8px", marginBottom:"12px", fontSize:"12px", color:"#8888AA"}}>
                      <span>{qIdx+1}/{quizQ.length}</span>
                      <div style={{flex:1, height:"3px", background:"#1E1E3F", borderRadius:"99px"}}>
                        <div style={{width:`${((qIdx+1)/quizQ.length)*100}%`, height:"100%", background:"#7C6FFF", borderRadius:"99px"}} />
                      </div>
                      <span style={{color:"#48BB8C", fontWeight:"700"}}>{score} ✓</span>
                    </div>

                    <div style={{background:"#0F0F24", border:"1px solid #1E1E3F", borderRadius:"14px", padding:"18px", marginBottom:"14px"}}>
                      <div style={{fontSize:"10px", fontWeight:"700", color:catColors[q.cat]?.text||"#A89EFF", letterSpacing:"1.5px", marginBottom:"8px"}}>{catColors[q.cat]?.label||q.cat.toUpperCase()}</div>
                      <div style={{fontSize:"15px", lineHeight:"1.55", fontWeight:"600"}}>{q.situation}</div>
                    </div>

                    {q.options.map((opt, i) => {
                      let bg="#080814", border="#1E1E3F", color="#CCCCDD";
                      if(answered) {
                        if(opt.correct) { bg="rgba(72,187,140,0.12)"; border="#48BB8C"; color="#7DD9B0"; }
                        else if(i===selected) { bg="rgba(255,85,102,0.12)"; border="#FF5566"; color="#FF8899"; }
                      } else if(i===selected) { bg="rgba(124,111,255,0.18)"; border="#7C6FFF"; color="#A89EFF"; }
                      return (
                        <button key={i} onClick={()=>handleSelect(i)} style={{width:"100%", textAlign:"left", padding:"12px 14px", borderRadius:"10px", border:`1px solid ${border}`, background:bg, color, fontSize:"13.5px", lineHeight:"1.4", fontWeight:"500", cursor:answered?"default":"pointer", marginBottom:"8px", display:"block"}}>
                          <span style={{fontWeight:"700", marginRight:"6px", color:"#7C6FFF"}}>{String.fromCharCode(65+i)}.</span>{opt.text}
                        </button>
                      );
                    })}

                    {answered && (
                      <>
                        <div style={{background:"rgba(124,111,255,0.08)", border:"1px solid rgba(124,111,255,0.25)", borderRadius:"10px", padding:"14px", margin:"4px 0 14px"}}>
                          <div style={{fontSize:"10px", fontWeight:"700", color:"#7C6FFF", letterSpacing:"1px", marginBottom:"6px"}}>
                            {q.options[selected]?.correct?"✅ CORRETO":"❌ INCORRETO"}
                          </div>
                          <div style={{fontSize:"13px", color:"#C0B8FF", lineHeight:"1.55"}}>{q.explanation}</div>
                        </div>
                        <button onClick={nextQ} style={{width:"100%", background:"linear-gradient(135deg,#7C6FFF,#5B4FFF)", border:"none", borderRadius:"10px", padding:"13px", color:"white", fontWeight:"700", fontSize:"14px", cursor:"pointer"}}>
                          {qIdx+1>=quizQ.length?"Ver Resultado":"Próxima →"}
                        </button>
                      </>
                    )}
                  </>
                )}
              </>
            )}

            {/* ── PROGRESSO ── */}
            {tab==="progresso" && (
              <>
                <div style={{display:"flex", gap:"10px", marginBottom:"14px"}}>
                  {[[progress.seen.length,"conceitos vistos"],[progress.qTotal,"questões feitas"],[`${acc}%`,"precisão"]].map(([v,l],i) => (
                    <div key={i} style={{flex:1, background:"#0F0F24", border:"1px solid #1E1E3F", borderRadius:"12px", padding:"14px", textAlign:"center"}}>
                      <div style={{fontSize:"22px", fontWeight:"800", color:i===2?(acc>=70?"#48BB8C":acc>=50?"#FF8C47":"#FF5566"):"#7C6FFF"}}>{v}</div>
                      <div style={{fontSize:"10px", color:"#8888AA", marginTop:"2px"}}>{l}</div>
                    </div>
                  ))}
                </div>

                <div style={{background:"#0F0F24", border:"1px solid #1E1E3F", borderRadius:"14px", padding:"18px", marginBottom:"14px"}}>
                  <div style={{fontSize:"12px", color:"#8888AA", marginBottom:"12px", fontWeight:"600", letterSpacing:"0.5px"}}>COBERTURA POR TEMA</div>
                  {Object.entries(catColors).map(([cat, col]) => {
                    const tot = CONCEPTS.filter(c=>c.cat===cat).length;
                    const seen = progress.seen.filter(i=>CONCEPTS[i]?.cat===cat).length;
                    const pct = tot>0?(seen/tot)*100:0;
                    return (
                      <div key={cat} style={{marginBottom:"12px"}}>
                        <div style={{display:"flex", justifyContent:"space-between", fontSize:"11px", marginBottom:"4px"}}>
                          <span style={{color:col.text, fontWeight:"600"}}>{col.label}</span>
                          <span style={{color:"#8888AA"}}>{seen}/{tot}</span>
                        </div>
                        <div style={{height:"4px", background:"#1E1E3F", borderRadius:"99px"}}>
                          <div style={{width:`${pct}%`, height:"100%", background:col.border, borderRadius:"99px", transition:"width 0.5s"}} />
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div style={{background:"rgba(196,162,74,0.05)", border:"1px solid rgba(196,162,74,0.2)", borderRadius:"12px", padding:"16px"}}>
                  <div style={{fontSize:"10px", color:"#C4A24A", fontWeight:"700", letterSpacing:"1px", marginBottom:"8px"}}>📚 LEITURA ESSENCIAL</div>
                  <div style={{fontSize:"13px", color:"#E8D07A", fontWeight:"700", marginBottom:"4px"}}>Apegados — Amir Levine & Rachel Heller</div>
                  <div style={{fontSize:"12px", color:"#AAA870", lineHeight:"1.5"}}>Foque nos capítulos sobre o evitante e sobre a combinação ansioso-evitativo. É onde está a base de tudo que você está aprendendo aqui.</div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
